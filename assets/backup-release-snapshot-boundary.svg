<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Eva backup, snapshot, and restore boundary</title>
  <desc id="desc">Eva backup and snapshot commands create synthetic evidence, while restore uses an independently authored plan and gated local file mutations.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="132%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#172033" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#f6f8fb"/>
  <rect x="24" y="24" width="1152" height="572" rx="8" fill="#ffffff" stroke="#d9e2ef"/>

  <text x="60" y="78" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">Backup, snapshot, and restore boundary</text>
  <text x="60" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#5f6f82">Synthetic command evidence and a real, explicitly gated local mutation engine.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="158" width="315" height="310" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="60" y="158" width="315" height="8" rx="4" fill="#2563eb"/>
    <text x="84" y="202" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#172033">1. Synthetic CLI surface</text>
    <text x="84" y="239" font-family="Consolas, monospace" font-size="13" fill="#172033">backup create</text>
    <text x="84" y="265" font-family="Consolas, monospace" font-size="13" fill="#172033">snapshot create / promote</text>
    <text x="84" y="291" font-family="Consolas, monospace" font-size="13" fill="#172033">restore plan</text>
    <text x="84" y="330" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#526174">Fixed three-entry archive</text>
    <text x="84" y="354" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#526174">Snapshot remains in memory</text>
    <text x="84" y="378" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#526174">Artifact may be written to disk</text>
    <rect x="84" y="408" width="267" height="36" rx="6" fill="#fff7ed"/>
    <text x="99" y="431" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#9a3412">No workspace read or policy gate</text>
  </g>

  <path d="M375 313 H427" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="432" y="158" width="336" height="310" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="432" y="158" width="336" height="8" rx="4" fill="#7c3aed"/>
    <text x="456" y="202" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#172033">2. Operator-authored contract</text>
    <text x="456" y="239" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Strict key=value apply plan</text>
    <text x="456" y="265" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Primary artifact + digest</text>
    <text x="456" y="291" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Pre-restore artifact + digest</text>
    <text x="456" y="317" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Relative mutation steps</text>
    <text x="456" y="356" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#8a4b08">restore plan output is not</text>
    <text x="456" y="378" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#8a4b08">the restore apply plan</text>
    <rect x="456" y="408" width="288" height="36" rx="6" fill="#f3e8ff"/>
    <text x="471" y="431" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#6d28d9">Migration: in-memory preflight only</text>
  </g>

  <path d="M768 313 H820" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="825" y="158" width="315" height="310" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="825" y="158" width="315" height="8" rx="4" fill="#15803d"/>
    <text x="849" y="202" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#172033">3. Gated restore engine</text>
    <text x="849" y="239" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Dry-run: verify and preview</text>
    <text x="849" y="265" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Apply: policy, health, confirm</text>
    <text x="849" y="291" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">New filesystem lock</text>
    <text x="849" y="317" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Copy / replace / delete</text>
    <text x="849" y="343" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Transaction and rollback log</text>
    <text x="849" y="382" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#526174">Default policy denies mutation</text>
    <rect x="849" y="408" width="267" height="36" rx="6" fill="#dcfce7"/>
    <text x="864" y="431" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#166534">Real local file mutations</text>
  </g>

  <rect x="60" y="505" width="1080" height="62" rx="8" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="84" y="532" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#be123c">TRUST BOUNDARY</text>
  <text x="225" y="532" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#881337">development signing/encryption · unsigned plans · absolute target root allowed · no retention or remote transfer</text>
  <text x="84" y="554" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#881337">A redacted entry still contains its original bytes; backup --dry-run still creates the artifact.</text>
</svg>
