<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Eva website and documentation i18n pipeline</title>
  <desc id="desc">Human-maintained localized sources feed the site build and validator before the Pages workflow assembles and deploys static output.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="132%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#172033" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#f6f8fb"/>
  <rect x="24" y="24" width="1152" height="572" rx="8" fill="#ffffff" stroke="#d9e2ef"/>

  <text x="60" y="78" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">Website and documentation i18n pipeline</text>
  <text x="60" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#5f6f82">Localized sources stay human-maintained; automation builds and checks the publishable surface.</text>

  <g filter="url(#shadow)">
    <rect x="50" y="158" width="250" height="248" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="50" y="158" width="250" height="8" rx="4" fill="#2563eb"/>
    <text x="74" y="202" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#172033">1. Maintained sources</text>
    <text x="74" y="239" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Manifest and locale JSON</text>
    <text x="74" y="265" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">English / Chinese Markdown</text>
    <text x="74" y="291" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Localized SVG assets</text>
    <text x="74" y="317" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Templates and blog content</text>
    <text x="74" y="365" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d4ed8">Source of truth</text>
  </g>

  <path d="M300 282 H327" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="332" y="158" width="250" height="248" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="332" y="158" width="250" height="8" rx="4" fill="#0f766e"/>
    <text x="356" y="202" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#172033">2. Build site</text>
    <text x="356" y="239" font-family="Consolas, monospace" font-size="12" fill="#172033">build-site-i18n.ps1</text>
    <text x="356" y="278" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Home pages</text>
    <text x="356" y="304" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">One English docs index</text>
    <text x="356" y="330" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Localized blog HTML</text>
    <text x="356" y="365" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#526174">Generated HTML is tracked</text>
  </g>

  <path d="M582 282 H609" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="614" y="158" width="250" height="248" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="614" y="158" width="250" height="8" rx="4" fill="#7c3aed"/>
    <text x="638" y="202" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#172033">3. Validate contracts</text>
    <text x="638" y="239" font-family="Consolas, monospace" font-size="12" fill="#172033">validate-i18n.ps1</text>
    <text x="638" y="278" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Registered paths/status</text>
    <text x="638" y="304" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Selected links and metadata</text>
    <text x="638" y="330" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Generated blog/pages shape</text>
    <text x="638" y="365" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#526174">CI/Release do not deploy Pages</text>
  </g>

  <path d="M864 282 H891" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="896" y="158" width="254" height="248" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="896" y="158" width="254" height="8" rx="4" fill="#15803d"/>
    <text x="920" y="202" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#172033">4. Pages publication</text>
    <text x="920" y="239" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Assemble public/</text>
    <text x="920" y="265" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Website + docs + assets</text>
    <text x="920" y="291" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Remove internal sources</text>
    <text x="920" y="317" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#172033">Reject symlinks/hard links</text>
    <text x="920" y="365" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#166534">Only Pages deploys</text>
  </g>

  <rect x="50" y="448" width="530" height="98" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="74" y="480" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#1d4ed8">PUBLISHED STATIC CONTENT</text>
  <text x="74" y="509" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#1e3a8a">Generated website/blog HTML + maintained Markdown and SVG assets</text>
  <text x="74" y="532" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#526174">The build does not translate or regenerate Markdown documents.</text>

  <rect x="604" y="448" width="546" height="98" rx="8" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="628" y="480" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#be123c">MANUAL RESPONSIBILITY</text>
  <text x="628" y="509" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#881337">Translation parity, freshness, complete dead-link coverage, accessibility</text>
  <text x="628" y="532" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#881337">Status and content-authority metadata are assertions, not derived proof.</text>
</svg>
