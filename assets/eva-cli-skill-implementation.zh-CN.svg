<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680" role="img" aria-labelledby="title desc">
  <title id="title">Eva-CLI Skill 实现边界</title>
  <desc id="desc">这张图展示 Skill 发现、策略校验、注册发布、调用路由和热更新边界。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#1e3a8a"/>
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#172033" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1180" height="680" fill="#f7f9fc"/>
  <rect x="28" y="28" width="1124" height="624" rx="18" fill="#ffffff" stroke="#dce5f1"/>

  <text x="60" y="78" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="800" fill="#172033">Eva-CLI Skill 实现方案</text>
  <text x="60" y="108" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#617086">Skill 通过受控 capability 暴露，不作为原始脚本执行入口。</text>

  <g filter="url(#shadow)">
    <rect x="60" y="145" width="225" height="122" rx="10" fill="#eef6ff" stroke="#c6d4e5"/>
    <text x="82" y="180" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#1e3a8a">Workflow Skill</text>
    <text x="82" y="207" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#172033">Codex 或 OMX SKILL.md</text>
    <text x="82" y="229" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">Adapter transport: skill</text>
    <text x="82" y="251" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">能力名: workflow.*</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="288" width="225" height="122" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="82" y="323" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#9a3412">Runtime Worker</text>
    <text x="82" y="350" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#172033">team、swarm 或 worker 模式</text>
    <text x="82" y="372" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">默认只展示</text>
    <text x="82" y="394" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">不是普通 Adapter</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="431" width="225" height="122" rx="10" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="82" y="466" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#115e59">Lua Skill</text>
    <text x="82" y="493" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#172033">项目 manifest + Lua 脚本</text>
    <text x="82" y="515" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">LuaCapabilityRuntime</text>
    <text x="82" y="537" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">generation swap</text>
  </g>

  <path d="M305 206 H365" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M305 349 H365" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M305 492 H365" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="385" y="142" width="245" height="130" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="409" y="177" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">Discovery</text>
    <text x="409" y="205" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">只扫描授权目录</text>
    <text x="409" y="227" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">归一化 id、来源、类型</text>
    <text x="409" y="249" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">发现不等于授权执行</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="385" y="303" width="245" height="130" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="409" y="338" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">Validation Gate</text>
    <text x="409" y="366" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">manifest 与 schema</text>
    <text x="409" y="388" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">policy 与 trust level</text>
    <text x="409" y="410" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">runtime gate 与 limits</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="385" y="464" width="245" height="130" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="409" y="499" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">Registration Decision</text>
    <text x="409" y="527" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">注册、拒绝或只展示</text>
    <text x="409" y="549" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">记录诊断信息</text>
    <text x="409" y="571" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">发布 capability 索引</text>
  </g>

  <path d="M508 272 V303" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M508 433 V464" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M630 529 H691" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="710" y="145" width="185" height="90" rx="10" fill="#ede9fe" stroke="#d8ccff"/>
    <text x="732" y="180" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#5b21b6">Lua Agent</text>
    <text x="732" y="207" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">调用 workflow capability</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="710" y="267" width="185" height="90" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="732" y="302" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">Rust Tool Layer</text>
    <text x="732" y="329" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">校验调用方权限</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="710" y="389" width="185" height="90" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="732" y="424" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">AdapterRouter</text>
    <text x="732" y="451" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">选择已注册 provider</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="710" y="511" width="185" height="90" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="732" y="546" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">Skill Runtime</text>
    <text x="732" y="573" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">SkillAdapter 或 Lua adapter</text>
  </g>

  <path d="M802 235 V267" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M802 357 V389" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M802 479 V511" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="940" y="145" width="165" height="197" rx="10" fill="#f8fafc" stroke="#c6d4e5"/>
    <text x="962" y="180" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="800" fill="#172033">Rust 托管</text>
    <text x="962" y="210" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">权限</text>
    <text x="962" y="232" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">密钥</text>
    <text x="962" y="254" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">文件系统与网络</text>
    <text x="962" y="276" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">超时与取消</text>
    <text x="962" y="298" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">审计与回滚</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="940" y="382" width="165" height="126" rx="10" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="962" y="417" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="800" fill="#115e59">Skill 承载</text>
    <text x="962" y="447" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">业务流程</text>
    <text x="962" y="469" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">参数映射</text>
    <text x="962" y="491" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#617086">结果整理</text>
  </g>

  <path d="M895 556 H940" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="690" y="620" width="435" height="24" rx="12" fill="#dbeafe"/>
  <text x="712" y="637" font-family="Inter, Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="800" fill="#1e3a8a">Lua skill 热更新: shadow load -> health check -> activate -> drain old generation</text>
</svg>
