<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Eva-CLI 当前总体架构</title>
  <desc id="desc">Eva-CLI 当前架构，展示用户入口、Rust 托管的事件与 Agent 执行链、能力与 Adapter 边界，以及持久化、direct service entry、生命周期、备份、发布和观测服务。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#475569"/></marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#2563eb"/></marker>
    <style>
      text{font-family:Inter,"Segoe UI","Microsoft YaHei",sans-serif;fill:#172033}
      .title{font-size:32px;font-weight:700}.subtitle{font-size:16px;fill:#526174}.section{font-size:17px;font-weight:700}
      .label{font-size:16px;font-weight:700}.small{font-size:13px;fill:#526174}.tiny{font-size:12px;fill:#64748b}.footer{font-size:14px;fill:#ffffff}
      .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.blue{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5}
      .green{fill:#ecfdf5;stroke:#22a06b;stroke-width:1.5}.orange{fill:#fff7ed;stroke:#ea8a1f;stroke-width:1.5}
      .purple{fill:#f5f3ff;stroke:#7c5ce7;stroke-width:1.5}.cyan{fill:#ecfeff;stroke:#0891b2;stroke-width:1.5}
      .rose{fill:#fff1f2;stroke:#e25572;stroke-width:1.5}.line{fill:none;stroke:#475569;stroke-width:2;marker-end:url(#arrow)}
      .control{fill:none;stroke:#2563eb;stroke-width:2;marker-end:url(#arrow-blue)}.dash{stroke-dasharray:7 6}
    </style>
  </defs>
  <rect width="1600" height="1000" fill="#ffffff"/>
  <text class="title" x="54" y="52">Eva-CLI 当前总体架构</text>
  <text class="subtitle" x="54" y="80">Rust 托管执行、权限、持久化和恢复边界；Lua 在能力门禁之后承载隔离的 Agent 行为。</text>

  <rect class="panel" x="42" y="104" width="1516" height="142" rx="8"/>
  <text class="section" x="62" y="132">入口与控制面</text>
  <g>
    <rect class="purple" x="72" y="154" width="190" height="62" rx="7"/><text class="label" x="167" y="181" text-anchor="middle">eva CLI</text><text class="small" x="167" y="202" text-anchor="middle">命令与 JSON 契约</text>
    <rect class="purple" x="292" y="154" width="190" height="62" rx="7"/><text class="label" x="387" y="181" text-anchor="middle">Daemon 控制</text><text class="small" x="387" y="202" text-anchor="middle">提交、取消、关闭</text>
    <rect class="purple" x="512" y="154" width="190" height="62" rx="7"/><text class="label" x="607" y="181" text-anchor="middle">MCP client / probe</text><text class="small" x="607" y="202" text-anchor="middle">外部工具发现</text>
    <rect class="green" x="742" y="154" width="210" height="62" rx="7"/><text class="label" x="847" y="181" text-anchor="middle">配置与 Schema</text><text class="small" x="847" y="202" text-anchor="middle">已校验 ProjectConfig</text>
    <rect class="green" x="982" y="154" width="230" height="62" rx="7"/><text class="label" x="1097" y="181" text-anchor="middle">发现与 Policy</text><text class="small" x="1097" y="202" text-anchor="middle">候选、权限、沙箱</text>
    <rect class="orange" x="1242" y="154" width="270" height="62" rx="7"/><text class="label" x="1377" y="181" text-anchor="middle">生命周期与 Service 控制</text><text class="small" x="1377" y="202" text-anchor="middle">generation、service identity、artifact</text>
  </g>

  <rect class="panel" x="42" y="268" width="1516" height="346" rx="8"/>
  <text class="section" x="62" y="298">Rust 托管执行链</text>
  <text class="tiny" x="1530" y="298" text-anchor="end">当前内存核心链；可恢复服务使用下方持久化存储</text>
  <g>
    <rect class="blue" x="68" y="330" width="170" height="78" rx="7"/><text class="label" x="153" y="361" text-anchor="middle">任务 / 事件</text><text class="small" x="153" y="384" text-anchor="middle">强类型请求 + trace</text>
    <rect class="blue" x="278" y="330" width="170" height="78" rx="7"/><text class="label" x="363" y="361" text-anchor="middle">EventBus</text><text class="small" x="363" y="384" text-anchor="middle">发布、恢复、重放</text>
    <rect class="blue" x="488" y="330" width="170" height="78" rx="7"/><text class="label" x="573" y="361" text-anchor="middle">Scheduler</text><text class="small" x="573" y="384" text-anchor="middle">Topic + target + policy</text>
    <rect class="blue" x="698" y="330" width="170" height="78" rx="7"/><text class="label" x="783" y="361" text-anchor="middle">Agent mailbox</text><text class="small" x="783" y="384" text-anchor="middle">有界私有队列</text>
    <rect class="orange" x="908" y="330" width="170" height="78" rx="7"/><text class="label" x="993" y="361" text-anchor="middle">AgentRuntime</text><text class="small" x="993" y="384" text-anchor="middle">生命周期与 handler</text>
    <rect class="orange" x="1118" y="330" width="170" height="78" rx="7"/><text class="label" x="1203" y="361" text-anchor="middle">LuaHost</text><text class="small" x="1203" y="384" text-anchor="middle">沙箱化 on_event</text>
    <path class="line" d="M238 369H278"/><path class="line" d="M448 369H488"/><path class="line" d="M658 369H698"/><path class="line" d="M868 369H908"/><path class="line" d="M1078 369H1118"/>
  </g>
  <g>
    <rect class="cyan" x="1118" y="468" width="170" height="82" rx="7"/><text class="label" x="1203" y="497" text-anchor="middle">内置 Capability</text><text class="small" x="1203" y="519" text-anchor="middle">可选 Lua 结果支路</text><text class="small" x="1203" y="538" text-anchor="middle">response 汇入运行报告</text>
    <rect class="rose" x="1328" y="468" width="190" height="82" rx="7"/><text class="label" x="1423" y="497" text-anchor="middle">Adapter runtime</text><text class="small" x="1423" y="519" text-anchor="middle">registry + router</text><text class="small" x="1423" y="538" text-anchor="middle">transport 执行</text>
    <path class="line" d="M1203 408V468"/>
    <rect class="panel" x="68" y="468" width="930" height="82" rx="7"/>
    <text class="label" x="88" y="493">受控 Transport 与服务</text>
    <text class="small" x="88" y="520">builtin · stdio · HTTP · MCP · EventBus · Skill · Lua capability · hardware</text>
    <text class="small" x="88" y="541">LuaEventResult 与可选内置 capability response 汇入 BasicRunReport；当前不会重新 publish。</text>
    <path class="control dash" d="M607 216V252H1490V468"/><path class="line" d="M1328 509H998"/>
    <text class="tiny" x="1210" y="584" text-anchor="middle">外部 provider 命令独立使用 Adapter 路径，不经过 EventBus 与 Lua</text>
  </g>

  <rect class="panel" x="42" y="638" width="1516" height="270" rx="8"/>
  <text class="section" x="62" y="668">持久化、恢复与运维</text>
  <g>
    <rect class="blue" x="68" y="696" width="280" height="142" rx="7"/><text class="label" x="88" y="727">Durable backend</text><text class="small" x="88" y="753">EventLog · TaskStateStore</text><text class="small" x="88" y="776">ProviderProcessTable · StateStore</text><text class="small" x="88" y="799">ArtifactStore · AuditSink</text><text class="tiny" x="88" y="823">文件系统或内存实现</text>
    <rect class="green" x="378" y="696" width="250" height="142" rx="7"/><text class="label" x="398" y="727">记忆与上下文</text><text class="small" x="398" y="753">MemoryService</text><text class="small" x="398" y="776">KnowledgeService</text><text class="small" x="398" y="799">ContextBuilder + 脱敏</text>
    <rect class="cyan" x="658" y="696" width="250" height="142" rx="7"/><text class="label" x="678" y="727">观测</text><text class="small" x="678" y="753">审计事件 · trace 字段</text><text class="small" x="678" y="776">metrics · 保留策略</text><text class="small" x="678" y="799">结构化操作证据</text>
    <rect class="orange" x="938" y="696" width="250" height="142" rx="7"/><text class="label" x="958" y="727">生命周期</text><text class="small" x="958" y="753">generation 切换 · drain</text><text class="small" x="958" y="776">handoff · 平台 Adapter</text><text class="small" x="958" y="799">回滚 · direct service entry</text><text class="tiny" x="958" y="820">真实 host lifecycle evidence 仍在外部</text>
    <rect class="purple" x="1218" y="696" width="300" height="142" rx="7"/><text class="label" x="1238" y="727">备份、恢复与发布</text><text class="small" x="1238" y="753">备份 · 迁移包 · snapshot</text><text class="small" x="1238" y="776">分阶段 restore + 回滚证据</text><text class="small" x="1238" y="799">发布产物与分发检查</text>
  </g>
  <path class="control" d="M363 408V696"/><path class="control" d="M993 408C993 620 503 620 503 696"/><path class="control" d="M1097 216C1097 620 783 620 783 696"/><path class="control" d="M1377 216V696"/>
  <text class="tiny" x="62" y="884">边界规则：Lua 与 Agent 表达意图；Rust 托管的 capability、adapter、storage、lifecycle 和 audit 服务执行或记录副作用。</text>
  <rect x="42" y="932" width="1516" height="38" rx="6" fill="#172033"/>
  <text class="footer" x="800" y="957" text-anchor="middle">事实源是当前 Rust workspace 与已校验配置；可选外部系统只能通过显式 Adapter 访问。</text>
</svg>
