<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Eva 备份、快照与恢复边界</title>
  <desc id="desc">Eva 的备份和快照命令生成合成证据，恢复则使用独立编写的计划和受门禁保护的本地文件变更。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="132%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#172033" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#f6f8fb"/>
  <rect x="24" y="24" width="1152" height="572" rx="8" fill="#ffffff" stroke="#d9e2ef"/>

  <text x="60" y="78" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#172033">备份、快照与恢复边界</text>
  <text x="60" y="108" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="15" fill="#5f6f82">合成命令证据，以及带显式门禁的真实本地变更引擎。</text>

  <g filter="url(#shadow)">
    <rect x="60" y="158" width="315" height="310" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="60" y="158" width="315" height="8" rx="4" fill="#2563eb"/>
    <text x="84" y="202" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#172033">1. 合成 CLI 表面</text>
    <text x="84" y="239" font-family="Consolas, monospace" font-size="13" fill="#172033">backup create</text>
    <text x="84" y="265" font-family="Consolas, monospace" font-size="13" fill="#172033">snapshot create / promote</text>
    <text x="84" y="291" font-family="Consolas, monospace" font-size="13" fill="#172033">restore plan</text>
    <text x="84" y="330" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#526174">固定三条目的 Archive</text>
    <text x="84" y="354" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#526174">Snapshot 仅存在于内存</text>
    <text x="84" y="378" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#526174">Artifact 可写入磁盘</text>
    <rect x="84" y="408" width="267" height="36" rx="6" fill="#fff7ed"/>
    <text x="99" y="431" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#9a3412">不读 Workspace；无 Policy Gate</text>
  </g>

  <path d="M375 313 H427" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="432" y="158" width="336" height="310" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="432" y="158" width="336" height="8" rx="4" fill="#7c3aed"/>
    <text x="456" y="202" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#172033">2. Operator 编写的契约</text>
    <text x="456" y="239" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">严格 key=value Apply Plan</text>
    <text x="456" y="265" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">主 Artifact + Digest</text>
    <text x="456" y="291" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">恢复前 Artifact + Digest</text>
    <text x="456" y="317" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">相对路径 Mutation Step</text>
    <text x="456" y="356" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#8a4b08">restore plan 输出不是</text>
    <text x="456" y="378" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#8a4b08">restore apply 使用的计划</text>
    <rect x="456" y="408" width="288" height="36" rx="6" fill="#f3e8ff"/>
    <text x="471" y="431" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#6d28d9">Migration：仅内存 Preflight</text>
  </g>

  <path d="M768 313 H820" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="825" y="158" width="315" height="310" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="825" y="158" width="315" height="8" rx="4" fill="#15803d"/>
    <text x="849" y="202" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#172033">3. 带门禁的恢复引擎</text>
    <text x="849" y="239" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">Dry-run：校验并预览</text>
    <text x="849" y="265" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">Apply：Policy、Health、Confirm</text>
    <text x="849" y="291" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">新的文件系统 Lock</text>
    <text x="849" y="317" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">Copy / Replace / Delete</text>
    <text x="849" y="343" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">Transaction 与 Rollback 日志</text>
    <text x="849" y="382" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#526174">默认 Policy 拒绝变更</text>
    <rect x="849" y="408" width="267" height="36" rx="6" fill="#dcfce7"/>
    <text x="864" y="431" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#166534">真实本地文件变更</text>
  </g>

  <rect x="60" y="505" width="1080" height="62" rx="8" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="84" y="532" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#be123c">信任边界</text>
  <text x="174" y="532" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#881337">开发用签名/加密 · Plan 未签名 · 允许绝对 Target Root · 无保留策略或远程传输</text>
  <text x="84" y="554" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#881337">Redacted 条目仍包含原始字节；backup --dry-run 仍会创建 Artifact。</text>
</svg>
