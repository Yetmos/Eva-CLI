<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Eva-CLI current architecture</title>
  <desc id="desc">Current Eva-CLI architecture showing user-facing entry surfaces, the Rust-managed event and Agent execution path, capability and adapter boundaries, durable state, lifecycle, backup, release, and observability services.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#475569"/></marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#2563eb"/></marker>
    <style>
      text{font-family:Inter,"Segoe UI","Microsoft YaHei",sans-serif;fill:#172033}
      .title{font-size:32px;font-weight:700}.subtitle{font-size:16px;fill:#526174}.section{font-size:17px;font-weight:700}
      .label{font-size:16px;font-weight:700}.small{font-size:13px;fill:#526174}.tiny{font-size:12px;fill:#64748b}.footer{font-size:14px;fill:#ffffff}
      .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.blue{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5}
      .green{fill:#ecfdf5;stroke:#22a06b;stroke-width:1.5}.orange{fill:#fff7ed;stroke:#ea8a1f;stroke-width:1.5}
      .purple{fill:#f5f3ff;stroke:#7c5ce7;stroke-width:1.5}.cyan{fill:#ecfeff;stroke:#0891b2;stroke-width:1.5}
      .rose{fill:#fff1f2;stroke:#e25572;stroke-width:1.5}.line{fill:none;stroke:#475569;stroke-width:2;marker-end:url(#arrow)}
      .control{fill:none;stroke:#2563eb;stroke-width:2;marker-end:url(#arrow-blue)}.dash{stroke-dasharray:7 6}
    </style>
  </defs>
  <rect width="1600" height="1000" fill="#ffffff"/>
  <text class="title" x="54" y="52">Eva-CLI Current Architecture</text>
  <text class="subtitle" x="54" y="80">Rust owns execution, policy, durability, and recovery boundaries; Lua supplies isolated Agent behavior behind capability gates.</text>

  <rect class="panel" x="42" y="104" width="1516" height="142" rx="8"/>
  <text class="section" x="62" y="132">Entry and control surfaces</text>
  <g>
    <rect class="purple" x="72" y="154" width="190" height="62" rx="7"/><text class="label" x="167" y="181" text-anchor="middle">eva CLI</text><text class="small" x="167" y="202" text-anchor="middle">commands and JSON contracts</text>
    <rect class="purple" x="292" y="154" width="190" height="62" rx="7"/><text class="label" x="387" y="181" text-anchor="middle">Daemon control</text><text class="small" x="387" y="202" text-anchor="middle">submit, cancel, shutdown</text>
    <rect class="purple" x="512" y="154" width="190" height="62" rx="7"/><text class="label" x="607" y="181" text-anchor="middle">MCP client / probe</text><text class="small" x="607" y="202" text-anchor="middle">external tool discovery</text>
    <rect class="green" x="742" y="154" width="210" height="62" rx="7"/><text class="label" x="847" y="181" text-anchor="middle">Config and schema</text><text class="small" x="847" y="202" text-anchor="middle">validated ProjectConfig</text>
    <rect class="green" x="982" y="154" width="230" height="62" rx="7"/><text class="label" x="1097" y="181" text-anchor="middle">Discovery and policy</text><text class="small" x="1097" y="202" text-anchor="middle">candidates, permissions, sandbox</text>
    <rect class="orange" x="1242" y="154" width="270" height="62" rx="7"/><text class="label" x="1377" y="181" text-anchor="middle">Lifecycle and release controls</text><text class="small" x="1377" y="202" text-anchor="middle">generation, drain, rollback, artifacts</text>
  </g>

  <rect class="panel" x="42" y="268" width="1516" height="346" rx="8"/>
  <text class="section" x="62" y="298">Rust-managed execution path</text>
  <text class="tiny" x="1530" y="298" text-anchor="end">current in-memory core path; recoverable services use the durable stores below</text>
  <g>
    <rect class="blue" x="68" y="330" width="170" height="78" rx="7"/><text class="label" x="153" y="361" text-anchor="middle">Task / Event</text><text class="small" x="153" y="384" text-anchor="middle">typed request + trace</text>
    <rect class="blue" x="278" y="330" width="170" height="78" rx="7"/><text class="label" x="363" y="361" text-anchor="middle">EventBus</text><text class="small" x="363" y="384" text-anchor="middle">publish, recover, replay</text>
    <rect class="blue" x="488" y="330" width="170" height="78" rx="7"/><text class="label" x="573" y="361" text-anchor="middle">Scheduler</text><text class="small" x="573" y="384" text-anchor="middle">Topic + target + policy</text>
    <rect class="blue" x="698" y="330" width="170" height="78" rx="7"/><text class="label" x="783" y="361" text-anchor="middle">Agent mailbox</text><text class="small" x="783" y="384" text-anchor="middle">bounded private queue</text>
    <rect class="orange" x="908" y="330" width="170" height="78" rx="7"/><text class="label" x="993" y="361" text-anchor="middle">AgentRuntime</text><text class="small" x="993" y="384" text-anchor="middle">lifecycle and handler</text>
    <rect class="orange" x="1118" y="330" width="170" height="78" rx="7"/><text class="label" x="1203" y="361" text-anchor="middle">LuaHost</text><text class="small" x="1203" y="384" text-anchor="middle">sandboxed on_event</text>
    <path class="line" d="M238 369H278"/><path class="line" d="M448 369H488"/><path class="line" d="M658 369H698"/><path class="line" d="M868 369H908"/><path class="line" d="M1078 369H1118"/>
  </g>
  <g>
    <rect class="cyan" x="1118" y="468" width="170" height="82" rx="7"/><text class="label" x="1203" y="497" text-anchor="middle">Built-in capability</text><text class="small" x="1203" y="519" text-anchor="middle">optional Lua result branch</text><text class="small" x="1203" y="538" text-anchor="middle">response joins run report</text>
    <rect class="rose" x="1328" y="468" width="190" height="82" rx="7"/><text class="label" x="1423" y="497" text-anchor="middle">Adapter runtime</text><text class="small" x="1423" y="519" text-anchor="middle">registry + router</text><text class="small" x="1423" y="538" text-anchor="middle">transport execution</text>
    <path class="line" d="M1203 408V468"/>
    <rect class="panel" x="68" y="468" width="930" height="82" rx="7"/>
    <text class="label" x="88" y="493">Controlled transports and services</text>
    <text class="small" x="88" y="520">builtin · stdio · HTTP · MCP · EventBus · Skill · Lua capability · hardware</text>
    <text class="small" x="88" y="541">LuaEventResult and any optional built-in capability response are collected in BasicRunReport; they are not republished.</text>
    <path class="control dash" d="M607 216V252H1490V468"/><path class="line" d="M1328 509H998"/>
    <text class="tiny" x="1210" y="584" text-anchor="middle">external provider commands use the adapter path independently of EventBus and Lua</text>
  </g>

  <rect class="panel" x="42" y="638" width="1516" height="270" rx="8"/>
  <text class="section" x="62" y="668">Durability, recovery, and operations</text>
  <g>
    <rect class="blue" x="68" y="696" width="280" height="142" rx="7"/><text class="label" x="88" y="727">Durable backend</text><text class="small" x="88" y="753">EventLog · TaskStateStore</text><text class="small" x="88" y="776">ProviderProcessTable · StateStore</text><text class="small" x="88" y="799">ArtifactStore · AuditSink</text><text class="tiny" x="88" y="823">filesystem or in-memory implementations</text>
    <rect class="green" x="378" y="696" width="250" height="142" rx="7"/><text class="label" x="398" y="727">Memory and context</text><text class="small" x="398" y="753">MemoryService</text><text class="small" x="398" y="776">KnowledgeService</text><text class="small" x="398" y="799">ContextBuilder + redaction</text>
    <rect class="cyan" x="658" y="696" width="250" height="142" rx="7"/><text class="label" x="678" y="727">Observability</text><text class="small" x="678" y="753">audit events · trace fields</text><text class="small" x="678" y="776">metrics · retention</text><text class="small" x="678" y="799">structured operation evidence</text>
    <rect class="orange" x="938" y="696" width="250" height="142" rx="7"/><text class="label" x="958" y="727">Lifecycle</text><text class="small" x="958" y="753">generation switch · drain</text><text class="small" x="958" y="776">handoff · supervisor</text><text class="small" x="958" y="799">rollback · manager abstraction</text><text class="tiny" x="958" y="820">service-manager implementation is fake/test</text>
    <rect class="purple" x="1218" y="696" width="300" height="142" rx="7"/><text class="label" x="1238" y="727">Backup, restore, and release</text><text class="small" x="1238" y="753">backup · migration package · snapshot</text><text class="small" x="1238" y="776">staged restore + rollback evidence</text><text class="small" x="1238" y="799">release artifact and distribution checks</text>
  </g>
  <path class="control" d="M363 408V696"/><path class="control" d="M993 408C993 620 503 620 503 696"/><path class="control" d="M1097 216C1097 620 783 620 783 696"/><path class="control" d="M1377 216V696"/>
  <text class="tiny" x="62" y="884">Boundary rule: Lua and Agents express intent; Rust-owned capability, adapter, storage, lifecycle, and audit services execute or record side effects.</text>
  <rect x="42" y="932" width="1516" height="38" rx="6" fill="#172033"/>
  <text class="footer" x="800" y="957" text-anchor="middle">Source of truth: the current Rust workspace and validated config; optional external systems are reached only through explicit adapters.</text>
</svg>
