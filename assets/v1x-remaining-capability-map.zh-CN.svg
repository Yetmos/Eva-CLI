<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">V1.x 剩余能力地图</title>
  <desc id="desc">区分 Eva-CLI 当前受控 Alpha 边界、缺失的生产实现和外部前置条件。</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="132%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#172033" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#f6f8fb"/>
  <rect x="24" y="24" width="1152" height="572" rx="8" fill="#ffffff" stroke="#d9e2ef"/>

  <text x="60" y="78" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#172033">V1.x 剩余能力地图</text>
  <text x="60" y="108" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="15" fill="#5f6f82">当前 Alpha 证据、缺失实现与外部证明是三种不同状态。</text>

  <g filter="url(#shadow)">
    <rect x="60" y="158" width="310" height="312" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="60" y="158" width="310" height="8" rx="4" fill="#2563eb"/>
    <text x="84" y="203" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#172033">受控 Alpha 边界</text>
    <text x="84" y="244" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">前台 mailbox daemon</text>
    <text x="84" y="271" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">受控 provider 与 MCP</text>
    <text x="84" y="298" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">带门禁的本地 restore mutation</text>
    <text x="84" y="325" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">Simulator hardware evidence</text>
    <text x="84" y="352" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">JSONL 与 OTLP smoke</text>
    <text x="84" y="379" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">未签名 package 与 gate</text>
    <rect x="84" y="414" width="262" height="34" rx="6" fill="#dbeafe"/>
    <text x="107" y="436" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#1d4ed8">可调用 + Library + Fixture Evidence</text>
  </g>

  <path d="M370 314 H430" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>

  <g filter="url(#shadow)">
    <rect x="445" y="158" width="310" height="312" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="445" y="158" width="310" height="8" rx="4" fill="#dc2626"/>
    <text x="469" y="203" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#172033">生产代码缺口</text>
    <text x="469" y="244" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">后台 worker 与 service</text>
    <text x="469" y="271" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">真实 PID supervision 与 restart</text>
    <text x="469" y="298" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">MCP TLS 与 streaming</text>
    <text x="469" y="325" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">真实 backup、KMS 与 handoff</text>
    <text x="469" y="352" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">Driver 与 OS hotplug</text>
    <text x="469" y="379" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">DB、scheduler 与 signing tool</text>
    <rect x="469" y="414" width="262" height="34" rx="6" fill="#fee2e2"/>
    <text x="542" y="436" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#b91c1c">仍需实现</text>
  </g>

  <path d="M830 314 H770" fill="none" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow-purple)"/>

  <g filter="url(#shadow)">
    <rect x="830" y="158" width="310" height="312" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="830" y="158" width="310" height="8" rx="4" fill="#7c3aed"/>
    <text x="854" y="203" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#172033">外部前置条件</text>
    <text x="854" y="244" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">平台 service host</text>
    <text x="854" y="271" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">Hardware 或 virtual fixture</text>
    <text x="854" y="298" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">KMS、OIDC 与签名身份</text>
    <text x="854" y="325" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">Package repository 权限</text>
    <text x="854" y="352" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">Database 与 backend 选型</text>
    <text x="854" y="379" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" fill="#172033">选定的外部 MCP server</text>
    <rect x="854" y="414" width="262" height="34" rx="6" fill="#f3e8ff"/>
    <text x="918" y="436" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#6d28d9">需要环境实测证据</text>
  </g>

  <rect x="60" y="510" width="1080" height="58" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="84" y="545" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#9a3412">ready_with_external_blockers 是 Alpha checklist 结果，不代表生产就绪。</text>
</svg>
