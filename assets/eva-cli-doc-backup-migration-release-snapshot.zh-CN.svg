<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">备份、迁移包与 Release Snapshot 文档插图</title>
  <desc id="desc">备份、迁移包与 Release Snapshot 的双语本地化 SVG 插图。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d7dee8; stroke-width: 1.5; }
      .title { font: 800 36px Inter, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #111827; }
      .subtitle { font: 400 17px Inter, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #526070; }
      .eyebrow { font: 700 13px Inter, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #64748b; letter-spacing: .04em; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.3; }
      .card-label { font: 700 15px Inter, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #172033; }
      .card-small { font: 400 12px Inter, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #64748b; }
      .pill { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; }
      .pill-label { font: 700 14px Inter, "Segoe UI", Arial, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #253044; }
      .line { stroke: #94a3b8; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .accent { fill: #c2410c; }
      .warm { fill: #0f766e; }
      .muted { fill: #e2e8f0; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c2410c" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0f766e" stop-opacity="0.13"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="1200" height="675"/>
  <rect class="panel" x="30" y="30" width="1140" height="615" rx="14"/>
  <rect x="30" y="30" width="1140" height="190" rx="14" fill="url(#header)"/>
  <path d="M30 206 H1170" stroke="#d7dee8" stroke-width="1.5"/>

  <text class="eyebrow" x="64" y="78">EVA-CLI DOCS / 中文</text>
  <text class="title" x="64" y="124"><tspan x="64" dy="0">备份、迁移包与 Release</tspan><tspan x="64" dy="40">Snapshot</tspan></text>
  <text class="subtitle" x="64" y="198"><tspan x="64" dy="0">在备份、迁移、恢复或发布前验证产物。</tspan></text>

  <g transform="translate(780 68)">
    <rect x="0" y="0" width="300" height="105" rx="12" fill="#ffffff" opacity="0.88" stroke="#cbd5e1"/>
    <circle class="accent" cx="54" cy="53" r="27" opacity="0.9"/>
    <circle class="warm" cx="111" cy="53" r="27" opacity="0.82"/>
    <rect class="muted" x="159" y="31" width="94" height="12" rx="6"/>
    <rect class="muted" x="159" y="55" width="68" height="12" rx="6"/>
    <rect class="muted" x="159" y="79" width="106" height="12" rx="6"/>
  </g>

  <text class="eyebrow" x="74" y="254">核心流向</text>
  <g>
      <rect class="card" x="74" y="286" width="172" height="82" rx="8"/>
      <circle cx="104" cy="327" r="16" fill="#c2410c" opacity="0.92"/>
      <text class="card-label" x="132" y="324">备份范围</text>
      <text class="card-small" x="132" y="347">受控边界</text>
    </g>
<g>
      <rect class="card" x="282" y="286" width="172" height="82" rx="8"/>
      <circle cx="312" cy="327" r="16" fill="#0f766e" opacity="0.92"/>
      <text class="card-label" x="340" y="324">迁移包</text>
      <text class="card-small" x="340" y="347">受控边界</text>
    </g>
<g>
      <rect class="card" x="490" y="286" width="172" height="82" rx="8"/>
      <circle cx="520" cy="327" r="16" fill="#64748b" opacity="0.92"/>
      <text class="card-label" x="548" y="324">Release snapshot</text>
      <text class="card-small" x="548" y="347">受控边界</text>
    </g>
  <path class="line" d="M248 327 H278"/>
  <path class="line" d="M456 327 H486"/>

  <path class="line" d="M568 368 C615 398 665 420 732 431"/>
  <g>
    <rect x="726" y="390" width="318" height="98" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.3"/>
    <text class="card-label" x="756" y="426">可验证输出</text>
    <text class="card-small" x="756" y="453">边界清晰、状态可追踪、决策可复核</text>
  </g>

  <text class="eyebrow" x="74" y="442">关键产物</text>
  <g>
      <rect class="pill" x="146" y="470" width="142" height="42" rx="21"/>
      <text class="pill-label" x="217" y="496" text-anchor="middle">验证</text>
    </g>
<g>
      <rect class="pill" x="340" y="470" width="142" height="42" rx="21"/>
      <text class="pill-label" x="411" y="496" text-anchor="middle">存储</text>
    </g>
<g>
      <rect class="pill" x="534" y="470" width="142" height="42" rx="21"/>
      <text class="pill-label" x="605" y="496" text-anchor="middle">恢复</text>
    </g>
</svg>
