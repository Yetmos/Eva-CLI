<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">V1.x 生产就绪路径</title>
  <desc id="desc">证据完整性直接支撑分发，Runtime 地基则分叉为 Provider、状态、平台与数据工作，最后汇聚到生产闭环。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="132%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#172033" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#f6f8fb"/>
  <rect x="24" y="24" width="1152" height="572" rx="8" fill="#ffffff" stroke="#d9e2ef"/>

  <text x="60" y="78" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#172033">V1.x 生产就绪路径</text>
  <text x="60" y="108" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="15" fill="#5f6f82">证据完整性直接支撑分发；运行时地基分叉为独立执行工作线，最终汇聚到生产闭环。</text>

  <g filter="url(#shadow)">
    <rect x="45" y="165" width="205" height="300" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="45" y="165" width="205" height="8" rx="4" fill="#2563eb"/>
    <text x="65" y="207" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#172033">0. Evidence Integrity</text>
    <text x="65" y="248" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">声明与实测分离</text>
    <text x="65" y="275" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">Commit 与 Environment</text>
    <text x="65" y="302" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">Timestamp 与 Executor</text>
    <text x="65" y="329" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">Artifact 与 Config Digest</text>
    <text x="65" y="356" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">缺少证明时阻断</text>
    <rect x="65" y="406" width="165" height="34" rx="6" fill="#dbeafe"/>
    <text x="147" y="428" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#1d4ed8">W0</text>
  </g>

  <path d="M250 315 H290" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="300" y="165" width="205" height="300" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="300" y="165" width="205" height="8" rx="4" fill="#0f766e"/>
    <text x="320" y="207" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#172033">1. Runtime 地基</text>
    <text x="320" y="248" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">后台 Worker</text>
    <text x="320" y="275" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">Task 与 Agent Handler</text>
    <text x="320" y="302" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">Liveness 与 Lock Repair</text>
    <text x="320" y="329" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">OS Service Adapter</text>
    <text x="320" y="356" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">Boot 与 Crash Recovery</text>
    <rect x="320" y="406" width="165" height="34" rx="6" fill="#ccfbf1"/>
    <text x="402" y="428" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#0f766e">W1 + W2</text>
  </g>

  <path d="M505 260 H540 V199 H565" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M505 315 H565" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M147 465 V488 H545 V429 H565" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="575" y="154" width="320" height="90" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="575" y="154" width="320" height="7" rx="4" fill="#7c3aed"/>
    <text x="595" y="186" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#172033">W3-W4  Provider + MCP</text>
    <text x="595" y="214" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#526174">真实 PID Lifecycle、Restart、Isolation</text>
    <text x="595" y="234" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#526174">HTTPS/TLS、Streaming、外部 Server</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="575" y="269" width="320" height="90" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="575" y="269" width="320" height="7" rx="4" fill="#d97706"/>
    <text x="595" y="301" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#172033">W5-W8  状态、平台与数据</text>
    <text x="595" y="329" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#526174">Backup/Handoff、Config、Hardware</text>
    <text x="595" y="349" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#526174">Memory Scheduling、OTel、Database</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="575" y="384" width="320" height="90" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="575" y="384" width="320" height="7" rx="4" fill="#be185d"/>
    <text x="595" y="416" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#172033">W9  Distribution</text>
    <text x="595" y="444" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#526174">Credential 之前先做 Metadata Dry-run</text>
    <text x="595" y="464" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#526174">Signing、Attestation、Upload、Verify</text>
  </g>

  <path d="M895 199 H920 V260 H940" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M895 314 H940" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M895 429 H920 V370 H940" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="950" y="165" width="205" height="300" rx="8" fill="#ffffff" stroke="#b8c8dc"/>
    <rect x="950" y="165" width="205" height="8" rx="4" fill="#15803d"/>
    <text x="970" y="207" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#172033">Production Closure</text>
    <text x="970" y="248" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">限定 Release Target</text>
    <text x="970" y="275" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">环境实测证明</text>
    <text x="970" y="302" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">Failure 与 Recovery Drill</text>
    <text x="970" y="329" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">Rollback Evidence</text>
    <text x="970" y="356" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#172033">发布决策</text>
    <rect x="970" y="406" width="165" height="34" rx="6" fill="#dcfce7"/>
    <text x="1052" y="428" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#166534">W10</text>
  </g>

  <rect x="45" y="520" width="1110" height="56" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="69" y="544" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#9a3412">版本规则</text>
  <text x="69" y="565" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, sans-serif" font-size="13" fill="#7c2d12">本文不分配 target release number；legacy V1.12-V1.17 标签继续作为内部 evidence ID。</text>
</svg>
