<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680" role="img" aria-labelledby="title desc">
  <title id="title">Eva-CLI architecture and harness boundary</title>
  <desc id="desc">A diagram comparing the product runtime architecture with the harness architecture that drives scenarios, doubles external capabilities, observes traces, and verifies contracts.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#1e3a8a"/>
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#172033" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1180" height="680" fill="#f7f9fc"/>
  <rect x="28" y="28" width="1124" height="624" rx="18" fill="#ffffff" stroke="#dce5f1"/>

  <text x="60" y="78" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#172033">Architecture thinking: runtime and harness</text>
  <text x="60" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#617086">Eva-CLI should turn design documents into executable contracts through a narrow, observable harness layer.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="148" width="500" height="432" rx="12" fill="#eef6ff" stroke="#c6d4e5"/>
    <text x="92" y="190" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" fill="#1e3a8a">Product runtime architecture</text>
    <text x="92" y="218" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#617086">Owns authority, state, routing, capabilities, recovery, and audit.</text>

    <rect x="92" y="252" width="188" height="76" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="116" y="284" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">Rust Runtime</text>
    <text x="116" y="308" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#617086">policy, schemas, I/O</text>

    <rect x="332" y="252" width="188" height="76" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="356" y="284" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">EventBus</text>
    <text x="356" y="308" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#617086">typed Topic events</text>

    <rect x="92" y="363" width="188" height="76" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="116" y="395" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">Scheduler</text>
    <text x="116" y="419" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#617086">private Agent queues</text>

    <rect x="332" y="363" width="188" height="76" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="356" y="395" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">Lua Agents</text>
    <text x="356" y="419" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#617086">hot-reload behavior</text>

    <rect x="92" y="474" width="188" height="76" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="116" y="506" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">AdapterRegistry</text>
    <text x="116" y="530" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#617086">external capabilities</text>

    <rect x="332" y="474" width="188" height="76" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="356" y="506" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">Memory and Release</text>
    <text x="356" y="530" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#617086">context, snapshots</text>

    <path d="M280 290 H332" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M426 328 V363" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M332 401 H280" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M186 439 V474" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M280 512 H332" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="148" width="500" height="432" rx="12" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="652" y="190" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" fill="#115e59">Harness architecture</text>
    <text x="652" y="218" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#617086">Drives scenarios, replaces external edges, observes evidence, and verifies contracts.</text>

    <rect x="652" y="252" width="188" height="76" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="676" y="284" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">Scenario Pack</text>
    <text x="676" y="308" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#617086">fixtures, inputs, policy</text>

    <rect x="892" y="252" width="188" height="76" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="916" y="284" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">Runtime Sandbox</text>
    <text x="916" y="308" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#617086">temp state, no secrets</text>

    <rect x="652" y="363" width="188" height="76" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="676" y="395" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">Capability Doubles</text>
    <text x="676" y="419" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#617086">mock adapters, tools</text>

    <rect x="892" y="363" width="188" height="76" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="916" y="395" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">Observer</text>
    <text x="916" y="419" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#617086">trace, audit, events</text>

    <rect x="652" y="474" width="188" height="76" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="676" y="506" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">Replay Engine</text>
    <text x="676" y="530" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#617086">deterministic history</text>

    <rect x="892" y="474" width="188" height="76" rx="10" fill="#ffffff" stroke="#c6d4e5"/>
    <text x="916" y="506" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">Verifier</text>
    <text x="916" y="530" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#617086">assert invariants</text>

    <path d="M840 290 H892" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M986 328 V363" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M892 401 H840" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M746 439 V474" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M840 512 H892" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arrow)"/>
  </g>

  <path d="M560 364 H620" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="478" y="606" width="224" height="26" rx="13" fill="#ede9fe"/>
  <text x="501" y="624" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" fill="#5b21b6">Harness turns architecture into proof.</text>
</svg>
