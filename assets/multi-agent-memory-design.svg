<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Multi-Agent Memory Design</title>
  <desc id="desc">Diagram showing private Agent memory, a runtime-owned project memory module, layered short-term, long-term, and important memory, and a controlled promotion path.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 700 31px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
      .subtitle { font: 400 15px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #617086; }
      .section { font: 700 18px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
      .label { font: 700 15px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
      .small { font: 400 12px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #435466; }
      .tiny { font: 400 11px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #617086; }
      .mono { font: 600 12px Menlo, Consolas, monospace; fill: #435466; }
      .boundary { fill: #ffffff; stroke: #c6d4e5; stroke-width: 1.7; rx: 8; }
      .runtime { fill: #fdfefe; stroke: #2563eb; stroke-width: 2.2; stroke-dasharray: 9 7; rx: 8; }
      .agent { fill: #eef5ff; stroke: #76a7f4; stroke-width: 1.8; rx: 8; }
      .private { fill: #edf8f2; stroke: #6ec191; stroke-width: 1.7; rx: 8; }
      .project { fill: #ffffff; stroke: #aab7c7; stroke-width: 1.8; rx: 8; }
      .short { fill: #fff8e7; stroke: #dfb052; stroke-width: 1.8; rx: 8; }
      .long { fill: #eef5ff; stroke: #76a7f4; stroke-width: 1.8; rx: 8; }
      .important { fill: #f5f0ff; stroke: #a989e8; stroke-width: 1.8; rx: 8; }
      .guard { fill: #fff0f0; stroke: #e28787; stroke-width: 1.7; rx: 8; }
      .context { fill: #f4f6f8; stroke: #b7c1cc; stroke-width: 1.6; rx: 8; }
      .pill { fill: #ffffff; stroke: #ccd5df; stroke-width: 1.1; rx: 13; }
      .arrow { stroke: #334155; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .arrow-blue { stroke: #2563eb; stroke-width: 2.3; fill: none; marker-end: url(#arrow-blue); }
      .arrow-green { stroke: #218455; stroke-width: 2.2; fill: none; marker-end: url(#arrow-green); }
      .arrow-amber { stroke: #af7600; stroke-width: 2.2; fill: none; marker-end: url(#arrow-amber); }
      .arrow-dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow-gray); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#218455"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#af7600"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="title" x="48" y="56">Multi-Agent Memory Design</text>
  <text class="subtitle" x="48" y="84">Private Agent memories feed a runtime-owned project memory module</text>
  <text class="subtitle" x="48" y="104">through explicit promotion and retrieval policy.</text>

  <rect class="runtime" x="36" y="112" width="1128" height="596"/>
  <text class="section" x="64" y="148">Rust Runtime Boundary</text>
  <text class="small" x="64" y="171">policy, permissions, provenance, compaction, and audit</text>

  <rect class="boundary" x="70" y="182" width="275" height="338"/>
  <text class="section" x="96" y="218">Agent-owned memory</text>
  <rect class="agent" x="96" y="244" width="218" height="60"/>
  <text class="label" x="132" y="270">Agent A</text>
  <text class="small" x="132" y="289">planner / local task history</text>
  <circle cx="116" cy="274" r="12" fill="#2563eb"/>
  <rect class="private" x="96" y="324" width="218" height="58"/>
  <text class="label" x="127" y="349">Private Memory A</text>
  <text class="small" x="124" y="368">preferences, observations</text>
  <rect class="agent" x="96" y="404" width="218" height="60"/>
  <text class="label" x="132" y="430">Agent B</text>
  <text class="small" x="132" y="449">executor / capability notes</text>
  <circle cx="116" cy="434" r="12" fill="#0f766e"/>
  <rect class="private" x="96" y="482" width="218" height="58"/>
  <text class="label" x="127" y="507">Private Memory B</text>
  <text class="small" x="126" y="526">local assumptions, feedback</text>

  <rect class="guard" x="405" y="244" width="190" height="140"/>
  <text class="label" x="456" y="273">Promotion</text>
  <text class="small" x="433" y="298">source Agent</text>
  <text class="small" x="433" y="319">evidence + confidence</text>
  <text class="small" x="433" y="340">freshness + reason</text>
  <rect class="pill" x="424" y="356" width="152" height="28"/>
  <text class="tiny" x="442" y="374">policy decides layer</text>

  <rect class="project" x="645" y="182" width="440" height="374"/>
  <text class="section" x="676" y="218">Project Memory Module</text>
  <text class="small" x="676" y="242">Shared workspace memory, owned by the runtime</text>

  <rect class="short" x="676" y="270" width="378" height="68"/>
  <text class="label" x="705" y="296">Short-term memory</text>
  <text class="small" x="705" y="317">active goals, recent tool output, open questions</text>

  <rect class="long" x="676" y="360" width="378" height="68"/>
  <text class="label" x="705" y="386">Long-term memory</text>
  <text class="small" x="705" y="407">repository conventions, decisions, stable workflows</text>

  <rect class="important" x="676" y="450" width="378" height="68"/>
  <text class="label" x="705" y="476">Important memory</text>
  <text class="small" x="705" y="497">security rules, hard limits, user-level preferences</text>

  <rect class="context" x="246" y="586" width="708" height="72"/>
  <text class="label" x="282" y="615">ContextBuilder creates a compact context pack</text>
  <text class="small" x="282" y="638">required constraints, likely useful facts, open questions, and sources</text>
  <text class="mono" x="724" y="615">important → long-term → private → short-term</text>

  <path class="arrow-green" d="M 314 354 C 370 354 370 314 405 314"/>
  <path class="arrow-green" d="M 314 512 C 370 512 370 344 405 344"/>
  <path class="arrow-amber" d="M 595 314 C 632 314 632 304 676 304"/>
  <path class="arrow-blue" d="M 595 326 C 630 372 632 394 676 394"/>
  <path class="arrow-blue" d="M 595 338 C 632 438 632 484 676 484"/>
  <path class="arrow-dash" d="M 865 518 C 854 572 780 586 724 586"/>
  <path class="arrow-dash" d="M 865 428 C 852 548 720 586 666 586"/>
  <path class="arrow-dash" d="M 865 338 C 850 520 640 586 608 586"/>
  <path class="arrow-dash" d="M 205 540 C 250 595 280 586 330 586"/>

  <rect class="pill" x="378" y="420" width="250" height="34"/>
  <text class="small" x="397" y="442">Conflicts stay as claims until evidence resolves them</text>

  <rect class="context" x="70" y="556" width="178" height="56"/>
  <text class="label" x="98" y="581">Search input</text>
  <text class="small" x="94" y="600">topic, tags, task, Agent</text>

  <rect class="context" x="954" y="586" width="160" height="72"/>
  <text class="label" x="986" y="615">Agent run</text>
  <text class="small" x="985" y="638">uses context pack</text>
  <path class="arrow" d="M 954 622 L 1114 622"/>
</svg>
