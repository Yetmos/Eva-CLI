<!doctype html>
<html lang="{{lang}}" dir="{{dir}}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <meta name="description" content="{{description}}">
    <meta name="author" content="Yetmos">
    <meta property="og:title" content="{{title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{canonicalUrl}}">
    <meta property="article:published_time" content="{{date}}">
    <meta property="article:section" content="{{categoryName}}">
    <meta name="twitter:card" content="summary">
    <link rel="canonical" href="{{canonicalUrl}}">
{{alternateLinks}}
    <link rel="icon" type="image/svg+xml" href="{{assetPrefix}}assets/eva-cli-logo.svg">
    <link rel="stylesheet" href="{{assetPrefix}}styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{homeUrl}}" aria-label="Eva-CLI home">
        <img src="{{assetPrefix}}assets/eva-cli-logo.svg" alt="" class="brand-mark">
        <span class="brand-copy">
          <span class="brand-name">Eva-CLI</span>
          <span class="brand-tagline">{{brandTagline}}</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="{{navLabel}}">
{{navLinks}}
      </nav>
{{languageSwitch}}
    </header>

    <main class="blog-page">
      <article class="blog-article">
        <header class="blog-article-header">
          <p class="eyebrow">{{heroEyebrow}}</p>
          <h1>{{postTitle}}</h1>
          <p class="blog-lead">{{postDescription}}</p>
          <div class="blog-meta">
            <span>{{dateLabel}} <time datetime="{{date}}">{{date}}</time></span>
            <a href="{{categoryHref}}">{{categoryLabel}} {{categoryName}}</a>
          </div>
        </header>
        <div class="blog-content">
{{content}}
        </div>
        <footer class="blog-article-footer">
          <a class="secondary-action" href="{{blogIndexHref}}">{{backToBlog}}</a>
        </footer>
      </article>
    </main>

    <footer class="site-footer">
      <span>{{footerAuthor}} <a href="https://github.com/Yetmos">Yetmos</a></span>
      <span>{{footerFeedback}} <a href="mailto:iyetmos@gmail.com">iyetmos@gmail.com</a></span>
      <a href="{{feedbackUrl}}">{{footerSubmit}}</a>
    </footer>
  </body>
</html>
