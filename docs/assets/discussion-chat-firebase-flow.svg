<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Discussion chat message, notification, and deletion flow</title>
  <desc id="desc">Flow for first login, sending messages, updating conversation projections, sending FCM notifications, group invite joins, anonymous mode, and account deletion.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 8; }
      .step { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; rx: 8; }
      .fn { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; rx: 8; }
      .store { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; rx: 8; }
      .danger { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; rx: 8; }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .laneText { font: 700 14px Arial, sans-serif; fill: #475569; }
      .label { font: 700 13px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 11px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 1.9; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.7; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="48" y="50">Chat Flow: Login, Message, Invite, Anonymous Mode, Deletion</text>

  <rect class="lane" x="48" y="90" width="1184" height="92"/>
  <text class="laneText" x="68" y="118">First login</text>
  <rect class="step" x="180" y="112" width="150" height="48"/>
  <text class="label" x="211" y="134">GitHub sign-in</text>
  <text class="small" x="214" y="150">Firebase Auth</text>
  <rect class="fn" x="410" y="112" width="170" height="48"/>
  <text class="label" x="441" y="134">ensureUserProfile</text>
  <text class="small" x="432" y="150">assign Chinese name</text>
  <rect class="store" x="660" y="112" width="170" height="48"/>
  <text class="label" x="697" y="134">users/{uid}</text>
  <text class="small" x="686" y="150">profile and settings</text>

  <rect class="lane" x="48" y="210" width="1184" height="120"/>
  <text class="laneText" x="68" y="238">Send message</text>
  <rect class="step" x="150" y="248" width="150" height="48"/>
  <text class="label" x="178" y="270">Composer input</text>
  <text class="small" x="171" y="286">text, image, sticker</text>
  <rect class="fn" x="360" y="248" width="150" height="48"/>
  <text class="label" x="396" y="270">sendMessage</text>
  <text class="small" x="388" y="286">member and rate check</text>
  <rect class="store" x="570" y="248" width="150" height="48"/>
  <text class="label" x="600" y="270">message doc</text>
  <text class="small" x="592" y="286">sender snapshot</text>
  <rect class="store" x="780" y="248" width="160" height="48"/>
  <text class="label" x="820" y="270">session fanout</text>
  <text class="small" x="806" y="286">last message, unread</text>
  <rect class="step" x="1000" y="248" width="150" height="48"/>
  <text class="label" x="1032" y="270">Realtime UI</text>
  <text class="small" x="1024" y="286">Firestore listener</text>
  <rect class="step" x="1000" y="302" width="150" height="22"/>
  <text class="small" x="1024" y="317">FCM if background</text>

  <rect class="lane" x="48" y="358" width="1184" height="104"/>
  <text class="laneText" x="68" y="386">Group invite and anonymous mode</text>
  <rect class="fn" x="210" y="396" width="160" height="48"/>
  <text class="label" x="246" y="418">createInvite</text>
  <text class="small" x="232" y="434">store token hash</text>
  <rect class="step" x="440" y="396" width="160" height="48"/>
  <text class="label" x="476" y="418">Share link</text>
  <text class="small" x="468" y="434">token in URL</text>
  <rect class="fn" x="670" y="396" width="170" height="48"/>
  <text class="label" x="705" y="418">acceptInvite</text>
  <text class="small" x="690" y="434">member and session</text>
  <rect class="fn" x="910" y="396" width="170" height="48"/>
  <text class="label" x="944" y="418">anonymous mode</text>
  <text class="small" x="934" y="434">per-group alias</text>

  <rect class="lane" x="48" y="490" width="1184" height="140"/>
  <text class="laneText" x="68" y="518">Account deletion</text>
  <rect class="danger" x="142" y="550" width="150" height="48"/>
  <text class="label" x="179" y="572">Re-auth</text>
  <text class="small" x="168" y="588">recent login required</text>
  <rect class="danger" x="342" y="550" width="150" height="48"/>
  <text class="label" x="372" y="572">deleteAccount</text>
  <text class="small" x="368" y="588">idempotent job</text>
  <rect class="danger" x="542" y="550" width="150" height="48"/>
  <text class="label" x="570" y="572">Delete owned data</text>
  <text class="small" x="570" y="588">docs, media, RTDB</text>
  <rect class="danger" x="742" y="550" width="150" height="48"/>
  <text class="label" x="773" y="572">Delete Auth user</text>
  <text class="small" x="774" y="588">final identity removal</text>
  <rect class="store" x="942" y="550" width="150" height="48"/>
  <text class="label" x="972" y="572">Job result</text>
  <text class="small" x="966" y="588">counts and status</text>

  <path class="arrow" d="M330 136 L406 136"/>
  <path class="arrow" d="M580 136 L656 136"/>
  <path class="arrow" d="M300 272 L356 272"/>
  <path class="arrow" d="M510 272 L566 272"/>
  <path class="arrow" d="M720 272 L776 272"/>
  <path class="arrow" d="M940 272 L996 272"/>
  <path class="dash" d="M860 296 L860 313 L996 313"/>
  <path class="arrow" d="M370 420 L436 420"/>
  <path class="arrow" d="M600 420 L666 420"/>
  <path class="dash" d="M840 420 L906 420"/>
  <path class="arrow" d="M292 574 L338 574"/>
  <path class="arrow" d="M492 574 L538 574"/>
  <path class="arrow" d="M692 574 L738 574"/>
  <path class="arrow" d="M892 574 L938 574"/>
</svg>
