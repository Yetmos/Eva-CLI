<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">当前 Topic 路由配置流</title>
  <desc id="desc">当前只读 Topic 路由流程，从 routes 配置经过 schema 加载和目标校验进入 ProjectConfig、Scheduler SubscriptionTable 与 Agent mailbox。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#475569"/></marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#2563eb"/></marker>
    <style>
      text{font-family:Inter,"Segoe UI","Microsoft YaHei",sans-serif;fill:#172033}.title{font-size:29px;font-weight:700}.subtitle{font-size:14px;fill:#526174}
      .label{font-size:13px;font-weight:700}.small{font-size:11px;fill:#526174}.section{font-size:15px;font-weight:700}
      .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.blue{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5}
      .green{fill:#ecfdf5;stroke:#22a06b;stroke-width:1.5}.orange{fill:#fff7ed;stroke:#ea8a1f;stroke-width:1.5}
      .purple{fill:#f5f3ff;stroke:#7c5ce7;stroke-width:1.5}.line{fill:none;stroke:#475569;stroke-width:2;marker-end:url(#arrow)}
      .read{fill:none;stroke:#2563eb;stroke-width:2;stroke-dasharray:7 6;marker-end:url(#arrow-blue)}
    </style>
  </defs>
  <rect width="1200" height="680" fill="#ffffff"/>
  <text class="title" x="38" y="46">Topic 路由：当前只读流程</text>
  <text class="subtitle" x="38" y="72">配置的 route_file 是运行时事实源；启动与诊断只校验和读取，不会自动改写。</text>

  <g>
    <rect class="blue" x="20" y="126" width="130" height="100" rx="7"/><text class="label" x="85" y="156" text-anchor="middle">config.route_file</text><text class="small" x="85" y="180" text-anchor="middle">通常为 config/routes/</text><text class="small" x="85" y="198" text-anchor="middle">topics.yaml</text>
    <rect class="green" x="170" y="126" width="130" height="100" rx="7"/><text class="label" x="235" y="156" text-anchor="middle">Schema 门禁</text><text class="small" x="235" y="180" text-anchor="middle">routes.schema.json</text><text class="small" x="235" y="198" text-anchor="middle">严格字段</text>
    <rect class="green" x="320" y="126" width="130" height="100" rx="7"/><text class="label" x="385" y="156" text-anchor="middle">强类型加载</text><text class="small" x="385" y="180" text-anchor="middle">RouteConfig</text><text class="small" x="385" y="198" text-anchor="middle">RouteRule</text>
    <rect class="orange" x="470" y="126" width="130" height="100" rx="7"/><text class="label" x="535" y="156" text-anchor="middle">目标校验</text><text class="small" x="535" y="180" text-anchor="middle">Agent ID 存在</text><text class="small" x="535" y="198" text-anchor="middle">不检查 enabled</text>
    <rect class="blue" x="620" y="126" width="130" height="100" rx="7"/><text class="label" x="685" y="156" text-anchor="middle">ProjectConfig</text><text class="small" x="685" y="180" text-anchor="middle">routes</text><text class="small" x="685" y="198" text-anchor="middle">已校验模型</text>
    <rect class="purple" x="770" y="126" width="130" height="100" rx="7"/><text class="label" x="835" y="156" text-anchor="middle">运行时映射</text><text class="small" x="835" y="180" text-anchor="middle">RoutingRule</text><text class="small" x="835" y="198" text-anchor="middle">DeliveryMode</text>
    <rect class="purple" x="920" y="126" width="130" height="100" rx="7"/><text class="label" x="985" y="156" text-anchor="middle">SubscriptionTable</text><text class="small" x="985" y="180" text-anchor="middle">TopicPattern</text><text class="small" x="985" y="198" text-anchor="middle">fanout / compete</text>
    <rect class="orange" x="1070" y="126" width="110" height="100" rx="7"/><text class="label" x="1125" y="156" text-anchor="middle">Mailbox</text><text class="small" x="1125" y="180" text-anchor="middle">DeliveryPlan</text><text class="small" x="1125" y="198" text-anchor="middle">Agent 队列</text>
    <path class="line" d="M150 176H170"/><path class="line" d="M300 176H320"/><path class="line" d="M450 176H470"/><path class="line" d="M600 176H620"/><path class="line" d="M750 176H770"/><path class="line" d="M900 176H920"/><path class="line" d="M1050 176H1070"/>
  </g>

  <rect class="panel" x="20" y="276" width="1160" height="164" rx="8"/>
  <text class="section" x="42" y="308">已实现的只读诊断</text>
  <rect class="green" x="52" y="334" width="300" height="76" rx="7"/><text class="label" x="202" y="364" text-anchor="middle">eva config validate</text><text class="small" x="202" y="388" text-anchor="middle">加载 schema、manifest、policy 与 routes</text>
  <rect class="blue" x="450" y="334" width="300" height="76" rx="7"/><text class="label" x="600" y="364" text-anchor="middle">eva inspect routes</text><text class="small" x="600" y="388" text-anchor="middle">输出已校验的 ProjectConfig 路由视图</text>
  <rect class="purple" x="848" y="334" width="300" height="76" rx="7"/><text class="label" x="998" y="364" text-anchor="middle">Scheduler 路由</text><text class="small" x="998" y="388" text-anchor="middle">直接 Agent target 优先于 Topic 匹配</text>
  <path class="read" d="M202 334V252H385V226"/><path class="read" d="M600 334V252H685V226"/><path class="read" d="M998 334V252H985V226"/>

  <rect class="blue" x="20" y="480" width="560" height="132" rx="8"/>
  <text class="section" x="42" y="514">配置路由所有权</text>
  <text class="small" x="42" y="543">只有显式编辑 route_file 才会改变 runtime 使用的配置路由源。</text>
  <text class="small" x="42" y="568">Runtime 启动、热加载、校验与 inspect 操作都保持只读。</text>
  <text class="small" x="42" y="593">当前仓库没有 route proposal、sync、preview 或 write 命令。</text>

  <rect class="orange" x="620" y="480" width="560" height="132" rx="8"/>
  <text class="section" x="642" y="514">投递语义</text>
  <text class="small" x="642" y="543">TopicPattern 选择匹配规则；显式 EventTarget::Agent 绕过 Topic 规则。</text>
  <text class="small" x="642" y="568">fanout 展开到全部配置 Agent；compete 选择第一个配置目标。</text>
  <text class="small" x="642" y="593">没有匹配路由或已注册 Agent 时，mailbox 投递返回结构化错误。</text>
  <text class="small" x="38" y="650">事实源：当前 eva-config、eva-runtime、eva-scheduler 与 eva-cli 实现。</text>
</svg>
