<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="900" viewBox="0 0 1320 900" role="img" aria-labelledby="title desc">
  <title id="title">Eva-CLI 当前运行路径</title>
  <desc id="desc">三条相互独立的已实现路径：basic 内存 Agent 事件路径、外部 provider 执行路径、持久化 daemon 与运维路径；它们不是一条共享的 EventBus 流水线。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#475569"/></marker>
    <style>
      text{font-family:Inter,"Segoe UI","Microsoft YaHei",sans-serif;fill:#172033}.title{font-size:29px;font-weight:700}.subtitle{font-size:14px;fill:#526174}
      .section{font-size:16px;font-weight:700}.label{font-size:13px;font-weight:700}.small{font-size:11px;fill:#526174}.tiny{font-size:11px;fill:#64748b}
      .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.blue{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5}
      .green{fill:#ecfdf5;stroke:#22a06b;stroke-width:1.5}.orange{fill:#fff7ed;stroke:#ea8a1f;stroke-width:1.5}
      .purple{fill:#f5f3ff;stroke:#7c5ce7;stroke-width:1.5}.rose{fill:#fff1f2;stroke:#e25572;stroke-width:1.5}
      .line{fill:none;stroke:#475569;stroke-width:2;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1320" height="900" fill="#ffffff"/>
  <text class="title" x="38" y="46">当前运行路径与模块交接</text>
  <text class="subtitle" x="38" y="72">basic Agent 执行、外部 provider 与持久化运维使用不同入口和状态，是三条独立代码路径。</text>

  <rect class="panel" x="28" y="100" width="1264" height="238" rx="8"/>
  <text class="section" x="50" y="130">1. Basic 内存 Agent 事件路径</text>
  <text class="tiny" x="1268" y="130" text-anchor="end">eva-runtime 中的 run_basic</text>
  <rect class="purple" x="52" y="156" width="170" height="82" rx="7"/><text class="label" x="137" y="187" text-anchor="middle">eva run basic</text><text class="small" x="137" y="210" text-anchor="middle">BasicRunOptions</text>
  <rect class="purple" x="250" y="156" width="170" height="82" rx="7"/><text class="label" x="335" y="187" text-anchor="middle">TaskReport</text><text class="small" x="335" y="210" text-anchor="middle">running + 任务日志</text>
  <rect class="blue" x="448" y="156" width="170" height="82" rx="7"/><text class="label" x="533" y="187" text-anchor="middle">InMemoryEventBus</text><text class="small" x="533" y="210" text-anchor="middle">publish receipt / 死信</text>
  <rect class="blue" x="646" y="156" width="190" height="82" rx="7"/><text class="label" x="741" y="187" text-anchor="middle">Scheduler 表</text><text class="small" x="741" y="210" text-anchor="middle">SubscriptionTable + mailbox</text>
  <rect class="orange" x="864" y="156" width="190" height="82" rx="7"/><text class="label" x="959" y="187" text-anchor="middle">AgentRuntime + LuaHost</text><text class="small" x="959" y="210" text-anchor="middle">运行 handler 并收集结果</text>
  <rect class="orange" x="1082" y="156" width="184" height="82" rx="7"/><text class="label" x="1174" y="187" text-anchor="middle">LuaEventResult</text><text class="small" x="1174" y="210" text-anchor="middle">status · note · context</text>
  <path class="line" d="M222 197H250"/><path class="line" d="M420 197H448"/><path class="line" d="M618 197H646"/><path class="line" d="M836 197H864"/><path class="line" d="M1054 197H1082"/>
  <rect class="green" x="742" y="262" width="250" height="54" rx="7"/><text class="label" x="867" y="284" text-anchor="middle">可选内置 CapabilityRouter</text><text class="small" x="867" y="303" text-anchor="middle">仅 config.lint response</text>
  <rect class="blue" x="1040" y="262" width="226" height="54" rx="7"/><text class="label" x="1153" y="284" text-anchor="middle">BasicRunReport</text><text class="small" x="1153" y="303" text-anchor="middle">结果 + response + 审计</text>
  <path class="line" d="M1174 238V262"/><path class="line" d="M1174 238V250H867V262"/><path class="line" d="M992 289H1040"/>
  <text class="tiny" x="52" y="314">当前行为：LuaEventResult.topic 只进入报告，不会重新 publish；可选 capability response 返回报告，不进入 Scheduler。</text>

  <rect class="panel" x="28" y="362" width="1264" height="202" rx="8"/>
  <text class="section" x="50" y="392">2. 外部 Provider 执行路径</text>
  <text class="tiny" x="1268" y="392" text-anchor="end">不要求经过 EventBus、Scheduler、AgentRuntime 或 LuaHost</text>
  <rect class="purple" x="52" y="422" width="180" height="88" rx="7"/><text class="label" x="142" y="453" text-anchor="middle">Provider 入口</text><text class="small" x="142" y="476" text-anchor="middle">capability · adapter · MCP CLI</text><text class="small" x="142" y="496" text-anchor="middle">或受门禁 MCP surface</text>
  <rect class="green" x="258" y="422" width="190" height="88" rx="7"/><text class="label" x="353" y="453" text-anchor="middle">Capability 门禁</text><text class="small" x="353" y="476" text-anchor="middle">policy + schema + provider plan</text>
  <rect class="rose" x="474" y="422" width="190" height="88" rx="7"/><text class="label" x="569" y="453" text-anchor="middle">Adapter registry</text><text class="small" x="569" y="476" text-anchor="middle">manifest + route + credentials</text>
  <rect class="rose" x="690" y="422" width="190" height="88" rx="7"/><text class="label" x="785" y="453" text-anchor="middle">Provider 执行</text><text class="small" x="785" y="476" text-anchor="middle">AdapterRuntime + Supervisor</text>
  <rect class="orange" x="906" y="422" width="190" height="88" rx="7"/><text class="label" x="1001" y="453" text-anchor="middle">Transport</text><text class="small" x="1001" y="476" text-anchor="middle">builtin · stdio · HTTP · MCP</text><text class="small" x="1001" y="496" text-anchor="middle">EventBus · Skill · Lua · 硬件</text>
  <rect class="blue" x="1122" y="422" width="144" height="88" rx="7"/><text class="label" x="1194" y="453" text-anchor="middle">结果</text><text class="small" x="1194" y="476" text-anchor="middle">结构化 response</text><text class="small" x="1194" y="496" text-anchor="middle">stream + 审计</text>
  <path class="line" d="M232 466H258"/><path class="line" d="M448 466H474"/><path class="line" d="M664 466H690"/><path class="line" d="M880 466H906"/><path class="line" d="M1096 466H1122"/>
  <text class="tiny" x="52" y="542">Provider 状态可以使用 ProviderProcessTable 与审计存储，但 provider 调用不经过 basic Agent 事件闭环。</text>

  <rect class="panel" x="28" y="588" width="1264" height="244" rx="8"/>
  <text class="section" x="50" y="618">3. 持久化 Daemon 与运维路径</text>
  <text class="tiny" x="1268" y="618" text-anchor="end">持久化并恢复操作状态；retry tick 不运行 Agent 或 Lua handler</text>
  <rect class="purple" x="52" y="650" width="190" height="94" rx="7"/><text class="label" x="147" y="681" text-anchor="middle">运维入口</text><text class="small" x="147" y="704" text-anchor="middle">daemon control · task</text><text class="small" x="147" y="724" text-anchor="middle">restore · upgrade · snapshot</text>
  <rect class="blue" x="270" y="650" width="190" height="94" rx="7"/><text class="label" x="365" y="681" text-anchor="middle">DurableBackend</text><text class="small" x="365" y="704" text-anchor="middle">文件系统 layout</text><text class="small" x="365" y="724" text-anchor="middle">或内存实现</text>
  <rect class="blue" x="488" y="650" width="250" height="94" rx="7"/><text class="label" x="613" y="681" text-anchor="middle">持久化 Store</text><text class="small" x="613" y="704" text-anchor="middle">TaskStateStore · EventLog</text><text class="small" x="613" y="724" text-anchor="middle">ProviderProcessTable · AuditSink</text>
  <rect class="orange" x="766" y="650" width="190" height="94" rx="7"/><text class="label" x="861" y="681" text-anchor="middle">恢复协调</text><text class="small" x="861" y="704" text-anchor="middle">task/provider recovery</text><text class="small" x="861" y="724" text-anchor="middle">scheduler retry tick</text>
  <rect class="green" x="984" y="650" width="282" height="94" rx="7"/><text class="label" x="1125" y="681" text-anchor="middle">操作证据</text><text class="small" x="1125" y="704" text-anchor="middle">状态 · mutation 报告 · 回滚证明</text><text class="small" x="1125" y="724" text-anchor="middle">备份 · lifecycle · release 检查</text>
  <path class="line" d="M242 697H270"/><path class="line" d="M460 697H488"/><path class="line" d="M738 697H766"/><path class="line" d="M956 697H984"/>
  <text class="tiny" x="52" y="788">Durable EventLog 与 retry 服务可为重试记账重新发布恢复事件，但 daemon 路径不会执行 Agent mailbox 或 Lua 脚本。</text>
  <text class="tiny" x="38" y="872">边界总结：三条路径共享 eva-core 契约、config、policy、storage 与 observability，但不共享一条强制运行流水线。</text>
</svg>
