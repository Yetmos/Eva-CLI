<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Discussion chat Firebase architecture</title>
  <desc id="desc">Architecture for website discussion chat using Firebase Auth, Cloud Functions, Cloud Messaging, Firestore, Cloud Storage, Realtime Database, Security Rules, and App Check.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .client { fill: #e0f2fe; stroke: #0284c7; }
      .trusted { fill: #dcfce7; stroke: #16a34a; }
      .data { fill: #fef3c7; stroke: #d97706; }
      .guard { fill: #fce7f3; stroke: #db2777; }
      .ops { fill: #ede9fe; stroke: #7c3aed; }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 13px Arial, sans-serif; fill: #475569; }
      .label { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 12px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.8; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="48" y="50">Website Discussion Chat on Firebase</text>
  <text class="subtitle" x="48" y="74">Realtime reads stay client-friendly; privileged writes and deletion stay server-controlled.</text>

  <rect class="panel client" x="48" y="120" width="210" height="110"/>
  <text class="label" x="88" y="152">Website Client</text>
  <text class="small" x="72" y="176">GitHub sign-in</text>
  <text class="small" x="72" y="196">Conversation list</text>
  <text class="small" x="72" y="216">Thread view and composer</text>

  <rect class="panel guard" x="308" y="120" width="210" height="110"/>
  <text class="label" x="366" y="152">App Check</text>
  <text class="small" x="338" y="176">Browser attestation</text>
  <text class="small" x="338" y="196">Function and Storage gate</text>
  <text class="small" x="338" y="216">Abuse reduction</text>

  <rect class="panel trusted" x="568" y="120" width="210" height="110"/>
  <text class="label" x="604" y="152">Firebase Auth</text>
  <text class="small" x="598" y="176">GitHub provider</text>
  <text class="small" x="598" y="196">UID identity</text>
  <text class="small" x="598" y="216">Recent-login checks</text>

  <rect class="panel trusted" x="828" y="120" width="250" height="110"/>
  <text class="label" x="884" y="152">Cloud Functions</text>
  <text class="small" x="858" y="176">sendMessage, invites, groups</text>
  <text class="small" x="858" y="196">anonymous names and fanout</text>
  <text class="small" x="858" y="216">account deletion workflow</text>

  <rect class="panel guard" x="1108" y="120" width="124" height="110"/>
  <text class="label" x="1152" y="152">FCM</text>
  <text class="small" x="1124" y="176">Web Push</text>
  <text class="small" x="1124" y="196">background alerts</text>
  <text class="small" x="1124" y="216">token pruning</text>

  <rect class="panel guard" x="48" y="310" width="210" height="110"/>
  <text class="label" x="92" y="342">Security Rules</text>
  <text class="small" x="72" y="366">member-only reads</text>
  <text class="small" x="72" y="386">narrow direct writes</text>
  <text class="small" x="72" y="406">Storage size and MIME checks</text>

  <rect class="panel data" x="308" y="310" width="230" height="110"/>
  <text class="label" x="360" y="342">Cloud Firestore</text>
  <text class="small" x="338" y="366">users, sessions, threads</text>
  <text class="small" x="338" y="386">members, messages, invites</text>
  <text class="small" x="338" y="406">deletion jobs</text>

  <rect class="panel data" x="588" y="310" width="210" height="110"/>
  <text class="label" x="640" y="342">Cloud Storage</text>
  <text class="small" x="618" y="366">chat images</text>
  <text class="small" x="618" y="386">sticker assets</text>
  <text class="small" x="618" y="406">metadata by owner and thread</text>

  <rect class="panel data" x="848" y="310" width="230" height="110"/>
  <text class="label" x="886" y="342">Realtime Database</text>
  <text class="small" x="878" y="366">presence</text>
  <text class="small" x="878" y="386">typing indicators</text>
  <text class="small" x="878" y="406">connection state</text>

  <rect class="panel ops" x="218" y="520" width="230" height="110"/>
  <text class="label" x="274" y="552">Admin Console</text>
  <text class="small" x="248" y="576">sticker catalog</text>
  <text class="small" x="248" y="596">moderation review</text>
  <text class="small" x="248" y="616">invite revocation</text>

  <rect class="panel ops" x="508" y="520" width="230" height="110"/>
  <text class="label" x="554" y="552">Observability</text>
  <text class="small" x="538" y="576">function errors</text>
  <text class="small" x="538" y="596">send rates</text>
  <text class="small" x="538" y="616">deletion job counts</text>

  <rect class="panel ops" x="798" y="520" width="230" height="110"/>
  <text class="label" x="854" y="552">Emulators</text>
  <text class="small" x="828" y="576">Auth, Firestore, Storage</text>
  <text class="small" x="828" y="596">Functions and rules tests</text>
  <text class="small" x="828" y="616">staging before production</text>

  <path class="arrow" d="M258 175 L304 175"/>
  <path class="arrow" d="M518 175 L564 175"/>
  <path class="arrow" d="M778 175 L824 175"/>
  <path class="arrow" d="M1078 175 L1104 175"/>
  <path class="arrow" d="M953 230 L953 306"/>
  <path class="arrow" d="M828 202 C690 256 604 300 538 344"/>
  <path class="arrow" d="M828 214 C764 256 746 284 720 306"/>
  <path class="arrow" d="M258 365 L304 365"/>
  <path class="dash" d="M153 230 L153 306"/>
  <path class="dash" d="M413 230 L413 306"/>
  <path class="dash" d="M1170 120 C1060 70 250 70 153 116"/>
  <path class="dash" d="M1078 365 C1138 480 1010 520 913 520"/>
  <path class="dash" d="M738 575 L794 575"/>
  <path class="dash" d="M448 575 L504 575"/>
</svg>
