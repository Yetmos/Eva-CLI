<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="700" viewBox="0 0 1180 700" role="img" aria-labelledby="title desc">
  <title id="title">Eva-CLI 从零到完整实现版本路线</title>
  <desc id="desc">展示 Eva-CLI 从 V0 文档基线到 V1.0 核心发布，再到 V1.x 完整能力补齐的实施版本顺序。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 10; }
      .done { fill: #dcfce7; stroke: #16a34a; }
      .now { fill: #e0f2fe; stroke: #0284c7; }
      .next { fill: #fef3c7; stroke: #d97706; }
      .later { fill: #fce7f3; stroke: #db2777; }
      .release { fill: #ede9fe; stroke: #7c3aed; }
      .title { font: 700 24px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 13px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .label { font: 700 15px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .small { font: 400 12px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .tiny { font: 400 11px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="700"/>
  <text class="title" x="48" y="48">Eva-CLI 从零到完整实现版本路线</text>
  <text class="subtitle" x="48" y="72">路线分为核心可发布闭环和 1.x 完整能力补齐；每一版都留下可测试、可审计、可回滚的交付物。</text>

  <rect class="lane" x="40" y="110" width="1100" height="160"/>
  <text class="label" x="62" y="138">核心可发布链路</text>
  <rect class="done" x="80" y="170" width="150" height="64" rx="8"/>
  <text class="label" x="112" y="195">V0.1 基线</text>
  <text class="tiny" x="101" y="216">文档 + workspace</text>
  <rect class="now" x="280" y="170" width="150" height="64" rx="8"/>
  <text class="label" x="309" y="195">V0.2 契约</text>
  <text class="tiny" x="302" y="216">core + config 稳定</text>
  <rect class="next" x="480" y="170" width="150" height="64" rx="8"/>
  <text class="label" x="508" y="195">V0.3 CLI</text>
  <text class="tiny" x="502" y="216">doctor / validate</text>
  <rect class="next" x="680" y="170" width="150" height="64" rx="8"/>
  <text class="label" x="703" y="195">V0.4 闭环</text>
  <text class="tiny" x="697" y="216">EventBus 到 Agent</text>
  <rect class="release" x="880" y="170" width="170" height="64" rx="8"/>
  <text class="label" x="923" y="195">V1.0 发布</text>
  <text class="tiny" x="914" y="216">核心承诺稳定</text>
  <path class="arrow" d="M230 202 H280"/>
  <path class="arrow" d="M430 202 H480"/>
  <path class="arrow" d="M630 202 H680"/>
  <path class="arrow" d="M830 202 H880"/>

  <rect class="lane" x="40" y="305" width="1100" height="160"/>
  <text class="label" x="62" y="333">1.x 完整能力补齐</text>
  <rect class="later" x="90" y="365" width="170" height="64" rx="8"/>
  <text class="label" x="127" y="390">V1.1 扩展</text>
  <text class="tiny" x="115" y="411">Adapter / MCP / Skill</text>
  <rect class="later" x="315" y="365" width="170" height="64" rx="8"/>
  <text class="label" x="349" y="390">V1.2 记忆</text>
  <text class="tiny" x="340" y="411">Memory / Knowledge</text>
  <rect class="later" x="540" y="365" width="170" height="64" rx="8"/>
  <text class="label" x="574" y="390">V1.3 硬件</text>
  <text class="tiny" x="561" y="411">Hotplug / Driver</text>
  <rect class="later" x="765" y="365" width="170" height="64" rx="8"/>
  <text class="label" x="794" y="390">V1.4 恢复</text>
  <text class="tiny" x="791" y="411">Backup / Snapshot</text>
  <rect class="release" x="965" y="365" width="130" height="64" rx="8"/>
  <text class="label" x="998" y="390">V1.5</text>
  <text class="tiny" x="993" y="411">发布加固</text>
  <path class="arrow" d="M260 397 H315"/>
  <path class="arrow" d="M485 397 H540"/>
  <path class="arrow" d="M710 397 H765"/>
  <path class="arrow" d="M935 397 H965"/>

  <path class="dash" d="M965 234 C965 275 175 296 175 365"/>
  <text class="tiny" x="695" y="286">1.0 之后再补齐高阶能力，避免阻塞核心 runtime 发布</text>

  <rect class="lane" x="40" y="505" width="1100" height="130"/>
  <text class="label" x="62" y="533">每版固定完成标准</text>
  <text class="small" x="90" y="565">1. 文档、代码、配置和示例同步更新</text>
  <text class="small" x="90" y="592">2. 新增或变更行为必须有单元测试或集成测试</text>
  <text class="small" x="435" y="565">3. CLI 输出、错误码、trace 和 audit 字段保持稳定</text>
  <text class="small" x="435" y="592">4. 权限扩大、restore、upgrade、硬件绑定先生成计划</text>
  <text class="small" x="805" y="565">5. `cargo test --workspace` 通过</text>
  <text class="small" x="805" y="592">6. 已知限制进入 release notes</text>
</svg>
