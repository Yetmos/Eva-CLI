<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">eva-core contract boundary</title>
  <desc id="desc">Bilingual diagram showing eva-core as the stable contract layer between runtime modules.</desc>
  <defs>
    <linearGradient id="coreGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .core-title { font: 700 28px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; }
      .core-subtitle { font: 500 15px Arial, "Microsoft YaHei", sans-serif; fill: #dbeafe; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; filter: url(#shadow); }
      .card-title { font: 700 17px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .card-text { font: 500 13px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .label { font: 700 14px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .rule { fill: #ecfeff; stroke: #67e8f9; stroke-width: 1.5; rx: 8; }
      .rule-text { font: 600 14px Arial, "Microsoft YaHei", sans-serif; fill: #155e75; }
    </style>
  </defs>

  <rect class="bg" width="1120" height="560"/>

  <text class="title" x="56" y="54">eva-core contract boundary / 基础契约边界</text>
  <text class="subtitle" x="56" y="82">Stable data contracts only; no runtime side effects. / 只定义稳定数据契约，不承载运行时副作用。</text>

  <rect x="376" y="152" width="368" height="184" rx="14" fill="url(#coreGradient)" filter="url(#shadow)"/>
  <text class="core-title" x="560" y="206" text-anchor="middle">eva-core</text>
  <text class="core-subtitle" x="560" y="236" text-anchor="middle">Event · Topic · IDs · Capability</text>
  <text class="core-subtitle" x="560" y="264" text-anchor="middle">Invoke · Structured Error</text>
  <text class="core-subtitle" x="560" y="294" text-anchor="middle">事件 · 主题 · 标识 · 能力 · 调用 · 错误</text>

  <rect class="card" x="64" y="140" width="220" height="92"/>
  <text class="card-title" x="174" y="174" text-anchor="middle">Config / 配置</text>
  <text class="card-text" x="174" y="202" text-anchor="middle">typed references</text>
  <text class="card-text" x="174" y="220" text-anchor="middle">强类型配置引用</text>

  <rect class="card" x="64" y="282" width="220" height="92"/>
  <text class="card-title" x="174" y="316" text-anchor="middle">EventBus / 事件总线</text>
  <text class="card-text" x="174" y="344" text-anchor="middle">publish and recover events</text>
  <text class="card-text" x="174" y="362" text-anchor="middle">发布与恢复事件</text>

  <rect class="card" x="836" y="140" width="220" height="92"/>
  <text class="card-title" x="946" y="174" text-anchor="middle">Scheduler / 调度器</text>
  <text class="card-text" x="946" y="202" text-anchor="middle">match topics</text>
  <text class="card-text" x="946" y="220" text-anchor="middle">匹配 Topic</text>

  <rect class="card" x="836" y="282" width="220" height="92"/>
  <text class="card-title" x="946" y="316" text-anchor="middle">Agent &amp; Adapter</text>
  <text class="card-text" x="946" y="344" text-anchor="middle">invoke boundaries</text>
  <text class="card-text" x="946" y="362" text-anchor="middle">调用边界</text>

  <rect class="card" x="450" y="402" width="220" height="92"/>
  <text class="card-title" x="560" y="436" text-anchor="middle">Runtime &amp; CLI</text>
  <text class="card-text" x="560" y="464" text-anchor="middle">compose stable entry points</text>
  <text class="card-text" x="560" y="482" text-anchor="middle">组合稳定入口</text>

  <path class="arrow" d="M285 186 H360"/>
  <path class="arrow" d="M285 328 H360"/>
  <path class="arrow" d="M835 186 H760"/>
  <path class="arrow" d="M835 328 H760"/>
  <path class="arrow" d="M560 398 V352"/>

  <rect class="rule" x="96" y="448" width="238" height="48"/>
  <text class="rule-text" x="215" y="478" text-anchor="middle">No I/O / 无直接 I/O</text>

  <rect class="rule" x="746" y="448" width="278" height="48"/>
  <text class="rule-text" x="885" y="478" text-anchor="middle">No provider details / 无 provider 私有细节</text>
</svg>
