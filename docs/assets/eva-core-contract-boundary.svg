<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">eva-core contract boundary</title>
  <desc id="desc">The side-effect-free eva-core crate exposes topics, identifiers, events, invoke contracts, and structured errors to the rest of the Eva-CLI workspace.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#475569"/></marker>
    <style>
      text{font-family:Inter,"Segoe UI","Microsoft YaHei",sans-serif;fill:#172033}.title{font-size:30px;font-weight:700}.subtitle{font-size:14px;fill:#526174}
      .label{font-size:15px;font-weight:700}.small{font-size:12px;fill:#526174}.core-title{font-size:25px;font-weight:700;fill:#ffffff}.core-text{font-size:13px;fill:#eaf2ff}
      .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.blue{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5}
      .green{fill:#ecfdf5;stroke:#22a06b;stroke-width:1.5}.orange{fill:#fff7ed;stroke:#ea8a1f;stroke-width:1.5}
      .purple{fill:#f5f3ff;stroke:#7c5ce7;stroke-width:1.5}.line{fill:none;stroke:#475569;stroke-width:2;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="680" fill="#ffffff"/>
  <text class="title" x="42" y="48">eva-core Contract Boundary</text>
  <text class="subtitle" x="42" y="74">Shared data language only: no filesystem, network, shell, database, Lua, MCP, hardware, provider, or runtime orchestration.</text>

  <rect class="blue" x="70" y="126" width="250" height="92" rx="7"/><text class="label" x="195" y="158" text-anchor="middle">Config and policy</text><text class="small" x="195" y="182" text-anchor="middle">typed references and errors</text><text class="small" x="195" y="202" text-anchor="middle">eva-config · eva-policy</text>
  <rect class="blue" x="70" y="270" width="250" height="92" rx="7"/><text class="label" x="195" y="302" text-anchor="middle">Event routing</text><text class="small" x="195" y="326" text-anchor="middle">publish, match, retry metadata</text><text class="small" x="195" y="346" text-anchor="middle">eva-eventbus · eva-scheduler</text>
  <rect class="orange" x="70" y="414" width="250" height="92" rx="7"/><text class="label" x="195" y="446" text-anchor="middle">Agent execution</text><text class="small" x="195" y="470" text-anchor="middle">handler and Lua boundaries</text><text class="small" x="195" y="490" text-anchor="middle">eva-agent · eva-lua-host</text>

  <rect x="390" y="126" width="420" height="380" rx="8" fill="#1f6fba"/>
  <text class="core-title" x="600" y="166" text-anchor="middle">eva-core</text>
  <line x1="420" y1="188" x2="780" y2="188" stroke="#91c8f6"/>
  <text class="core-text" x="430" y="222">Topics</text><text class="core-text" x="560" y="222">Topic · TopicPattern · segments</text>
  <text class="core-text" x="430" y="266">Identifiers</text><text class="core-text" x="560" y="266">AgentId · AdapterId · CapabilityId</text><text class="core-text" x="560" y="286">EventId · RequestId · GenerationId</text>
  <text class="core-text" x="430" y="330">Events</text><text class="core-text" x="560" y="330">Event · EventMetadata · EventTarget</text><text class="core-text" x="560" y="350">EventPayload · TraceContext</text>
  <text class="core-text" x="430" y="394">Invoke</text><text class="core-text" x="560" y="394">InvokeRequest · InvokeResponse</text><text class="core-text" x="560" y="414">InvokeTarget · InvokeStatus</text>
  <text class="core-text" x="430" y="458">Errors</text><text class="core-text" x="560" y="458">EvaError · ErrorKind · ErrorContext</text><text class="core-text" x="560" y="478">ProviderCode</text>

  <rect class="green" x="880" y="126" width="250" height="92" rx="7"/><text class="label" x="1005" y="158" text-anchor="middle">Capability and adapter</text><text class="small" x="1005" y="182" text-anchor="middle">provider-neutral invoke contracts</text><text class="small" x="1005" y="202" text-anchor="middle">eva-capability · eva-adapter</text>
  <rect class="green" x="880" y="270" width="250" height="92" rx="7"/><text class="label" x="1005" y="302" text-anchor="middle">Storage and telemetry</text><text class="small" x="1005" y="326" text-anchor="middle">stable record identifiers</text><text class="small" x="1005" y="346" text-anchor="middle">eva-storage · eva-observability</text>
  <rect class="purple" x="880" y="414" width="250" height="92" rx="7"/><text class="label" x="1005" y="446" text-anchor="middle">Runtime and CLI</text><text class="small" x="1005" y="470" text-anchor="middle">compose stable public contracts</text><text class="small" x="1005" y="490" text-anchor="middle">eva-runtime · eva-cli</text>

  <path class="line" d="M320 172H390"/><path class="line" d="M320 316H390"/><path class="line" d="M320 460H390"/>
  <path class="line" d="M880 172H810"/><path class="line" d="M880 316H810"/><path class="line" d="M880 460H810"/>

  <rect class="panel" x="70" y="552" width="1060" height="82" rx="8"/>
  <text class="label" x="94" y="584">Boundary guarantee</text>
  <text class="small" x="94" y="608">eva-core defines values and validation rules. Allocation policy, persistence, routing, execution, retries, I/O, and mutation remain in downstream crates.</text>
  <text class="small" x="94" y="626">Other workspace crates consume these contracts through the same stable crate root exports.</text>
</svg>
