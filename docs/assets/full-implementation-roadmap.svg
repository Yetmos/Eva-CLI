<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="700" viewBox="0 0 1180 700" role="img" aria-labelledby="title desc">
  <title id="title">Eva-CLI full implementation roadmap</title>
  <desc id="desc">Eva-CLI implementation versions from V0 baseline to V1.0 core release and V1.x complete capability delivery.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 10; }
      .done { fill: #dcfce7; stroke: #16a34a; }
      .now { fill: #e0f2fe; stroke: #0284c7; }
      .next { fill: #fef3c7; stroke: #d97706; }
      .later { fill: #fce7f3; stroke: #db2777; }
      .release { fill: #ede9fe; stroke: #7c3aed; }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 13px Arial, sans-serif; fill: #475569; }
      .label { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 12px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 11px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="700"/>
  <text class="title" x="48" y="48">Eva-CLI Full Implementation Roadmap</text>
  <text class="subtitle" x="48" y="72">Each version leaves testable, auditable, and recoverable deliverables.</text>

  <rect class="lane" x="40" y="110" width="1100" height="160"/>
  <text class="label" x="62" y="138">Core release path</text>
  <rect class="done" x="80" y="170" width="150" height="64" rx="8"/>
  <text class="label" x="115" y="195">V0.1 Baseline</text>
  <text class="tiny" x="108" y="216">docs + workspace</text>
  <rect class="now" x="280" y="170" width="150" height="64" rx="8"/>
  <text class="label" x="313" y="195">V0.2 Contracts</text>
  <text class="tiny" x="309" y="216">core + config</text>
  <rect class="next" x="480" y="170" width="150" height="64" rx="8"/>
  <text class="label" x="523" y="195">V0.3 CLI</text>
  <text class="tiny" x="506" y="216">doctor / validate</text>
  <rect class="next" x="680" y="170" width="150" height="64" rx="8"/>
  <text class="label" x="714" y="195">V0.4 Loop</text>
  <text class="tiny" x="700" y="216">EventBus to Agent</text>
  <rect class="release" x="880" y="170" width="170" height="64" rx="8"/>
  <text class="label" x="925" y="195">V1.0 Release</text>
  <text class="tiny" x="918" y="216">core promise stable</text>
  <path class="arrow" d="M230 202 H280"/>
  <path class="arrow" d="M430 202 H480"/>
  <path class="arrow" d="M630 202 H680"/>
  <path class="arrow" d="M830 202 H880"/>

  <rect class="lane" x="40" y="305" width="1100" height="160"/>
  <text class="label" x="62" y="333">Complete 1.x capabilities</text>
  <rect class="later" x="90" y="365" width="170" height="64" rx="8"/>
  <text class="label" x="132" y="390">V1.1 Extend</text>
  <text class="tiny" x="113" y="411">Adapter / MCP / Skill</text>
  <rect class="later" x="315" y="365" width="170" height="64" rx="8"/>
  <text class="label" x="352" y="390">V1.2 Memory</text>
  <text class="tiny" x="337" y="411">Memory / Knowledge</text>
  <rect class="later" x="540" y="365" width="170" height="64" rx="8"/>
  <text class="label" x="578" y="390">V1.3 Hardware</text>
  <text class="tiny" x="567" y="411">Hotplug / Driver</text>
  <rect class="later" x="765" y="365" width="170" height="64" rx="8"/>
  <text class="label" x="800" y="390">V1.4 Recovery</text>
  <text class="tiny" x="790" y="411">Backup / Snapshot</text>
  <rect class="release" x="965" y="365" width="130" height="64" rx="8"/>
  <text class="label" x="1000" y="390">V1.5</text>
  <text class="tiny" x="992" y="411">hardening</text>
  <path class="arrow" d="M260 397 H315"/>
  <path class="arrow" d="M485 397 H540"/>
  <path class="arrow" d="M710 397 H765"/>
  <path class="arrow" d="M935 397 H965"/>

  <path class="dash" d="M965 234 C965 275 175 296 175 365"/>
  <text class="tiny" x="695" y="286">High-level capabilities follow after the core runtime release.</text>

  <rect class="lane" x="40" y="505" width="1100" height="130"/>
  <text class="label" x="62" y="533">Fixed completion rules per version</text>
  <text class="small" x="90" y="565">1. Docs, code, config, and examples stay aligned</text>
  <text class="small" x="90" y="592">2. New behavior has unit or integration tests</text>
  <text class="small" x="435" y="565">3. CLI output, errors, trace, and audit fields stay stable</text>
  <text class="small" x="435" y="592">4. Risky actions plan before apply</text>
  <text class="small" x="805" y="565">5. `cargo test --workspace` passes</text>
  <text class="small" x="805" y="592">6. Known limits enter release notes</text>
</svg>
