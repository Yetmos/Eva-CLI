<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="850" viewBox="0 0 1280 850" role="img" aria-labelledby="title desc">
  <title id="title">Eva-CLI module dependency direction</title>
  <desc id="desc">Simplified dependency direction for the current Eva-CLI workspace, separating entry composition, runtime domains, platform services, and the eva-core foundation.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#475569"/></marker>
    <style>
      text{font-family:Inter,"Segoe UI","Microsoft YaHei",sans-serif;fill:#172033}.title{font-size:29px;font-weight:700}.subtitle{font-size:14px;fill:#526174}
      .section{font-size:16px;font-weight:700}.label{font-size:14px;font-weight:700}.small{font-size:12px;fill:#526174}.rule{font-size:13px;fill:#334155}
      .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.purple{fill:#f5f3ff;stroke:#7c5ce7;stroke-width:1.5}
      .blue{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5}.green{fill:#ecfdf5;stroke:#22a06b;stroke-width:1.5}
      .orange{fill:#fff7ed;stroke:#ea8a1f;stroke-width:1.5}.rose{fill:#fff1f2;stroke:#e25572;stroke-width:1.5}
      .line{fill:none;stroke:#475569;stroke-width:2;marker-end:url(#arrow)}.dash{stroke-dasharray:7 6}
    </style>
  </defs>
  <rect width="1280" height="850" fill="#ffffff"/>
  <text class="title" x="44" y="48">Dependency Direction and Composition Rules</text>
  <text class="subtitle" x="44" y="74">Arrows point from a higher-level owner toward lower-level services. The diagram is intentionally simplified; Cargo manifests remain authoritative.</text>

  <rect class="panel" x="36" y="98" width="820" height="706" rx="8"/>
  <text class="section" x="56" y="128">Workspace dependency shape</text>

  <rect class="purple" x="92" y="154" width="160" height="52" rx="7"/><text class="label" x="172" y="185" text-anchor="middle">eva shim</text>
  <rect class="purple" x="332" y="154" width="180" height="52" rx="7"/><text class="label" x="422" y="185" text-anchor="middle">eva-cli</text>
  <rect class="green" x="592" y="154" width="190" height="52" rx="7"/><text class="label" x="687" y="185" text-anchor="middle">eva-runtime</text>
  <path class="line" d="M252 180H332"/><path class="line" d="M512 180H592"/>
  <text class="small" x="422" y="224" text-anchor="middle">user-facing operational composition</text>
  <text class="small" x="687" y="224" text-anchor="middle">event execution composition</text>

  <rect class="orange" x="72" y="274" width="224" height="132" rx="7"/>
  <text class="label" x="184" y="304" text-anchor="middle">Event execution</text>
  <text class="small" x="184" y="331" text-anchor="middle">eva-eventbus · eva-scheduler</text>
  <text class="small" x="184" y="354" text-anchor="middle">eva-agent · eva-lua-host</text>
  <text class="small" x="184" y="377" text-anchor="middle">eva-capability</text>

  <rect class="green" x="316" y="274" width="224" height="132" rx="7"/>
  <text class="label" x="428" y="304" text-anchor="middle">Integration services</text>
  <text class="small" x="428" y="331" text-anchor="middle">eva-adapter · eva-mcp</text>
  <text class="small" x="428" y="354" text-anchor="middle">eva-discovery · eva-memory</text>
  <text class="small" x="428" y="377" text-anchor="middle">eva-hardware</text>

  <rect class="rose" x="560" y="274" width="224" height="132" rx="7"/>
  <text class="label" x="672" y="304" text-anchor="middle">Operational services</text>
  <text class="small" x="672" y="331" text-anchor="middle">eva-backup</text>
  <text class="small" x="672" y="354" text-anchor="middle">eva-lifecycle</text>
  <text class="small" x="672" y="377" text-anchor="middle">eva-release</text>

  <text class="small" x="428" y="252" text-anchor="middle">entry crates select and compose services from these domains</text>

  <rect class="blue" x="72" y="470" width="712" height="170" rx="7"/>
  <text class="label" x="92" y="501">Platform contracts and infrastructure</text>
  <rect fill="#ffffff" stroke="#3b82f6" x="96" y="528" width="132" height="52" rx="6"/><text class="label" x="162" y="559" text-anchor="middle">eva-config</text>
  <rect fill="#ffffff" stroke="#3b82f6" x="246" y="528" width="132" height="52" rx="6"/><text class="label" x="312" y="559" text-anchor="middle">eva-policy</text>
  <rect fill="#ffffff" stroke="#3b82f6" x="396" y="528" width="164" height="52" rx="6"/><text class="label" x="478" y="559" text-anchor="middle">eva-observability</text>
  <rect fill="#ffffff" stroke="#3b82f6" x="578" y="528" width="170" height="52" rx="6"/><text class="label" x="663" y="559" text-anchor="middle">eva-storage</text>
  <text class="small" x="428" y="614" text-anchor="middle">policy builds on config; storage builds on observability; all use eva-core contracts</text>
  <path class="line" d="M184 406V470"/><path class="line" d="M428 406V470"/><path class="line" d="M672 406V470"/>

  <rect class="blue" x="264" y="692" width="328" height="76" rx="7"/>
  <text class="label" x="428" y="724" text-anchor="middle">eva-core</text>
  <text class="small" x="428" y="748" text-anchor="middle">side-effect-free shared data contracts; no Eva crate dependencies</text>
  <path class="line" d="M428 640V692"/>

  <rect class="panel" x="884" y="98" width="360" height="706" rx="8"/>
  <text class="section" x="908" y="132">Rules enforced by the current graph</text>
  <text class="rule" x="908" y="178">1. eva-core depends on no other Eva crate.</text>
  <text class="rule" x="908" y="218">2. config and observability depend on core.</text>
  <text class="rule" x="908" y="258">3. policy depends on config and core.</text>
  <text class="rule" x="908" y="298">4. storage depends on observability and core.</text>
  <text class="rule" x="908" y="338">5. Scheduler does not depend on Lua or adapters.</text>
  <text class="rule" x="908" y="378">6. LuaHost uses capability and service ports,</text><text class="rule" x="926" y="399">not provider transports.</text>
  <text class="rule" x="908" y="439">7. Discovery finds candidates; policy authorizes.</text>
  <text class="rule" x="908" y="479">8. Runtime composes the event execution path.</text>
  <text class="rule" x="908" y="519">9. CLI composes explicit operational commands.</text>
  <rect class="rose" x="908" y="566" width="312" height="112" rx="7"/>
  <text class="label" x="928" y="596">Forbidden reverse edges</text>
  <text class="small" x="928" y="624">core must not import runtime, CLI, providers,</text>
  <text class="small" x="928" y="646">Lua, storage implementations, or transports.</text>
  <rect class="green" x="908" y="704" width="312" height="66" rx="7"/>
  <text class="small" x="928" y="731">When the diagram and Cargo disagree,</text>
  <text class="small" x="928" y="752">Cargo.toml is the source of truth.</text>
</svg>
