<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Eva-CLI daily workflow</title>
  <desc id="desc">Build from source, validate the environment and configuration, inspect runtime state, run the basic example, inspect its task, then continue to event, daemon, capability, or release checks as needed.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .step { fill: #ecfdf5; stroke: #15803d; stroke-width: 1.6; }
      .run { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.6; }
      .branch-a { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; }
      .branch-b { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.4; }
      .branch-c { fill: #f1f5f9; stroke: #475569; stroke-width: 1.4; }
      .title { font: 700 27px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 14px Arial, sans-serif; fill: #475569; }
      .number { font: 700 13px Arial, sans-serif; fill: #ffffff; }
      .label { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .code { font: 13px Consolas, "SFMono-Regular", monospace; fill: #1e293b; }
      .small { font: 13px Arial, sans-serif; fill: #475569; }
      .line { fill: none; stroke: #475569; stroke-width: 2; marker-end: url(#arrow); }
      .branch-line { fill: none; stroke: #94a3b8; stroke-width: 1.8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="620"/>
  <rect class="frame" x="34" y="32" width="1132" height="552" rx="8"/>
  <text class="title" x="68" y="78">Eva-CLI daily workflow</text>
  <text class="subtitle" x="68" y="106">Run from the repository root. Validate configuration before running the example.</text>

  <g>
    <rect class="step" x="62" y="152" width="184" height="122" rx="8"/>
    <circle cx="88" cy="177" r="14" fill="#15803d"/>
    <text class="number" x="84" y="182">1</text>
    <text class="label" x="110" y="183">Build</text>
    <text class="code" x="82" y="222">cargo build</text>
    <text class="code" x="82" y="246">--release</text>
  </g>

  <g>
    <rect class="step" x="282" y="152" width="184" height="122" rx="8"/>
    <circle cx="308" cy="177" r="14" fill="#15803d"/>
    <text class="number" x="304" y="182">2</text>
    <text class="label" x="330" y="183">Validate</text>
    <text class="code" x="302" y="222">doctor</text>
    <text class="code" x="302" y="246">config validate</text>
  </g>

  <g>
    <rect class="step" x="502" y="152" width="184" height="122" rx="8"/>
    <circle cx="528" cy="177" r="14" fill="#15803d"/>
    <text class="number" x="524" y="182">3</text>
    <text class="label" x="550" y="183">Inspect</text>
    <text class="code" x="522" y="222">inspect runtime</text>
    <text class="small" x="522" y="248">Review effective config</text>
  </g>

  <g>
    <rect class="run" x="722" y="152" width="184" height="122" rx="8"/>
    <circle cx="748" cy="177" r="14" fill="#2563eb"/>
    <text class="number" x="744" y="182">4</text>
    <text class="label" x="770" y="183">Run example</text>
    <text class="code" x="742" y="222">run --example</text>
    <text class="code" x="742" y="246">basic</text>
  </g>

  <g>
    <rect class="run" x="942" y="152" width="184" height="122" rx="8"/>
    <circle cx="968" cy="177" r="14" fill="#2563eb"/>
    <text class="number" x="964" y="182">5</text>
    <text class="label" x="990" y="183">Inspect task</text>
    <text class="code" x="962" y="222">task status</text>
    <text class="code" x="962" y="246">task logs</text>
  </g>

  <line class="line" x1="246" y1="213" x2="276" y2="213"/>
  <line class="line" x1="466" y1="213" x2="496" y2="213"/>
  <line class="line" x1="686" y1="213" x2="716" y2="213"/>
  <line class="line" x1="906" y1="213" x2="936" y2="213"/>

  <text class="label" x="68" y="342">Continue as needed</text>
  <path class="branch-line" d="M1034 274 C1034 320 250 316 250 374"/>
  <path class="branch-line" d="M1034 274 C1034 326 598 322 598 374"/>
  <path class="branch-line" d="M1034 274 C1034 336 946 330 946 374"/>

  <rect class="branch-a" x="82" y="378" width="336" height="108" rx="8"/>
  <text class="label" x="106" y="408">Events and durability</text>
  <text class="code" x="106" y="438">emit /input/user</text>
  <text class="code" x="106" y="463">inspect durable --durable-backend ...</text>

  <rect class="branch-b" x="432" y="378" width="336" height="108" rx="8"/>
  <text class="label" x="456" y="408">Local control boundary</text>
  <text class="code" x="456" y="438">daemon start / status / shutdown</text>
  <text class="code" x="456" y="463">agent status / drain / reload</text>

  <rect class="branch-c" x="782" y="378" width="336" height="108" rx="8"/>
  <text class="label" x="806" y="408">Capabilities and release</text>
  <text class="code" x="806" y="438">capability probe repo.analyze</text>
  <text class="code" x="806" y="463">release check</text>

  <rect x="68" y="522" width="1064" height="38" rx="6" fill="#f1f5f9"/>
  <text class="small" x="88" y="546">Add <tspan class="code">--output json</tspan> for automation. Review side effects, confirmation values, and policy gates before call/apply.</text>
</svg>
