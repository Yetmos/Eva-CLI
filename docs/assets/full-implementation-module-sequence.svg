<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="820" viewBox="0 0 1180 820" role="img" aria-labelledby="title desc">
  <title id="title">Eva-CLI module implementation sequence</title>
  <desc id="desc">Recommended implementation order from contracts to runtime loop, external capabilities, operations, and release hardening.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .band { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 10; }
      .foundation { fill: #e0f2fe; stroke: #0284c7; }
      .runtime { fill: #dcfce7; stroke: #16a34a; }
      .agent { fill: #fef3c7; stroke: #d97706; }
      .extension { fill: #fce7f3; stroke: #db2777; }
      .ops { fill: #ede9fe; stroke: #7c3aed; }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 13px Arial, sans-serif; fill: #475569; }
      .label { font: 700 14px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 12px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="820"/>
  <text class="title" x="48" y="48">Module Implementation Sequence</text>
  <text class="subtitle" x="48" y="72">Stabilize contracts first, run the minimum runtime loop, then add external capabilities and operations.</text>

  <rect class="band" x="45" y="105" width="1090" height="130"/>
  <text class="label" x="70" y="135">A. Contracts and configuration</text>
  <rect class="foundation" x="105" y="160" width="150" height="48" rx="8"/>
  <text class="label" x="144" y="189">eva-core</text>
  <rect class="foundation" x="315" y="160" width="150" height="48" rx="8"/>
  <text class="label" x="350" y="189">eva-config</text>
  <rect class="foundation" x="525" y="160" width="150" height="48" rx="8"/>
  <text class="label" x="562" y="189">eva-policy</text>
  <rect class="foundation" x="735" y="160" width="185" height="48" rx="8"/>
  <text class="label" x="764" y="189">eva-observability</text>
  <path class="arrow" d="M255 184 H315"/>
  <path class="arrow" d="M465 184 H525"/>
  <path class="arrow" d="M675 184 H735"/>

  <rect class="band" x="45" y="270" width="1090" height="130"/>
  <text class="label" x="70" y="300">B. Events, scheduling, and Agent execution</text>
  <rect class="runtime" x="105" y="325" width="155" height="48" rx="8"/>
  <text class="label" x="139" y="354">eva-storage</text>
  <rect class="runtime" x="300" y="325" width="155" height="48" rx="8"/>
  <text class="label" x="331" y="354">eva-eventbus</text>
  <rect class="runtime" x="495" y="325" width="155" height="48" rx="8"/>
  <text class="label" x="528" y="354">eva-scheduler</text>
  <rect class="agent" x="690" y="325" width="155" height="48" rx="8"/>
  <text class="label" x="728" y="354">eva-agent</text>
  <rect class="agent" x="885" y="325" width="165" height="48" rx="8"/>
  <text class="label" x="926" y="354">eva-lua-host</text>
  <path class="arrow" d="M260 349 H300"/>
  <path class="arrow" d="M455 349 H495"/>
  <path class="arrow" d="M650 349 H690"/>
  <path class="arrow" d="M845 349 H885"/>

  <rect class="band" x="45" y="435" width="1090" height="130"/>
  <text class="label" x="70" y="465">C. Capability, Adapter, Discovery, and MCP</text>
  <rect class="extension" x="105" y="490" width="165" height="48" rx="8"/>
  <text class="label" x="141" y="519">eva-capability</text>
  <rect class="extension" x="320" y="490" width="155" height="48" rx="8"/>
  <text class="label" x="359" y="519">eva-adapter</text>
  <rect class="extension" x="525" y="490" width="155" height="48" rx="8"/>
  <text class="label" x="565" y="519">eva-mcp</text>
  <rect class="extension" x="730" y="490" width="165" height="48" rx="8"/>
  <text class="label" x="765" y="519">eva-discovery</text>
  <rect class="extension" x="945" y="490" width="135" height="48" rx="8"/>
  <text class="label" x="973" y="519">eva-cli</text>
  <path class="arrow" d="M270 514 H320"/>
  <path class="arrow" d="M475 514 H525"/>
  <path class="arrow" d="M680 514 H730"/>
  <path class="arrow" d="M895 514 H945"/>

  <rect class="band" x="45" y="600" width="1090" height="130"/>
  <text class="label" x="70" y="630">D. Complete capabilities and release hardening</text>
  <rect class="ops" x="115" y="655" width="150" height="48" rx="8"/>
  <text class="label" x="151" y="684">eva-memory</text>
  <rect class="ops" x="310" y="655" width="155" height="48" rx="8"/>
  <text class="label" x="348" y="684">eva-hardware</text>
  <rect class="ops" x="510" y="655" width="150" height="48" rx="8"/>
  <text class="label" x="548" y="684">eva-backup</text>
  <rect class="ops" x="705" y="655" width="155" height="48" rx="8"/>
  <text class="label" x="740" y="684">eva-lifecycle</text>
  <rect class="ops" x="905" y="655" width="145" height="48" rx="8"/>
  <text class="label" x="942" y="684">CI / Release</text>
  <path class="arrow" d="M265 679 H310"/>
  <path class="arrow" d="M465 679 H510"/>
  <path class="arrow" d="M660 679 H705"/>
  <path class="arrow" d="M860 679 H905"/>

  <path class="arrow" d="M600 208 C600 240 377 240 377 325"/>
  <path class="arrow" d="M767 373 C767 414 397 415 397 490"/>
  <path class="arrow" d="M1012 538 C1012 580 190 580 190 655"/>
  <text class="small" x="70" y="765">Dependency direction stays inward: `eva-runtime` composes concrete services; lower crates do not depend on runtime.</text>
</svg>
