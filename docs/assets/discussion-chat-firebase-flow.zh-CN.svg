<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">官网讨论区聊天消息、通知与注销流程</title>
  <desc id="desc">首次登录、发送消息、更新会话投影、发送 FCM 通知、邀请链接加群、匿名模式和账号注销流程。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 8; }
      .step { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; rx: 8; }
      .fn { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; rx: 8; }
      .store { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; rx: 8; }
      .danger { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; rx: 8; }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .laneText { font: 700 14px Arial, sans-serif; fill: #475569; }
      .label { font: 700 13px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 11px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 1.9; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.7; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="48" y="50">聊天流程：登录、消息、邀请、匿名模式、注销</text>

  <rect class="lane" x="48" y="90" width="1184" height="92"/>
  <text class="laneText" x="68" y="118">首次登录</text>
  <rect class="step" x="180" y="112" width="150" height="48"/>
  <text class="label" x="211" y="134">GitHub 登录</text>
  <text class="small" x="214" y="150">Firebase Auth</text>
  <rect class="fn" x="410" y="112" width="170" height="48"/>
  <text class="label" x="446" y="134">ensureUserProfile</text>
  <text class="small" x="438" y="150">分配随机中文名</text>
  <rect class="store" x="660" y="112" width="170" height="48"/>
  <text class="label" x="697" y="134">users/{uid}</text>
  <text class="small" x="686" y="150">profile 和设置</text>

  <rect class="lane" x="48" y="210" width="1184" height="120"/>
  <text class="laneText" x="68" y="238">发送消息</text>
  <rect class="step" x="150" y="248" width="150" height="48"/>
  <text class="label" x="184" y="270">输入框</text>
  <text class="small" x="171" y="286">文本、图片、表情包</text>
  <rect class="fn" x="360" y="248" width="150" height="48"/>
  <text class="label" x="396" y="270">sendMessage</text>
  <text class="small" x="386" y="286">成员校验和限流</text>
  <rect class="store" x="570" y="248" width="150" height="48"/>
  <text class="label" x="606" y="270">消息文档</text>
  <text class="small" x="594" y="286">发送者名称快照</text>
  <rect class="store" x="780" y="248" width="160" height="48"/>
  <text class="label" x="824" y="270">会话投影</text>
  <text class="small" x="806" y="286">最后消息、未读数</text>
  <rect class="step" x="1000" y="248" width="150" height="48"/>
  <text class="label" x="1032" y="270">实时 UI</text>
  <text class="small" x="1024" y="286">Firestore listener</text>
  <rect class="step" x="1000" y="302" width="150" height="22"/>
  <text class="small" x="1022" y="317">后台时走 FCM 通知</text>

  <rect class="lane" x="48" y="358" width="1184" height="104"/>
  <text class="laneText" x="68" y="386">群邀请与匿名模式</text>
  <rect class="fn" x="210" y="396" width="160" height="48"/>
  <text class="label" x="250" y="418">创建邀请</text>
  <text class="small" x="232" y="434">只保存 token hash</text>
  <rect class="step" x="440" y="396" width="160" height="48"/>
  <text class="label" x="486" y="418">分享链接</text>
  <text class="small" x="468" y="434">URL 中携带 token</text>
  <rect class="fn" x="670" y="396" width="170" height="48"/>
  <text class="label" x="718" y="418">接受邀请</text>
  <text class="small" x="698" y="434">写 member 和 session</text>
  <rect class="fn" x="910" y="396" width="170" height="48"/>
  <text class="label" x="946" y="418">匿名模式</text>
  <text class="small" x="934" y="434">每个群单独匿名名</text>

  <rect class="lane" x="48" y="490" width="1184" height="140"/>
  <text class="laneText" x="68" y="518">账号注销</text>
  <rect class="danger" x="142" y="550" width="150" height="48"/>
  <text class="label" x="184" y="572">重新登录</text>
  <text class="small" x="170" y="588">要求近期登录</text>
  <rect class="danger" x="342" y="550" width="150" height="48"/>
  <text class="label" x="376" y="572">deleteAccount</text>
  <text class="small" x="370" y="588">幂等注销任务</text>
  <rect class="danger" x="542" y="550" width="150" height="48"/>
  <text class="label" x="580" y="572">删除数据</text>
  <text class="small" x="570" y="588">文档、媒体、RTDB</text>
  <rect class="danger" x="742" y="550" width="150" height="48"/>
  <text class="label" x="778" y="572">删除 Auth 用户</text>
  <text class="small" x="774" y="588">最终移除身份</text>
  <rect class="store" x="942" y="550" width="150" height="48"/>
  <text class="label" x="974" y="572">任务结果</text>
  <text class="small" x="966" y="588">数量和状态</text>

  <path class="arrow" d="M330 136 L406 136"/>
  <path class="arrow" d="M580 136 L656 136"/>
  <path class="arrow" d="M300 272 L356 272"/>
  <path class="arrow" d="M510 272 L566 272"/>
  <path class="arrow" d="M720 272 L776 272"/>
  <path class="arrow" d="M940 272 L996 272"/>
  <path class="dash" d="M860 296 L860 313 L996 313"/>
  <path class="arrow" d="M370 420 L436 420"/>
  <path class="arrow" d="M600 420 L666 420"/>
  <path class="dash" d="M840 420 L906 420"/>
  <path class="arrow" d="M292 574 L338 574"/>
  <path class="arrow" d="M492 574 L538 574"/>
  <path class="arrow" d="M692 574 L738 574"/>
  <path class="arrow" d="M892 574 L938 574"/>
</svg>
