<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Eva-CLI workspace 模块划分</title>
  <desc id="desc">当前 Eva-CLI workspace 按入口、组合、平台契约、事件执行、集成服务和运维服务分组，展示全部二十个 workspace crate。</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#475569"/></marker>
    <style>
      text{font-family:Inter,"Segoe UI","Microsoft YaHei",sans-serif;fill:#172033}.title{font-size:29px;font-weight:700}.subtitle{font-size:14px;fill:#526174}
      .section{font-size:16px;font-weight:700}.label{font-size:14px;font-weight:700}.small{font-size:12px;fill:#64748b}
      .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.purple{fill:#f5f3ff;stroke:#7c5ce7;stroke-width:1.5}
      .blue{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5}.green{fill:#ecfdf5;stroke:#22a06b;stroke-width:1.5}
      .orange{fill:#fff7ed;stroke:#ea8a1f;stroke-width:1.5}.rose{fill:#fff1f2;stroke:#e25572;stroke-width:1.5}
      .line{fill:none;stroke:#475569;stroke-width:2;marker-end:url(#arrow)}.dash{stroke-dasharray:7 6}
    </style>
  </defs>
  <rect width="1280" height="820" fill="#ffffff"/>
  <text class="title" x="44" y="48">Eva-CLI Workspace 模块划分</text>
  <text class="subtitle" x="44" y="74">仓库包含二十个 workspace crate；分组表达职责归属，精确依赖关系见模块依赖图。</text>

  <rect class="panel" x="36" y="96" width="1208" height="112" rx="8"/>
  <text class="section" x="56" y="124">入口与组合</text>
  <rect class="purple" x="94" y="145" width="170" height="46" rx="7"/><text class="label" x="179" y="174" text-anchor="middle">eva 二进制薄壳</text>
  <rect class="purple" x="350" y="145" width="170" height="46" rx="7"/><text class="label" x="435" y="174" text-anchor="middle">eva-cli</text>
  <rect class="green" x="606" y="145" width="190" height="46" rx="7"/><text class="label" x="701" y="174" text-anchor="middle">eva-runtime</text>
  <path class="line" d="M264 168H350"/><path class="line" d="M520 168H606"/>
  <text class="small" x="844" y="162">CLI 还会直接组合备份、生命周期、发布、</text>
  <text class="small" x="844" y="183">Adapter 和服务类显式运维命令。</text>

  <rect class="panel" x="36" y="230" width="1208" height="112" rx="8"/>
  <text class="section" x="56" y="258">平台契约与基础设施</text>
  <rect class="blue" x="116" y="279" width="170" height="46" rx="7"/><text class="label" x="201" y="308" text-anchor="middle">eva-core</text>
  <rect class="blue" x="334" y="279" width="170" height="46" rx="7"/><text class="label" x="419" y="308" text-anchor="middle">eva-config</text>
  <rect class="blue" x="552" y="279" width="170" height="46" rx="7"/><text class="label" x="637" y="308" text-anchor="middle">eva-policy</text>
  <rect class="blue" x="770" y="279" width="180" height="46" rx="7"/><text class="label" x="860" y="308" text-anchor="middle">eva-observability</text>
  <rect class="blue" x="998" y="279" width="170" height="46" rx="7"/><text class="label" x="1083" y="308" text-anchor="middle">eva-storage</text>

  <rect class="panel" x="36" y="364" width="1208" height="112" rx="8"/>
  <text class="section" x="56" y="392">事件与 Agent 执行</text>
  <rect class="orange" x="116" y="413" width="170" height="46" rx="7"/><text class="label" x="201" y="442" text-anchor="middle">eva-eventbus</text>
  <rect class="orange" x="334" y="413" width="170" height="46" rx="7"/><text class="label" x="419" y="442" text-anchor="middle">eva-scheduler</text>
  <rect class="orange" x="552" y="413" width="170" height="46" rx="7"/><text class="label" x="637" y="442" text-anchor="middle">eva-agent</text>
  <rect class="orange" x="770" y="413" width="180" height="46" rx="7"/><text class="label" x="860" y="442" text-anchor="middle">eva-lua-host</text>
  <rect class="orange" x="998" y="413" width="170" height="46" rx="7"/><text class="label" x="1083" y="442" text-anchor="middle">eva-capability</text>

  <rect class="panel" x="36" y="498" width="1208" height="112" rx="8"/>
  <text class="section" x="56" y="526">集成服务</text>
  <rect class="green" x="116" y="547" width="170" height="46" rx="7"/><text class="label" x="201" y="576" text-anchor="middle">eva-adapter</text>
  <rect class="green" x="334" y="547" width="170" height="46" rx="7"/><text class="label" x="419" y="576" text-anchor="middle">eva-mcp</text>
  <rect class="green" x="552" y="547" width="170" height="46" rx="7"/><text class="label" x="637" y="576" text-anchor="middle">eva-discovery</text>
  <rect class="green" x="770" y="547" width="180" height="46" rx="7"/><text class="label" x="860" y="576" text-anchor="middle">eva-memory</text>
  <rect class="green" x="998" y="547" width="170" height="46" rx="7"/><text class="label" x="1083" y="576" text-anchor="middle">eva-hardware</text>

  <rect class="panel" x="36" y="632" width="1208" height="112" rx="8"/>
  <text class="section" x="56" y="660">运维服务</text>
  <rect class="rose" x="260" y="681" width="190" height="46" rx="7"/><text class="label" x="355" y="710" text-anchor="middle">eva-backup</text>
  <rect class="rose" x="545" y="681" width="190" height="46" rx="7"/><text class="label" x="640" y="710" text-anchor="middle">eva-lifecycle</text>
  <rect class="rose" x="830" y="681" width="190" height="46" rx="7"/><text class="label" x="925" y="710" text-anchor="middle">eva-release</text>

  <text class="small" x="844" y="202">下方领域带表达职责分组，不是一条单向依赖链。</text>
  <text class="small" x="44" y="782">MCP Server 与 Supervisor 是 eva-mcp、eva-lifecycle 内的功能面，不是独立 workspace crate。</text>
</svg>
