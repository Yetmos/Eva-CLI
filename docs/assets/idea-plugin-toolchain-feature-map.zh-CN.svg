<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">IDEA Plugin 开发工具链能力图</title>
  <desc id="desc">面向开发者的 IDEA Plugin 能力，以及它与 Eva-CLI 项目文件、Runtime Bridge 和 Runtime 权威边界的关系。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 10; }
      .ide { fill: #dbeafe; stroke: #2563eb; }
      .project { fill: #dcfce7; stroke: #16a34a; }
      .bridge { fill: #fef3c7; stroke: #d97706; }
      .runtime { fill: #fce7f3; stroke: #db2777; }
      .quality { fill: #ede9fe; stroke: #7c3aed; }
      .box { stroke-width: 1.4; rx: 8; }
      .title { font: 700 24px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 13px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .section { font: 700 15px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .label { font: 700 13px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .small { font: 400 12px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .tiny { font: 400 11px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 5 5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760"/>
  <text class="title" x="48" y="48">IDEA Plugin 开发工具链能力图</text>
  <text class="subtitle" x="48" y="72">插件提升编写与反馈效率；Eva-CLI Runtime 仍负责执行权威、policy、密钥、审计与恢复。</text>

  <rect class="panel" x="44" y="104" width="250" height="560"/>
  <text class="section" x="68" y="136">开发者流程</text>
  <rect class="box quality" x="72" y="166" width="194" height="58"/>
  <text class="label" x="118" y="191">创建 Agent</text>
  <text class="small" x="94" y="210">manifest + Lua + scenario</text>
  <rect class="box quality" x="72" y="250" width="194" height="58"/>
  <text class="label" x="112" y="275">编辑 Capability</text>
  <text class="small" x="101" y="294">schema 感知补全</text>
  <rect class="box quality" x="72" y="334" width="194" height="58"/>
  <text class="label" x="111" y="359">运行 Dry Run</text>
  <text class="small" x="100" y="378">scenario + 结构化结果</text>
  <rect class="box quality" x="72" y="418" width="194" height="58"/>
  <text class="label" x="113" y="443">查看 Trace</text>
  <text class="small" x="98" y="462">events、policy、adapters</text>
  <rect class="box quality" x="72" y="502" width="194" height="58"/>
  <text class="label" x="119" y="527">修复源码</text>
  <text class="small" x="98" y="546">quick fix + validation</text>

  <rect class="panel" x="334" y="104" width="282" height="560"/>
  <text class="section" x="358" y="136">IDEA Plugin 界面</text>
  <rect class="box ide" x="362" y="166" width="226" height="56"/>
  <text class="label" x="394" y="190">Eva Project 工具窗口</text>
  <text class="tiny" x="393" y="208">Agents、Adapters、Routes、Docs</text>
  <rect class="box ide" x="362" y="244" width="226" height="56"/>
  <text class="label" x="414" y="268">编辑器智能</text>
  <text class="tiny" x="386" y="286">Lua、YAML、Topic、Capability</text>
  <rect class="box ide" x="362" y="322" width="226" height="56"/>
  <text class="label" x="407" y="346">Problems + Quick Fix</text>
  <text class="tiny" x="392" y="364">schema、policy、unsafe API</text>
  <rect class="box ide" x="362" y="400" width="226" height="56"/>
  <text class="label" x="407" y="424">Run Configurations</text>
  <text class="tiny" x="391" y="442">validate、dry run、health check</text>
  <rect class="box ide" x="362" y="478" width="226" height="56"/>
  <text class="label" x="421" y="502">Trace Viewer</text>
  <text class="tiny" x="391" y="520">EventBus 到 Adapter 时间线</text>
  <rect class="box ide" x="362" y="556" width="226" height="56"/>
  <text class="label" x="410" y="580">Policy Inspector</text>
  <text class="tiny" x="399" y="598">effective permission 链路</text>

  <rect class="panel" x="656" y="104" width="250" height="560"/>
  <text class="section" x="680" y="136">Workspace 契约</text>
  <rect class="box project" x="684" y="164" width="194" height="54"/>
  <text class="label" x="733" y="187">eva.yaml</text>
  <text class="tiny" x="714" y="205">runtime config root</text>
  <rect class="box project" x="684" y="238" width="194" height="54"/>
  <text class="label" x="716" y="261">Agent Manifests</text>
  <text class="tiny" x="711" y="279">agent.yaml + Lua 入口</text>
  <rect class="box project" x="684" y="312" width="194" height="54"/>
  <text class="label" x="711" y="335">Adapter Manifests</text>
  <text class="tiny" x="708" y="353">providers、limits、policy</text>
  <rect class="box project" x="684" y="386" width="194" height="54"/>
  <text class="label" x="724" y="409">Topic Routes</text>
  <text class="tiny" x="704" y="427">patterns + subscriptions</text>
  <rect class="box project" x="684" y="460" width="194" height="54"/>
  <text class="label" x="721" y="483">Scenarios</text>
  <text class="tiny" x="707" y="501">dry-run fixture 输入</text>
  <rect class="box project" x="684" y="534" width="194" height="54"/>
  <text class="label" x="718" y="557">Architecture Docs</text>
  <text class="tiny" x="713" y="575">设计链接与决策记录</text>

  <rect class="panel" x="946" y="104" width="286" height="560"/>
  <text class="section" x="970" y="136">Runtime Bridge 与权威边界</text>
  <rect class="box bridge" x="974" y="166" width="230" height="70"/>
  <text class="label" x="1027" y="191">Typed Bridge</text>
  <text class="tiny" x="999" y="210">health、validate、dryRun、trace</text>
  <rect class="box runtime" x="974" y="272" width="230" height="62"/>
  <text class="label" x="1017" y="296">Eva-CLI Runtime</text>
  <text class="tiny" x="1002" y="314">policy、sandbox、audit、state</text>
  <rect class="box runtime" x="974" y="370" width="230" height="62"/>
  <text class="label" x="1031" y="394">Adapters</text>
  <text class="tiny" x="1000" y="412">MCP、Skill、HTTP、stdio、hardware</text>
  <rect class="box runtime" x="974" y="468" width="230" height="62"/>
  <text class="label" x="1034" y="492">Audit Trace</text>
  <text class="tiny" x="1004" y="510">结构化诊断与 artifacts</text>
  <rect class="box runtime" x="974" y="566" width="230" height="62"/>
  <text class="label" x="1015" y="590">Validation Result</text>
  <text class="tiny" x="1002" y="608">source span、deny、warning</text>

  <path class="arrow" d="M266 195 C306 195 320 195 358 195"/>
  <path class="arrow" d="M266 279 C306 279 320 272 358 272"/>
  <path class="arrow" d="M266 363 C306 363 320 428 358 428"/>
  <path class="arrow" d="M266 447 C306 447 320 506 358 506"/>
  <path class="arrow" d="M266 531 C306 531 320 352 358 352"/>

  <path class="arrow" d="M588 194 C632 194 642 191 680 191"/>
  <path class="arrow" d="M588 272 C632 272 642 265 680 265"/>
  <path class="arrow" d="M588 350 C632 350 642 339 680 339"/>
  <path class="arrow" d="M588 428 C632 428 642 413 680 413"/>
  <path class="arrow" d="M588 506 C632 506 642 487 680 487"/>
  <path class="arrow" d="M588 584 C632 584 642 561 680 561"/>

  <path class="arrow" d="M878 191 C912 191 930 196 970 201"/>
  <path class="arrow" d="M878 265 C918 250 930 224 970 209"/>
  <path class="arrow" d="M878 487 C918 478 930 594 970 599"/>
  <path class="dash" d="M1089 236 C1089 252 1089 258 1089 268"/>
  <path class="dash" d="M1089 334 C1089 350 1089 356 1089 366"/>
  <path class="dash" d="M1089 432 C1089 448 1089 454 1089 464"/>
  <path class="dash" d="M1089 530 C1089 546 1089 552 1089 562"/>

  <text class="small" x="48" y="708">规则：编辑器动作只能是文件编辑或类型化 bridge 调用；Runtime 是唯一执行权威。</text>
</svg>
