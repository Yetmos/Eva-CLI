<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Eva-CLI side effects and safety boundaries</title>
  <desc id="desc">Eva-CLI commands grouped into read-only diagnostics, local writes, explicitly confirmed execution, and capabilities that remain unavailable.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .read { fill: #ecfdf5; stroke: #15803d; stroke-width: 1.6; }
      .write { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.6; }
      .gated { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.6; }
      .blocked { fill: #fef2f2; stroke: #b91c1c; stroke-width: 1.6; }
      .title { font: 700 27px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 14px Arial, sans-serif; fill: #475569; }
      .label { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .code { font: 12.5px Consolas, "SFMono-Regular", monospace; fill: #1e293b; }
      .text { font: 13px Arial, sans-serif; fill: #475569; }
      .risk { font: 700 12px Arial, sans-serif; fill: #64748b; }
      .line { fill: none; stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="620"/>
  <rect class="frame" x="34" y="32" width="1132" height="552" rx="8"/>
  <text class="title" x="68" y="78">Eva-CLI side effects and safety boundaries</text>
  <text class="subtitle" x="68" y="106">A command name is not a side-effect guarantee. Inspect status, invocation_executed, and mutation_executed before continuing.</text>

  <text class="risk" x="82" y="143">LOWER SIDE EFFECTS</text>
  <text class="risk" x="1000" y="143">PRODUCTION GAPS</text>
  <line class="line" x1="220" y1="138" x2="980" y2="138"/>

  <rect class="read" x="62" y="164" width="252" height="302" rx="8"/>
  <text class="label" x="86" y="198">1. Read-only diagnostics</text>
  <text class="code" x="86" y="232">version / doctor</text>
  <text class="code" x="86" y="258">config validate / inspect</text>
  <text class="code" x="86" y="284">adapter|mcp list/probe</text>
  <text class="code" x="86" y="310">discovery scan</text>
  <text class="code" x="86" y="336">release check/security/perf</text>
  <line x1="86" y1="358" x2="290" y2="358" stroke="#86efac"/>
  <text class="text" x="86" y="386">Reads config, state, or evidence.</text>
  <text class="text" x="86" y="409">A successful probe does not mean</text>
  <text class="text" x="86" y="430">the provider executed.</text>

  <rect class="write" x="336" y="164" width="252" height="302" rx="8"/>
  <text class="label" x="360" y="198">2. Local writes</text>
  <text class="code" x="360" y="232">run / task cancel</text>
  <text class="code" x="360" y="258">emit --durable-backend</text>
  <text class="code" x="360" y="284">daemon start / control</text>
  <text class="code" x="360" y="310">memory / observability</text>
  <text class="code" x="360" y="336">backup / snapshot create</text>
  <line x1="360" y1="358" x2="564" y2="358" stroke="#93c5fd"/>
  <text class="text" x="360" y="386">Writes task, event, daemon,</text>
  <text class="text" x="360" y="409">observability, or artifact data.</text>
  <text class="text" x="360" y="430">This is not production deployment.</text>

  <rect class="gated" x="610" y="164" width="252" height="302" rx="8"/>
  <text class="label" x="634" y="198">3. Controlled execution</text>
  <text class="code" x="634" y="232">capability call --confirm</text>
  <text class="code" x="634" y="258">skill run</text>
  <text class="code" x="634" y="284">restore apply / rollback</text>
  <text class="code" x="634" y="310">upgrade apply --state-store</text>
  <text class="code" x="634" y="336">agent drain/reload + daemon</text>
  <line x1="634" y1="358" x2="838" y2="358" stroke="#fdba74"/>
  <text class="text" x="634" y="386">May run external providers or</text>
  <text class="text" x="634" y="409">change local files/pointers.</text>
  <text class="text" x="634" y="430">Review the gates that apply.</text>

  <rect class="blocked" x="884" y="164" width="252" height="302" rx="8"/>
  <text class="label" x="908" y="198">4. Currently unavailable</text>
  <text class="code" x="908" y="232">raw hardware I/O</text>
  <text class="code" x="908" y="258">OS service-manager handoff</text>
  <text class="code" x="908" y="284">production provider supervisor</text>
  <text class="code" x="908" y="310">signed installer / package repo</text>
  <text class="code" x="908" y="336">production database sink</text>
  <line x1="908" y1="358" x2="1112" y2="358" stroke="#fca5a5"/>
  <text class="text" x="908" y="386">The CLI may return plans or</text>
  <text class="text" x="908" y="409">readiness evidence, but does not</text>
  <text class="text" x="908" y="430">complete these integrations.</text>

  <rect x="68" y="500" width="1064" height="54" rx="6" fill="#f1f5f9"/>
  <text class="text" x="88" y="523"><tspan class="code">mutation_executed:false</tspan> only means the CLI did not declare a destructive local mutation.</text>
  <text class="text" x="88" y="544">Also inspect <tspan class="code">invocation_executed</tspan> to learn whether an external provider or Skill runner actually ran.</text>
</svg>
