name: Deploy website

on:
  push:
    branches:
      - main
      - master
    paths:
      - website/**
      - docs/**
      - assets/**
      - scripts/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build localized website
        shell: pwsh
        run: ./scripts/build-site-i18n.ps1

      - name: Validate i18n structure
        shell: pwsh
        run: ./scripts/validate-i18n.ps1

      - name: Build static site
        run: |
          rm -rf public
          mkdir -p public/docs
          cp -R website/. public/

          mkdir -p public/docs/en public/docs/zh-CN public/docs/assets
          cp docs/README.md public/docs/README.md
          cp -R docs/en/. public/docs/en/
          cp -R docs/zh-CN/. public/docs/zh-CN/
          cp -R docs/assets/. public/docs/assets/
          cp -R website/docs/. public/docs/
          cp -R assets public/assets
          rm -rf public/_templates public/_i18n public/_blog public/docs/zh-CN/legacy
          touch public/.nojekyll
          printf '%s\n' 'www.eva-cli.com' > public/CNAME

      - name: Validate Pages artifact
        run: |
          test -f public/index.html
          test -f public/.nojekyll
          test -f public/CNAME
          test ! -d public/_templates
          test ! -d public/_i18n
          test ! -d public/_blog
          test ! -d public/docs/zh-CN/legacy
          if find public -type l | grep .; then
            echo "GitHub Pages artifact must not contain symbolic links."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 900000
          error_count: 30
          reporting_interval: 10000
