name: Deploy website

on:
  push:
    branches:
      - main
      - master
    paths:
      - website/**
      - docs/**
      - assets/**
      - scripts/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build localized website
        shell: pwsh
        run: ./scripts/build-site-i18n.ps1

      - name: Validate i18n structure
        shell: pwsh
        run: ./scripts/validate-i18n.ps1

      - name: Build static site
        run: |
          mkdir -p public/docs
          cp -R website/. public/
          cp -R docs/. public/docs/
          cp -R website/docs/. public/docs/
          cp -R assets public/assets
          rm -rf public/_templates public/_i18n

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
