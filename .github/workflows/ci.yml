name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            evidence_os: linux
          - os: windows-latest
            evidence_os: windows
          - os: macos-latest
            evidence_os: macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Capture W1 runtime process evidence
        shell: pwsh
        env:
          EVA_W1_SOURCE_COMMIT: ${{ github.sha }}
          EVA_W1_RUN_ID: ${{ github.run_id }}
          EVA_W1_RUN_ATTEMPT: ${{ github.run_attempt }}
          EVA_W1_JOB: ${{ github.job }}
          EVA_W1_OS: ${{ matrix.evidence_os }}
        run: |
          $evidence = Join-Path (Get-Location) ".eva/w1-runtime-evidence"
          Remove-Item -LiteralPath $evidence -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $evidence -Force | Out-Null
          $env:EVA_W1_EVIDENCE_DIR = $evidence
          $env:EVA_W1_ARCH = $env:RUNNER_ARCH.ToLowerInvariant()
          $env:EVA_W1_EXECUTOR = "github-actions:$env:EVA_W1_RUN_ID`:$env:EVA_W1_RUN_ATTEMPT`:$env:EVA_W1_JOB`:$env:EVA_W1_OS`:$env:EVA_W1_ARCH"
          ./scripts/capture-release-evidence.ps1 `
            -Executable cargo `
            -ArgumentList @("test", "--test", "background_runtime", "w1_real_process_evidence_covers_required_scenarios", "--", "--ignored", "--exact", "--test-threads=1") `
            -ManifestPath (Join-Path $evidence "suite.capture.json") `
            -StdoutPath (Join-Path $evidence "suite.stdout") `
            -StderrPath (Join-Path $evidence "suite.stderr") `
            -TimeoutMilliseconds 300000 `
            -CaptureId runtime-process
          ./scripts/validate-runtime-process-evidence.ps1 `
            -EvidencePath $evidence `
            -ExpectedSourceCommit $env:EVA_W1_SOURCE_COMMIT `
            -ExpectedRunId $env:EVA_W1_RUN_ID `
            -ExpectedRunAttempt $env:EVA_W1_RUN_ATTEMPT

      - name: Upload W1 runtime process evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: w1-runtime-process-${{ matrix.evidence_os }}-${{ runner.arch }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: .eva/w1-runtime-evidence
          if-no-files-found: error
          retention-days: 14

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Workspace tests
        run: cargo test --workspace

      - name: Release evidence capture contract
        shell: pwsh
        run: ./scripts/test-capture-release-evidence.ps1

      - name: Release platform evidence contract
        shell: pwsh
        run: ./scripts/test-release-platform-evidence.ps1

      - name: Release evidence readback contract
        shell: pwsh
        run: |
          cargo build --locked --bin eva
          ./scripts/test-release-evidence-readback.ps1

      - name: Release evidence readback contract (Windows PowerShell 5.1)
        if: runner.os == 'Windows'
        shell: powershell
        run: ./scripts/test-release-evidence-readback.ps1 -EvaExecutable target/debug/eva.exe

      - name: Runtime process evidence contract
        shell: pwsh
        run: ./scripts/test-runtime-process-evidence.ps1

      - name: Daemon runtime smoke tests
        run: |
          cargo test -p eva-runtime daemon_control_status_and_shutdown_round_trip_has_trace_id
          cargo test -p eva-runtime daemon_control_loop_ticks_scheduler_retry_once
          cargo test -p eva-runtime daemon_drain_mutates_agent_control_state
          cargo test -p eva-runtime daemon_reload_mutates_generation_route_state
          cargo test -p eva-cli daemon_control_status_and_shutdown_round_trip_via_cli
          cargo test -p eva-cli agent_drain_and_reload_use_daemon_mutation_when_available

      - name: Version management check
        shell: pwsh
        run: ./scripts/validate-version-management.ps1

      - name: V1.6 quickstart, durable diagnostics, external capability, context, hardware, lifecycle, and release smoke
        shell: pwsh
        run: |
          $durable = Join-Path (Get-Location) ".eva/ci-durable"
          Remove-Item -LiteralPath $durable -Recurse -Force -ErrorAction SilentlyContinue
          cargo run -- --version
          cargo run -- version --output json
          cargo run -- doctor --output json
          cargo run -- config validate --output json
          cargo run -- inspect runtime --output json
          cargo run -- run --example basic --task-id req-ci-v10 --output json
          cargo run -- run --example basic --task-id req-ci-durable --durable-backend $durable --output json
          cargo run -- inspect durable --durable-backend $durable --output json
          cargo run -- task status --task req-ci-v10 --output json
          cargo run -- task logs --task req-ci-v10 --output json
          cargo run -- run --example basic --task-id req-ci-timeout --timeout-ms 0 --replay-dead-letters --output json
          cargo run -- run --example basic --task-id req-ci-cancel --cancel --output json
          cargo run -- adapter list --output json
          cargo run -- adapter probe --adapter github-mcp --output json
          cargo run -- mcp list --output json
          cargo run -- mcp probe --adapter github-mcp --tool list_issues --output json
          cargo run -- skill list --output json
          cargo run -- skill run --skill code-review --input '{"scope":"current_diff"}' --output json
          cargo run -- discovery scan --output json
          cargo run -- memory context --agent root-agent --query context --private-limit 1 --output json
          cargo run -- hardware list --output json
          cargo run -- hardware probe --adapter scale-main --output json
          cargo run -- hardware bind --adapter scale-main --output json
          cargo run -- backup create --output json
          cargo run -- snapshot create --output json
          cargo run -- restore plan --output json
          cargo run -- upgrade check --output json
          cargo run -- release check --output json
          cargo run -- release security --output json
          cargo run -- release perf --output json
          cargo run -- release migration --output json

  runtime-process-evidence:
    name: W1 runtime process evidence aggregate
    needs: rust
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download W1 platform evidence
        uses: actions/download-artifact@v4
        with:
          pattern: w1-runtime-process-*-${{ github.run_id }}-${{ github.run_attempt }}
          path: .eva/w1-runtime-evidence
          merge-multiple: false

      - name: Reverify exact three-platform W1 evidence
        shell: pwsh
        run: |
          ./scripts/validate-runtime-process-evidence.ps1 `
            -EvidencePath .eva/w1-runtime-evidence `
            -ExpectedSourceCommit '${{ github.sha }}' `
            -ExpectedRunId '${{ github.run_id }}' `
            -ExpectedRunAttempt '${{ github.run_attempt }}'

      - name: Upload verified W1 three-platform bundle
        uses: actions/upload-artifact@v4
        with:
          name: w1-runtime-process-verified-${{ github.run_id }}-${{ github.run_attempt }}
          path: .eva/w1-runtime-evidence
          if-no-files-found: error
          retention-days: 30

  website:
    name: Website and docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build localized website
        shell: pwsh
        run: ./scripts/build-site-i18n.ps1

      - name: Validate i18n structure
        shell: pwsh
        run: ./scripts/validate-i18n.ps1

      - name: Validate version management
        shell: pwsh
        run: ./scripts/validate-version-management.ps1
