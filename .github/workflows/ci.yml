name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Workspace tests
        run: cargo test --workspace

      - name: Daemon runtime smoke tests
        run: |
          cargo test -p eva-runtime daemon_control_status_and_shutdown_round_trip_has_trace_id
          cargo test -p eva-runtime daemon_control_loop_ticks_scheduler_retry_once
          cargo test -p eva-runtime daemon_drain_mutates_agent_control_state
          cargo test -p eva-runtime daemon_reload_mutates_generation_route_state
          cargo test -p eva-cli daemon_control_status_and_shutdown_round_trip_via_cli
          cargo test -p eva-cli agent_drain_and_reload_use_daemon_mutation_when_available

      - name: Version management check
        shell: pwsh
        run: ./scripts/validate-version-management.ps1

      - name: V1.6 quickstart, durable diagnostics, external capability, context, hardware, lifecycle, and release smoke
        shell: pwsh
        run: |
          $durable = Join-Path (Get-Location) ".eva/ci-durable"
          Remove-Item -LiteralPath $durable -Recurse -Force -ErrorAction SilentlyContinue
          cargo run -- --version
          cargo run -- version --output json
          cargo run -- doctor --output json
          cargo run -- config validate --output json
          cargo run -- inspect runtime --output json
          cargo run -- run --example basic --task-id req-ci-v10 --output json
          cargo run -- run --example basic --task-id req-ci-durable --durable-backend $durable --output json
          cargo run -- inspect durable --durable-backend $durable --output json
          cargo run -- task status --task req-ci-v10 --output json
          cargo run -- task logs --task req-ci-v10 --output json
          cargo run -- run --example basic --task-id req-ci-timeout --timeout-ms 0 --replay-dead-letters --output json
          cargo run -- run --example basic --task-id req-ci-cancel --cancel --output json
          cargo run -- adapter list --output json
          cargo run -- adapter probe --adapter github-mcp --output json
          cargo run -- mcp list --output json
          cargo run -- mcp probe --adapter github-mcp --tool list_issues --output json
          cargo run -- skill list --output json
          cargo run -- skill run --skill code-review --input '{"scope":"current_diff"}' --output json
          cargo run -- discovery scan --output json
          cargo run -- memory context --agent root-agent --query context --private-limit 1 --output json
          cargo run -- hardware list --output json
          cargo run -- hardware probe --adapter scale-main --output json
          cargo run -- hardware bind --adapter scale-main --output json
          cargo run -- backup create --output json
          cargo run -- snapshot create --output json
          cargo run -- restore plan --output json
          cargo run -- upgrade check --output json
          cargo run -- release check --output json
          cargo run -- release security --output json
          cargo run -- release perf --output json
          cargo run -- release migration --output json

  website:
    name: Website and docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build localized website
        shell: pwsh
        run: ./scripts/build-site-i18n.ps1

      - name: Validate i18n structure
        shell: pwsh
        run: ./scripts/validate-i18n.ps1

      - name: Validate version management
        shell: pwsh
        run: ./scripts/validate-version-management.ps1
