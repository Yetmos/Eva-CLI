name: GitHub Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v1.5.0 or v1.5.1-beta.1"
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Validate version management
        shell: pwsh
        run: ./scripts/validate-version-management.ps1 -Tag $env:RELEASE_TAG

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Workspace tests
        run: cargo test --workspace

      - name: Release evidence capture contract
        shell: pwsh
        run: ./scripts/test-capture-release-evidence.ps1

      - name: Release platform evidence contract
        shell: pwsh
        run: ./scripts/test-release-platform-evidence.ps1

      - name: V1.6 release smoke
        shell: pwsh
        run: |
          $durable = Join-Path (Get-Location) ".eva/release-durable"
          Remove-Item -LiteralPath $durable -Recurse -Force -ErrorAction SilentlyContinue
          cargo run -- --version
          cargo run -- version --output json
          cargo run -- doctor --output json
          cargo run -- config validate --output json
          cargo run -- inspect runtime --output json
          cargo run -- run --example basic --task-id req-release-v10 --output json
          cargo run -- run --example basic --task-id req-release-durable --durable-backend $durable --output json
          cargo run -- inspect durable --durable-backend $durable --output json
          cargo run -- task status --task req-release-v10 --output json
          cargo run -- task logs --task req-release-v10 --output json
          cargo run -- adapter list --output json
          cargo run -- adapter probe --adapter github-mcp --output json
          cargo run -- mcp list --output json
          cargo run -- mcp probe --adapter github-mcp --tool list_issues --output json
          cargo run -- skill list --output json
          cargo run -- skill run --skill code-review --input '{"scope":"current_diff"}' --output json
          cargo run -- discovery scan --output json
          cargo run -- memory context --agent root-agent --query context --private-limit 1 --output json
          cargo run -- hardware list --output json
          cargo run -- hardware probe --adapter scale-main --output json
          cargo run -- hardware bind --adapter scale-main --output json
          cargo run -- backup create --output json
          cargo run -- snapshot create --output json
          cargo run -- restore plan --output json
          cargo run -- upgrade check --output json
          cargo run -- release check --output json
          cargo run -- release security --output json
          cargo run -- release perf --output json
          cargo run -- release migration --output json

  packages:
    name: Publish GitHub Packages
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Validate version management
        shell: pwsh
        run: ./scripts/validate-version-management.ps1 -Tag $env:RELEASE_TAG

      - name: Detect package support
        id: package_support
        shell: pwsh
        run: |
          if ((Test-Path -LiteralPath Dockerfile) -and (Test-Path -LiteralPath .dockerignore)) {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Resolve release package metadata
        id: release_vars
        shell: bash
        run: |
          version="${RELEASE_TAG#v}"
          base="${version%%-*}"
          IFS='.' read -r major minor patch <<< "${base}"
          prerelease=false
          if [[ "${version}" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "version=${version}"
            echo "major_minor=${major}.${minor}"
            echo "prerelease=${prerelease}"
            echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "source_sha=$(git rev-parse HEAD)"
            echo "short_sha=$(git rev-parse --short=7 HEAD)"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        if: steps.package_support.outputs.enabled == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.package_support.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.package_support.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract container metadata
        id: meta
        if: steps.package_support.outputs.enabled == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/yetmos/eva-cli
          tags: |
            type=raw,value=${{ steps.release_vars.outputs.version }}
            type=raw,value=${{ steps.release_vars.outputs.major_minor }},enable=${{ steps.release_vars.outputs.prerelease == 'false' }}
            type=raw,value=latest,enable=${{ steps.release_vars.outputs.prerelease == 'false' }}
            type=raw,value=sha-${{ steps.release_vars.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=Eva-CLI
            org.opencontainers.image.description=Eva-CLI command-line runtime
            org.opencontainers.image.source=https://github.com/Yetmos/Eva-CLI
            org.opencontainers.image.version=${{ steps.release_vars.outputs.version }}
            org.opencontainers.image.revision=${{ steps.release_vars.outputs.source_sha }}
            org.opencontainers.image.ref.name=${{ env.RELEASE_TAG }}

      - name: Build local package smoke image
        if: steps.package_support.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: eva-cli:release-smoke
          build-args: |
            EVA_VERSION=${{ steps.release_vars.outputs.version }}
            VCS_REF=${{ steps.release_vars.outputs.source_sha }}
            BUILD_DATE=${{ steps.release_vars.outputs.created }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run package smoke test
        if: steps.package_support.outputs.enabled == 'true'
        run: docker run --rm eva-cli:release-smoke --version

      - name: Build and push GHCR image
        id: build
        if: steps.package_support.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            EVA_VERSION=${{ steps.release_vars.outputs.version }}
            VCS_REF=${{ steps.release_vars.outputs.source_sha }}
            BUILD_DATE=${{ steps.release_vars.outputs.created }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package manager dry-run check
        id: package_dry_run
        if: steps.package_support.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/yetmos/eva-cli@${{ steps.build.outputs.digest }}"
          command="docker buildx imagetools inspect ${image}"
          ${command}
          {
            echo "status=passed"
            echo "command=${command}"
          } >> "${GITHUB_OUTPUT}"

      - name: Capture package evidence
        if: steps.package_support.outputs.enabled == 'true'
        shell: pwsh
        env:
          IMAGE_NAME: ghcr.io/yetmos/eva-cli
          IMAGE_URL: https://github.com/Yetmos/Eva-CLI/pkgs/container/eva-cli
          VERSION: ${{ steps.release_vars.outputs.version }}
          PRERELEASE: ${{ steps.release_vars.outputs.prerelease }}
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
          SOURCE_SHA: ${{ steps.release_vars.outputs.source_sha }}
          PACKAGE_DRY_RUN_STATUS: ${{ steps.package_dry_run.outputs.status }}
          PACKAGE_DRY_RUN_COMMAND: ${{ steps.package_dry_run.outputs.command }}
        run: |
          New-Item -ItemType Directory -Force -Path release-evidence | Out-Null
          $tags = $env:TAGS -split "`n" | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
          $evidence = [ordered]@{
            status = "published"
            registry = "ghcr.io"
            package = $env:IMAGE_NAME
            package_url = $env:IMAGE_URL
            image = "$($env:IMAGE_NAME)@$($env:DIGEST)"
            version = $env:VERSION
            source_tag = $env:RELEASE_TAG
            source_sha = $env:SOURCE_SHA
            digest = $env:DIGEST
            tags = @($tags)
            platforms = @("linux/amd64", "linux/arm64")
            prerelease = [System.Convert]::ToBoolean($env:PRERELEASE)
            package_manager_dry_run = [ordered]@{
              manager = "ghcr"
              target = "linux/amd64+linux/arm64"
              command = $env:PACKAGE_DRY_RUN_COMMAND
              status = $env:PACKAGE_DRY_RUN_STATUS
            }
            provenance = [ordered]@{
              enabled = $true
              generator = "docker/build-push-action@v6"
              mode = "max"
              subject = "$($env:IMAGE_NAME)@$($env:DIGEST)"
              verification = "docker buildx imagetools inspect $($env:IMAGE_NAME)@$($env:DIGEST) --format '{{ json .Provenance }}'"
            }
            sbom = [ordered]@{
              enabled = $true
              generator = "docker/build-push-action@v6"
              type = "spdx"
              subject = "$($env:IMAGE_NAME)@$($env:DIGEST)"
              verification = "docker buildx imagetools inspect $($env:IMAGE_NAME)@$($env:DIGEST) --format '{{ json .SBOM }}'"
            }
          }
          $evidence | ConvertTo-Json -Depth 6 | Set-Content -LiteralPath release-evidence/package-ghcr.json -Encoding utf8

      - name: Capture skipped package evidence
        if: steps.package_support.outputs.enabled != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-evidence | Out-Null
          $evidence = [ordered]@{
            status = "skipped"
            registry = "ghcr.io"
            package = "ghcr.io/yetmos/eva-cli"
            package_url = "https://github.com/Yetmos/Eva-CLI/pkgs/container/eva-cli"
            source_tag = $env:RELEASE_TAG
            source_sha = "${{ steps.release_vars.outputs.source_sha }}"
            reason = "The checked-out release tag does not contain Dockerfile and .dockerignore package support."
            package_manager_dry_run = [ordered]@{
              manager = "ghcr"
              target = "linux/amd64+linux/arm64"
              command = "docker buildx imagetools inspect ghcr.io/yetmos/eva-cli:<version>"
              status = "skipped"
            }
            provenance = [ordered]@{
              enabled = $false
              reason = "Package publication was skipped."
            }
            sbom = [ordered]@{
              enabled = $false
              reason = "Package publication was skipped."
            }
          }
          $evidence | ConvertTo-Json -Depth 6 | Set-Content -LiteralPath release-evidence/package-ghcr.json -Encoding utf8

      - name: Upload package evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-evidence-${{ env.RELEASE_TAG }}
          path: release-evidence/package-ghcr.json
          if-no-files-found: error

  native-windows:
    name: Build Windows release archive
    needs: verify
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Validate version management
        shell: pwsh
        run: ./scripts/validate-version-management.ps1 -Tag $env:RELEASE_TAG

      - name: Resolve native artifact metadata
        id: native_vars
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG.TrimStart("v")
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "archive=eva-cli-$version-x86_64-pc-windows-msvc.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build Windows binary
        shell: pwsh
        run: cargo build --release --locked --bin eva

      - name: Smoke test Windows binary
        shell: pwsh
        run: .\target\release\eva.exe --version

      - name: Package Windows archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows | Out-Null
          Copy-Item -LiteralPath target\release\eva.exe -Destination dist\windows\eva.exe
          $readme = @"
          Eva-CLI $env:RELEASE_TAG Windows archive

          Contents:
          - eva.exe

          Verify:
          - eva.exe --version

          Signing:
          - This archive is not signed yet. Production signing remains an external blocker reported by eva release check.
          "@
          $readme | Set-Content -LiteralPath dist\windows\README.txt -Encoding utf8
          Compress-Archive -LiteralPath dist\windows\eva.exe, dist\windows\README.txt -DestinationPath "dist\${{ steps.native_vars.outputs.archive }}" -Force

      - name: Smoke install Windows archive
        shell: pwsh
        run: |
          $installRoot = Join-Path (Get-Location) "dist\install-smoke-windows"
          Remove-Item -LiteralPath $installRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null
          Expand-Archive -LiteralPath "dist\${{ steps.native_vars.outputs.archive }}" -DestinationPath $installRoot -Force
          & (Join-Path $installRoot "eva.exe") --version
          Remove-Item -LiteralPath $installRoot -Recurse -Force

      - name: Capture Windows platform evidence
        shell: pwsh
        run: |
          $evidenceRoot = Join-Path (Get-Location) "release-evidence/platform"
          $installRoot = Join-Path (Get-Location) "dist/install-evidence-windows"
          New-Item -ItemType Directory -Force -Path $evidenceRoot | Out-Null
          $evidenceArchive = Join-Path $evidenceRoot "${{ steps.native_vars.outputs.archive }}"
          Copy-Item -LiteralPath "dist\${{ steps.native_vars.outputs.archive }}" -Destination $evidenceArchive
          Remove-Item -LiteralPath $installRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null
          try {
            Expand-Archive -LiteralPath $evidenceArchive -DestinationPath $installRoot -Force
            $smokeManifest = Join-Path $evidenceRoot "smoke.capture.json"
            $toolchainManifest = Join-Path $evidenceRoot "toolchain.capture.json"
            ./scripts/capture-release-evidence.ps1 `
              -Executable (Join-Path $installRoot "eva.exe") `
              -ArgumentList @("--version") `
              -ManifestPath $smokeManifest `
              -CaptureId "native.windows.smoke" | Out-Null
            ./scripts/capture-release-evidence.ps1 `
              -Executable "rustc" `
              -ArgumentList @("--version") `
              -ManifestPath $toolchainManifest `
              -CaptureId "native.windows.toolchain" | Out-Null
            $sourceSha = (& git rev-parse HEAD).Trim()
            ./scripts/write-release-platform-evidence.ps1 `
              -SmokeCapturePath $smokeManifest `
              -ToolchainCapturePath $toolchainManifest `
              -ArchivePath $evidenceArchive `
              -ManifestPath (Join-Path $evidenceRoot "platform.json") `
              -ExpectedOs "Windows" `
              -ExpectedArchitecture "X64" `
              -ExpectedReleaseTag $env:RELEASE_TAG `
              -ExpectedSourceCommit $sourceSha `
              -ExpectedRunId $env:GITHUB_RUN_ID `
              -ExpectedRunAttempt $env:GITHUB_RUN_ATTEMPT | Out-Null
          } finally {
            Remove-Item -LiteralPath $installRoot -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Upload Windows release archive
        uses: actions/upload-artifact@v4
        with:
          name: native-windows-${{ env.RELEASE_TAG }}
          path: dist/${{ steps.native_vars.outputs.archive }}
          if-no-files-found: error

      - name: Upload Windows native evidence
        uses: actions/upload-artifact@v4
        with:
          name: native-evidence-windows-${{ env.RELEASE_TAG }}
          path: release-evidence/platform/
          if-no-files-found: error

  native-linux:
    name: Build Linux release archive
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Validate version management
        shell: pwsh
        run: ./scripts/validate-version-management.ps1 -Tag $env:RELEASE_TAG

      - name: Resolve native artifact metadata
        id: native_vars
        shell: bash
        run: |
          version="${RELEASE_TAG#v}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "archive=eva-cli-${version}-x86_64-unknown-linux-gnu.tar.gz" >> "${GITHUB_OUTPUT}"

      - name: Build Linux binary
        run: cargo build --release --locked --bin eva

      - name: Smoke test Linux binary
        run: ./target/release/eva --version

      - name: Package Linux archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/linux
          cp target/release/eva dist/linux/eva
          cat > dist/linux/README.txt <<EOF
          Eva-CLI ${RELEASE_TAG} Linux archive

          Contents:
          - eva

          Verify:
          - ./eva --version

          Signing:
          - This archive is not signed yet. Production signing remains an external blocker reported by eva release check.
          EOF
          tar -C dist/linux -czf "dist/${{ steps.native_vars.outputs.archive }}" eva README.txt

      - name: Smoke install Linux archive
        shell: bash
        run: |
          set -euo pipefail
          install_root="dist/install-smoke-linux"
          rm -rf "${install_root}"
          mkdir -p "${install_root}"
          tar -C "${install_root}" -xzf "dist/${{ steps.native_vars.outputs.archive }}"
          "${install_root}/eva" --version
          rm -rf "${install_root}"

      - name: Capture Linux platform evidence
        shell: pwsh
        run: |
          $evidenceRoot = Join-Path (Get-Location) "release-evidence/platform"
          $installRoot = Join-Path (Get-Location) "dist/install-evidence-linux"
          New-Item -ItemType Directory -Force -Path $evidenceRoot | Out-Null
          $evidenceArchive = Join-Path $evidenceRoot "${{ steps.native_vars.outputs.archive }}"
          Copy-Item -LiteralPath "dist/${{ steps.native_vars.outputs.archive }}" -Destination $evidenceArchive
          Remove-Item -LiteralPath $installRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null
          try {
            & tar -C $installRoot -xzf $evidenceArchive
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to extract Linux release archive for evidence capture."
            }
            $smokeManifest = Join-Path $evidenceRoot "smoke.capture.json"
            $toolchainManifest = Join-Path $evidenceRoot "toolchain.capture.json"
            ./scripts/capture-release-evidence.ps1 `
              -Executable (Join-Path $installRoot "eva") `
              -ArgumentList @("--version") `
              -ManifestPath $smokeManifest `
              -CaptureId "native.linux.smoke" | Out-Null
            ./scripts/capture-release-evidence.ps1 `
              -Executable "rustc" `
              -ArgumentList @("--version") `
              -ManifestPath $toolchainManifest `
              -CaptureId "native.linux.toolchain" | Out-Null
            $sourceSha = (& git rev-parse HEAD).Trim()
            ./scripts/write-release-platform-evidence.ps1 `
              -SmokeCapturePath $smokeManifest `
              -ToolchainCapturePath $toolchainManifest `
              -ArchivePath $evidenceArchive `
              -ManifestPath (Join-Path $evidenceRoot "platform.json") `
              -ExpectedOs "Linux" `
              -ExpectedArchitecture "X64" `
              -ExpectedReleaseTag $env:RELEASE_TAG `
              -ExpectedSourceCommit $sourceSha `
              -ExpectedRunId $env:GITHUB_RUN_ID `
              -ExpectedRunAttempt $env:GITHUB_RUN_ATTEMPT | Out-Null
          } finally {
            Remove-Item -LiteralPath $installRoot -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Upload Linux release archive
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-${{ env.RELEASE_TAG }}
          path: dist/${{ steps.native_vars.outputs.archive }}
          if-no-files-found: error

      - name: Upload Linux native evidence
        uses: actions/upload-artifact@v4
        with:
          name: native-evidence-linux-${{ env.RELEASE_TAG }}
          path: release-evidence/platform/
          if-no-files-found: error

  native-macos:
    name: Build macOS release archive (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-26-intel
          - target: aarch64-apple-darwin
            runner: macos-26
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Validate version management
        shell: pwsh
        run: ./scripts/validate-version-management.ps1 -Tag $env:RELEASE_TAG

      - name: Resolve native artifact metadata
        id: native_vars
        shell: bash
        run: |
          version="${RELEASE_TAG#v}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "archive=eva-cli-${version}-${{ matrix.target }}.tar.gz" >> "${GITHUB_OUTPUT}"

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build macOS binary
        run: cargo build --release --locked --bin eva --target ${{ matrix.target }}

      - name: Smoke test macOS binary
        run: ./target/${{ matrix.target }}/release/eva --version

      - name: Package macOS archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/eva" "dist/${{ matrix.target }}/eva"
          cat > "dist/${{ matrix.target }}/README.txt" <<EOF
          Eva-CLI ${RELEASE_TAG} macOS archive (${{ matrix.target }})

          Contents:
          - eva

          Verify:
          - ./eva --version

          Signing:
          - This archive is not signed or notarized yet. Production signing and notarization remain external blockers reported by eva release check.
          EOF
          tar -C "dist/${{ matrix.target }}" -czf "dist/${{ steps.native_vars.outputs.archive }}" eva README.txt

      - name: Smoke install macOS archive
        shell: bash
        run: |
          set -euo pipefail
          install_root="dist/install-smoke-${{ matrix.target }}"
          rm -rf "${install_root}"
          mkdir -p "${install_root}"
          tar -C "${install_root}" -xzf "dist/${{ steps.native_vars.outputs.archive }}"
          "${install_root}/eva" --version
          rm -rf "${install_root}"

      - name: Capture macOS platform evidence
        shell: pwsh
        run: |
          $evidenceRoot = Join-Path (Get-Location) "release-evidence/platform"
          $installRoot = Join-Path (Get-Location) "dist/install-evidence-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $evidenceRoot | Out-Null
          $evidenceArchive = Join-Path $evidenceRoot "${{ steps.native_vars.outputs.archive }}"
          Copy-Item -LiteralPath "dist/${{ steps.native_vars.outputs.archive }}" -Destination $evidenceArchive
          Remove-Item -LiteralPath $installRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null
          try {
            & tar -C $installRoot -xzf $evidenceArchive
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to extract macOS release archive for evidence capture."
            }
            $smokeManifest = Join-Path $evidenceRoot "smoke.capture.json"
            $toolchainManifest = Join-Path $evidenceRoot "toolchain.capture.json"
            ./scripts/capture-release-evidence.ps1 `
              -Executable (Join-Path $installRoot "eva") `
              -ArgumentList @("--version") `
              -ManifestPath $smokeManifest `
              -CaptureId "native.macos.${{ matrix.target }}.smoke" | Out-Null
            ./scripts/capture-release-evidence.ps1 `
              -Executable "rustc" `
              -ArgumentList @("--version") `
              -ManifestPath $toolchainManifest `
              -CaptureId "native.macos.${{ matrix.target }}.toolchain" | Out-Null
            $sourceSha = (& git rev-parse HEAD).Trim()
            $architecture = if ("${{ matrix.target }}" -like "aarch64-*") { "ARM64" } else { "X64" }
            ./scripts/write-release-platform-evidence.ps1 `
              -SmokeCapturePath $smokeManifest `
              -ToolchainCapturePath $toolchainManifest `
              -ArchivePath $evidenceArchive `
              -ManifestPath (Join-Path $evidenceRoot "platform.json") `
              -ExpectedOs "macOS" `
              -ExpectedArchitecture $architecture `
              -ExpectedReleaseTag $env:RELEASE_TAG `
              -ExpectedSourceCommit $sourceSha `
              -ExpectedRunId $env:GITHUB_RUN_ID `
              -ExpectedRunAttempt $env:GITHUB_RUN_ATTEMPT | Out-Null
          } finally {
            Remove-Item -LiteralPath $installRoot -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Upload macOS release archive
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-${{ matrix.target }}-${{ env.RELEASE_TAG }}
          path: dist/${{ steps.native_vars.outputs.archive }}
          if-no-files-found: error

      - name: Upload macOS native evidence
        uses: actions/upload-artifact@v4
        with:
          name: native-evidence-macos-${{ matrix.target }}-${{ env.RELEASE_TAG }}
          path: release-evidence/platform/
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - verify
      - packages
      - native-windows
      - native-linux
      - native-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Validate version management
        shell: pwsh
        run: ./scripts/validate-version-management.ps1 -Tag $env:RELEASE_TAG

      - name: Build localized website
        shell: pwsh
        run: ./scripts/build-site-i18n.ps1

      - name: Validate i18n structure
        shell: pwsh
        run: ./scripts/validate-i18n.ps1

      - name: Capture release evidence
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-evidence | Out-Null
          $durable = Join-Path (Get-Location) ".eva/release-evidence-durable"
          Remove-Item -LiteralPath $durable -Recurse -Force -ErrorAction SilentlyContinue

          function Capture-CargoEvidence([string]$captureId, [string]$stdoutName, [string[]]$commandArgs) {
            $manifestPath = Join-Path "release-evidence" "$captureId.capture.json"
            $stdoutPath = Join-Path "release-evidence" $stdoutName
            $stderrPath = Join-Path "release-evidence" "$captureId.stderr"
            $cargoArgs = @("run", "--") + $commandArgs
            ./scripts/capture-release-evidence.ps1 `
              -Executable "cargo" `
              -ArgumentList $cargoArgs `
              -ManifestPath $manifestPath `
              -StdoutPath $stdoutPath `
              -StderrPath $stderrPath `
              -CaptureId $captureId `
              -NoFail | Out-Null
            $capture = Get-Content -Raw -LiteralPath $manifestPath | ConvertFrom-Json
            if ($capture.outcome -ne "success") {
              Get-Content -Raw -LiteralPath $stderrPath -ErrorAction SilentlyContinue | Write-Host
              throw "Release evidence command '$captureId' ended with outcome '$($capture.outcome)'."
            }
          }

          Capture-CargoEvidence "release.inspect-durable-run" "inspect-durable-run.json" @("run", "--example", "basic", "--task-id", "req-release-evidence-durable", "--durable-backend", $durable, "--output", "json")
          Capture-CargoEvidence "release.inspect-durable" "inspect-durable.json" @("inspect", "durable", "--durable-backend", $durable, "--output", "json")
          Capture-CargoEvidence "release.check" "release-check.json" @("release", "check", "--output", "json")
          Capture-CargoEvidence "release.security" "release-security.json" @("release", "security", "--output", "json")
          Capture-CargoEvidence "release.perf" "release-perf.json" @("release", "perf", "--output", "json")
          Capture-CargoEvidence "release.migration" "release-migration.json" @("release", "migration", "--output", "json")

      - name: Install external security scanner
        run: cargo install cargo-audit --locked

      - name: Generate security scan evidence
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-evidence | Out-Null
          $auditJsonPath = "release-evidence/cargo-audit.json"
          $auditCapturePath = "release-evidence/cargo-audit.capture.json"
          ./scripts/capture-release-evidence.ps1 `
            -Executable "cargo" `
            -ArgumentList @("audit", "--json") `
            -ManifestPath $auditCapturePath `
            -StdoutPath $auditJsonPath `
            -StderrPath "release-evidence/cargo-audit.stderr" `
            -TimeoutMilliseconds 300000 `
            -CaptureId "release.security.cargo-audit" `
            -NoFail | Out-Null
          $auditCapture = Get-Content -Raw -LiteralPath $auditCapturePath | ConvertFrom-Json
          $auditExit = $auditCapture.exit_code
          $auditText = Get-Content -Raw -LiteralPath $auditJsonPath -ErrorAction SilentlyContinue
          $audit = $null
          if (-not [string]::IsNullOrWhiteSpace($auditText)) {
            try {
              $audit = $auditText | ConvertFrom-Json
            } catch {
              $audit = $null
            }
          }

          function Normalize-EvidenceValue([string]$value, [string]$fallback) {
            if ([string]::IsNullOrWhiteSpace($value)) {
              return $fallback
            }
            return (($value -replace "[`r`n]+", " ") -replace "\s+", " ").Trim()
          }

          function Normalize-Severity($advisory) {
            $severity = Normalize-EvidenceValue ([string]$advisory.severity) ""
            if ($severity -match "^(?i:critical|high|medium|low)$") {
              return $severity.ToLowerInvariant()
            }

            $score = $null
            if ($null -ne $advisory.cvss -and $null -ne $advisory.cvss.score) {
              $score = [double]$advisory.cvss.score
            } elseif ($null -ne $advisory.cvss -and $advisory.cvss -is [double]) {
              $score = [double]$advisory.cvss
            }

            if ($null -eq $score) {
              return "medium"
            }
            if ($score -ge 9.0) {
              return "critical"
            }
            if ($score -ge 7.0) {
              return "high"
            }
            if ($score -ge 4.0) {
              return "medium"
            }
            return "low"
          }

          $lines = New-Object System.Collections.Generic.List[string]
          $version = $env:RELEASE_TAG.TrimStart("v")
          $sourceSha = git rev-parse HEAD
          $lines.Add("format=eva.release.security_scan_evidence.v1")
          $lines.Add("version=$version")
          $lines.Add("source_tag=$env:RELEASE_TAG")
          $lines.Add("source_commit=$sourceSha")
          $lines.Add("scanner=cargo-audit")
          $scannerVersion = (cargo audit --version | Select-Object -First 1)
          $lines.Add("scanner_version=$(Normalize-EvidenceValue $scannerVersion 'unknown')")
          $lines.Add("command=cargo audit --json")

          $findingLines = New-Object System.Collections.Generic.List[string]
          $blockingFindings = 0
          $index = 0
          if ($null -ne $audit -and $null -ne $audit.vulnerabilities -and $null -ne $audit.vulnerabilities.list) {
            foreach ($item in @($audit.vulnerabilities.list)) {
              $advisory = $item.advisory
              if ($null -eq $advisory) {
                continue
              }
              $severity = Normalize-Severity $advisory
              if ($severity -eq "high" -or $severity -eq "critical") {
                $blockingFindings += 1
              }

              $packageName = Normalize-EvidenceValue ([string]$item.package.name) (Normalize-EvidenceValue ([string]$advisory.package) "unknown-package")
              $packageVersion = Normalize-EvidenceValue ([string]$item.package.version) "unknown"
              $findingId = Normalize-EvidenceValue ([string]$advisory.id) "RUSTSEC-UNKNOWN-$index"
              $summary = Normalize-EvidenceValue ([string]$advisory.title) "cargo audit advisory"
              $remediation = Normalize-EvidenceValue ([string]$item.versions.patched) "review cargo audit advisory and update dependency"

              $findingLines.Add("finding.$index.id=$findingId")
              $findingLines.Add("finding.$index.package=$packageName")
              $findingLines.Add("finding.$index.version=$packageVersion")
              $findingLines.Add("finding.$index.severity=$severity")
              $findingLines.Add("finding.$index.summary=$summary")
              $findingLines.Add("finding.$index.remediation=$remediation")
              $index += 1
            }
          }

          $scanStatus = if ($auditCapture.outcome -eq "timeout" -or $null -eq $audit) {
            "blocked"
          } elseif ($blockingFindings -gt 0) {
            "failed"
          } else {
            "passed"
          }
          $lines.Insert(7, "scan_status=$scanStatus")
          foreach ($line in $findingLines) {
            $lines.Add($line)
          }
          $lines | Set-Content -LiteralPath release-evidence/release-security-scan.evidence -Encoding utf8
          if ($auditExit -ne 0 -and $scanStatus -eq "passed") {
            Write-Host "cargo audit returned $auditExit with only non-blocking findings recorded in evidence."
          }

      - name: Generate benchmark evidence
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-evidence | Out-Null
          New-Item -ItemType Directory -Force -Path release-evidence/benchmark-captures | Out-Null
          cargo build --release --locked --bin eva
          $eva = Join-Path (Get-Location) "target/release/eva"
          $version = $env:RELEASE_TAG.TrimStart("v")
          $sourceSha = git rev-parse HEAD

          function Measure-EvaCommand([string]$component, [string]$metric, [int64]$budgetMs, [string[]]$commandArgs) {
            $samples = @()
            $environment = $null
            for ($i = 0; $i -lt 3; $i += 1) {
              $captureId = "benchmark.$component.sample.$i"
              $manifestPath = "release-evidence/benchmark-captures/$component.sample-$i.capture.json"
              ./scripts/capture-release-evidence.ps1 `
                -Executable $eva `
                -ArgumentList $commandArgs `
                -ManifestPath $manifestPath `
                -TimeoutMilliseconds ([int][Math]::Max($budgetMs * 4, 10000)) `
                -CaptureId $captureId `
                -NoFail | Out-Null
              $capture = Get-Content -Raw -LiteralPath $manifestPath | ConvertFrom-Json
              if ($capture.outcome -ne "success") {
                $stderrPath = Join-Path (Split-Path -Parent $manifestPath) ([string]$capture.stderr.path)
                Get-Content -Raw -LiteralPath $stderrPath -ErrorAction SilentlyContinue | Write-Host
                throw "Benchmark capture '$captureId' ended with outcome '$($capture.outcome)'."
              }
              $samples += [int64]$capture.duration_ms
              if ($null -eq $environment) {
                $environment = [string]$capture.runner.identity
              } elseif ($environment -ne [string]$capture.runner.identity) {
                throw "Benchmark samples for '$component' used different runner identities."
              }
            }
            $observed = [int64]($samples | Measure-Object -Maximum).Maximum
            [ordered]@{
              component = $component
              metric = $metric
              budget_ms = $budgetMs
              observed_ms = $observed
              sample_count = $samples.Count
              command = "capture-manifest:benchmark-captures/$component.sample-*.capture.json"
              environment = $environment
            }
          }

          $measurements = @(
            (Measure-EvaCommand "release.version" "release binary version wall time" 2000 @("--version")),
            (Measure-EvaCommand "release.check" "release check wall time" 5000 @("release", "check", "--output", "json"))
          )
          $hasRegression = @($measurements | Where-Object { $_.observed_ms -gt $_.budget_ms }).Count -gt 0
          $benchmarkStatus = if ($hasRegression) { "failed" } else { "passed" }

          $lines = New-Object System.Collections.Generic.List[string]
          $lines.Add("format=eva.release.benchmark_evidence.v1")
          $lines.Add("version=$version")
          $lines.Add("source_tag=$env:RELEASE_TAG")
          $lines.Add("source_commit=$sourceSha")
          $lines.Add("benchmark_status=$benchmarkStatus")
          for ($index = 0; $index -lt $measurements.Count; $index += 1) {
            $measurement = $measurements[$index]
            $lines.Add("measurement.$index.component=$($measurement.component)")
            $lines.Add("measurement.$index.metric=$($measurement.metric)")
            $lines.Add("measurement.$index.budget_ms=$($measurement.budget_ms)")
            $lines.Add("measurement.$index.observed_ms=$($measurement.observed_ms)")
            $lines.Add("measurement.$index.sample_count=$($measurement.sample_count)")
            $lines.Add("measurement.$index.command=$($measurement.command)")
            $lines.Add("measurement.$index.environment=$($measurement.environment)")
          }
          $lines | Set-Content -LiteralPath release-evidence/release-benchmark.evidence -Encoding utf8

      - name: Download package evidence artifact
        uses: actions/download-artifact@v4
        with:
          name: package-evidence-${{ env.RELEASE_TAG }}
          path: release-evidence

      - name: Download Windows native evidence artifact
        uses: actions/download-artifact@v4
        with:
          name: native-evidence-windows-${{ env.RELEASE_TAG }}
          path: release-evidence/native/windows

      - name: Download Linux native evidence artifact
        uses: actions/download-artifact@v4
        with:
          name: native-evidence-linux-${{ env.RELEASE_TAG }}
          path: release-evidence/native/linux

      - name: Download macOS x86_64 native evidence artifact
        uses: actions/download-artifact@v4
        with:
          name: native-evidence-macos-x86_64-apple-darwin-${{ env.RELEASE_TAG }}
          path: release-evidence/native/macos-x86_64

      - name: Download macOS aarch64 native evidence artifact
        uses: actions/download-artifact@v4
        with:
          name: native-evidence-macos-aarch64-apple-darwin-${{ env.RELEASE_TAG }}
          path: release-evidence/native/macos-aarch64

      - name: Download Windows release archive
        uses: actions/download-artifact@v4
        with:
          name: native-windows-${{ env.RELEASE_TAG }}
          path: release-native

      - name: Download Linux release archive
        uses: actions/download-artifact@v4
        with:
          name: native-linux-${{ env.RELEASE_TAG }}
          path: release-native

      - name: Download macOS x86_64 release archive
        uses: actions/download-artifact@v4
        with:
          name: native-macos-x86_64-apple-darwin-${{ env.RELEASE_TAG }}
          path: release-native

      - name: Download macOS aarch64 release archive
        uses: actions/download-artifact@v4
        with:
          name: native-macos-aarch64-apple-darwin-${{ env.RELEASE_TAG }}
          path: release-native

      - name: Aggregate verified platform evidence
        shell: pwsh
        run: |
          $head = (& git rev-parse HEAD | Select-Object -First 1).Trim()
          if ($LASTEXITCODE -ne 0 -or $head -cnotmatch '^[0-9a-f]{40}$') {
            throw "Cannot resolve the trusted release checkout commit."
          }
          $tagReference = "$($env:RELEASE_TAG)^{commit}"
          $tagCommit = (& git rev-parse $tagReference | Select-Object -First 1).Trim()
          if ($LASTEXITCODE -ne 0 -or $tagCommit -cne $head) {
            throw "Release tag '$env:RELEASE_TAG' does not resolve to checkout commit '$head'."
          }
          $platformManifests = @(
            "release-evidence/native/windows/platform.json",
            "release-evidence/native/linux/platform.json",
            "release-evidence/native/macos-x86_64/platform.json",
            "release-evidence/native/macos-aarch64/platform.json"
          )
          ./scripts/aggregate-release-platform-evidence.ps1 `
            -PlatformManifestPath $platformManifests `
            -BundleManifestPath "release-evidence/platform-bundle.json" `
            -NativeArtifactsPath "release-evidence/native-artifacts.json" `
            -ExpectedReleaseTag $env:RELEASE_TAG `
            -ExpectedSourceCommit $head `
            -ExpectedRunId $env:GITHUB_RUN_ID `
            -ExpectedRunAttempt $env:GITHUB_RUN_ATTEMPT | Out-Null

      - name: Generate native archive checksums
        shell: pwsh
        run: |
          $nativeEvidencePath = "release-evidence/native-artifacts.json"
          $nativeEvidence = Get-Content -Raw -LiteralPath $nativeEvidencePath | ConvertFrom-Json
          $checksumLines = New-Object System.Collections.Generic.List[string]
          foreach ($artifact in @($nativeEvidence.artifacts)) {
            if ([string]::IsNullOrWhiteSpace($artifact.checksum)) {
              continue
            }

            $archivePath = Join-Path "release-native" $artifact.archive
            if (-not (Test-Path -LiteralPath $archivePath)) {
              throw "Native archive '$($artifact.archive)' was recorded in evidence but was not downloaded."
            }

            $expected = $artifact.checksum -replace "^sha256:", ""
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $archivePath).Hash.ToLowerInvariant()
            if ($actual -ne $expected) {
              throw "Checksum mismatch for '$($artifact.archive)': expected $expected but got $actual."
            }

            $checksumLines.Add("$actual  $($artifact.archive)")
          }

          if ($checksumLines.Count -eq 0) {
            throw "No native archive checksums were generated."
          }

          $checksumLines | Set-Content -LiteralPath release-evidence/SHA256SUMS -Encoding utf8
          $nativeEvidence | Add-Member -NotePropertyName checksum_file -NotePropertyValue "SHA256SUMS" -Force
          $nativeEvidence | ConvertTo-Json -Depth 6 | Set-Content -LiteralPath $nativeEvidencePath -Encoding utf8

      - name: Generate provenance bundle
        shell: pwsh
        run: |
          $nativeEvidence = Get-Content -Raw -LiteralPath release-evidence/native-artifacts.json | ConvertFrom-Json
          $platformEvidence = Get-Content -Raw -LiteralPath release-evidence/platform-bundle.json | ConvertFrom-Json
          $packageEvidence = Get-Content -Raw -LiteralPath release-evidence/package-ghcr.json | ConvertFrom-Json
          $checksums = Get-Content -LiteralPath release-evidence/SHA256SUMS
          $signatureStatus = if ([string]::IsNullOrWhiteSpace($env:RELEASE_SIGNING_KEY)) {
            [ordered]@{
              status = "skipped"
              reason = "RELEASE_SIGNING_KEY is not configured."
            }
          } else {
            [ordered]@{
              status = "blocked"
              reason = "Signing key handling is not implemented yet; do not provide RELEASE_SIGNING_KEY until P3 signing workflow is added."
            }
          }
          $bundle = [ordered]@{
            schema = "eva.release.provenance-bundle.v1"
            source_tag = $env:RELEASE_TAG
            source_sha = git rev-parse HEAD
            generated_at = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platform_evidence = $platformEvidence
            native_artifacts = $nativeEvidence
            package = $packageEvidence
            checksums = @($checksums)
            checksum_signature = $signatureStatus
          }
          $bundle | ConvertTo-Json -Depth 10 | Set-Content -LiteralPath release-evidence/provenance-bundle.json -Encoding utf8

      - name: Generate distribution evidence
        shell: pwsh
        run: |
          $nativeEvidence = Get-Content -Raw -LiteralPath release-evidence/native-artifacts.json | ConvertFrom-Json
          $packageEvidence = Get-Content -Raw -LiteralPath release-evidence/package-ghcr.json | ConvertFrom-Json
          $lines = New-Object System.Collections.Generic.List[string]
          $lines.Add("format=eva.release.distribution_evidence.v1")
          $lines.Add("version=$($nativeEvidence.version)")
          $lines.Add("source_tag=$($nativeEvidence.source_tag)")
          $lines.Add("source_commit=$($nativeEvidence.source_sha)")
          $lines.Add("docs.install=docs/en/release/install-upgrade-uninstall.md")
          $lines.Add("docs.uninstall=docs/en/release/install-upgrade-uninstall.md")
          $lines.Add("docs.upgrade=docs/en/release/install-upgrade-uninstall.md")

          $index = 0
          foreach ($artifact in @($nativeEvidence.artifacts)) {
            $target = [string]$artifact.target
            if ($target -like "*windows*") {
              $os = "windows"
            } elseif ($target -like "*linux*") {
              $os = "linux"
            } elseif ($target -like "*apple-darwin*") {
              $os = "macos"
            } else {
              throw "Cannot derive release distribution OS from target '$target'."
            }

            $status = if ([string]$artifact.smoke_test -eq "passed") { "passed" } else { "blocked" }
            $installCommand = if ([string]::IsNullOrWhiteSpace([string]$artifact.install_command)) { "install $($artifact.archive)" } else { [string]$artifact.install_command }
            $uninstallCommand = if ([string]::IsNullOrWhiteSpace([string]$artifact.uninstall_command)) { "remove the extracted Eva-CLI archive directory" } else { [string]$artifact.uninstall_command }
            $upgradeCommand = if ([string]::IsNullOrWhiteSpace([string]$artifact.upgrade_command)) { "replace the archive contents and run eva upgrade check --output json" } else { [string]$artifact.upgrade_command }

            $lines.Add("smoke.$index.os=$os")
            $lines.Add("smoke.$index.target=$target")
            $lines.Add("smoke.$index.artifact=$($artifact.archive)")
            $lines.Add("smoke.$index.package_format=$($artifact.format)")
            $lines.Add("smoke.$index.install_command=$installCommand")
            $lines.Add("smoke.$index.smoke_command=eva --version")
            $lines.Add("smoke.$index.uninstall_command=$uninstallCommand")
            $lines.Add("smoke.$index.upgrade_command=$upgradeCommand")
            $lines.Add("smoke.$index.status=$status")
            $index += 1
          }

          $dryRun = $packageEvidence.package_manager_dry_run
          $dryRunStatus = if ($null -ne $dryRun -and -not [string]::IsNullOrWhiteSpace([string]$dryRun.status)) { [string]$dryRun.status } else { "skipped" }
          $dryRunCommand = if ($null -ne $dryRun -and -not [string]::IsNullOrWhiteSpace([string]$dryRun.command)) { [string]$dryRun.command } else { "docker buildx imagetools inspect ghcr.io/yetmos/eva-cli:<version>" }
          $dryRunTarget = if ($null -ne $dryRun -and -not [string]::IsNullOrWhiteSpace([string]$dryRun.target)) { [string]$dryRun.target } else { "linux/amd64+linux/arm64" }
          $dryRunManager = if ($null -ne $dryRun -and -not [string]::IsNullOrWhiteSpace([string]$dryRun.manager)) { [string]$dryRun.manager } else { "ghcr" }
          $packageName = if (-not [string]::IsNullOrWhiteSpace([string]$packageEvidence.package)) { [string]$packageEvidence.package } else { "ghcr.io/yetmos/eva-cli" }
          $lines.Add("package.0.manager=$dryRunManager")
          $lines.Add("package.0.package=$packageName")
          $lines.Add("package.0.target=$dryRunTarget")
          $lines.Add("package.0.command=$dryRunCommand")
          $lines.Add("package.0.status=$dryRunStatus")
          $lines | Set-Content -LiteralPath release-evidence/release-distribution.evidence -Encoding utf8

      - name: Verify release evidence gates
        shell: pwsh
        run: |
          function Capture-ReleaseGate([string]$captureId, [string]$stdoutName, [string[]]$commandArgs) {
            $manifestPath = Join-Path "release-evidence" "$captureId.capture.json"
            $stdoutPath = Join-Path "release-evidence" $stdoutName
            $stderrPath = Join-Path "release-evidence" "$captureId.stderr"
            $cargoArgs = @("run", "--") + $commandArgs
            ./scripts/capture-release-evidence.ps1 `
              -Executable "cargo" `
              -ArgumentList $cargoArgs `
              -ManifestPath $manifestPath `
              -StdoutPath $stdoutPath `
              -StderrPath $stderrPath `
              -CaptureId $captureId `
              -NoFail | Out-Null
            $capture = Get-Content -Raw -LiteralPath $manifestPath | ConvertFrom-Json
            if ($capture.outcome -ne "success") {
              Get-Content -Raw -LiteralPath $stderrPath -ErrorAction SilentlyContinue | Write-Host
              throw "Release gate '$captureId' ended with outcome '$($capture.outcome)'."
            }
          }

          Capture-ReleaseGate "release.verify-check" "release-check-evidence.json" @("release", "check", "--distribution-evidence", "release-evidence/release-distribution.evidence", "--security-scan-evidence", "release-evidence/release-security-scan.evidence", "--benchmark-evidence", "release-evidence/release-benchmark.evidence", "--output", "json")
          Capture-ReleaseGate "release.verify-perf" "release-perf-benchmark.json" @("release", "perf", "--benchmark-evidence", "release-evidence/release-benchmark.evidence", "--output", "json")

      - name: Upload release evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ env.RELEASE_TAG }}
          path: release-evidence/
          if-no-files-found: error

      - name: Create or update GitHub Release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        with:
          script: |
            const fs = require("fs");
            const tag = process.env.RELEASE_TAG;
            const version = tag.replace(/^v/, "");
            const baseVersion = version.split("-")[0];
            const prerelease = /-(alpha|beta)(?:\.\d+)?$/.test(version);
            const status = prerelease ? version.match(/-(alpha|beta)/)[1] : "release";
            const humanVersion = prerelease ? `V${version}` : `V${version}-release`;
            const { owner, repo } = context.repo;
            const releaseName = `Eva-CLI ${humanVersion}`;
            const releaseNotesPath = `docs/en/release/release-notes-v${baseVersion}.md`;
            const manualNotes = fs.existsSync(releaseNotesPath)
              ? fs.readFileSync(releaseNotesPath, "utf8")
              : `# Eva-CLI ${humanVersion}\n\nNo dedicated release notes file exists for ${humanVersion}.`;
            const packageEvidencePath = "release-evidence/package-ghcr.json";
            const packageLines = [];
            if (fs.existsSync(packageEvidencePath)) {
              const packageEvidence = JSON.parse(fs.readFileSync(packageEvidencePath, "utf8"));
              if (packageEvidence.status === "published") {
                packageLines.push("## GitHub Packages");
                packageLines.push(`- Package: \`${packageEvidence.package}\``);
                packageLines.push(`- Image digest: \`${packageEvidence.digest}\``);
                packageLines.push(`- Tags: ${packageEvidence.tags.map((tag) => `\`${tag}\``).join(", ")}`);
                packageLines.push(`- Package URL: ${packageEvidence.package_url}`);
                if (packageEvidence.provenance?.enabled) {
                  packageLines.push(`- Provenance: enabled (\`${packageEvidence.provenance.mode || "unknown"}\`) for \`${packageEvidence.provenance.subject || packageEvidence.image}\``);
                  if (packageEvidence.provenance.verification) {
                    packageLines.push(`- Provenance verification: \`${packageEvidence.provenance.verification}\``);
                  }
                } else {
                  packageLines.push("- Provenance: not available for this package evidence.");
                }
                if (packageEvidence.sbom?.enabled) {
                  packageLines.push(`- SBOM: enabled (\`${packageEvidence.sbom.type || "unknown"}\`) for \`${packageEvidence.sbom.subject || packageEvidence.image}\``);
                  if (packageEvidence.sbom.verification) {
                    packageLines.push(`- SBOM verification: \`${packageEvidence.sbom.verification}\``);
                  }
                } else {
                  packageLines.push("- SBOM: not available for this package evidence.");
                }
              } else {
                packageLines.push("## GitHub Packages");
                packageLines.push(`- Status: \`${packageEvidence.status}\``);
                packageLines.push(`- Reason: ${packageEvidence.reason}`);
                packageLines.push("- Provenance: disabled because package publication was skipped.");
                packageLines.push("- SBOM: disabled because package publication was skipped.");
              }
            }
            const body = [
              manualNotes,
              "## GitHub-managed version record",
              `- Tag: \`${tag}\``,
              `- Human version: \`${humanVersion}\``,
              `- Status: \`${status}\``,
              "- Release workflow: validates Rust workspace, website/docs, version-management rules, release gates, native archive install smoke, distribution evidence, and GHCR package publication before publishing.",
              "- Artifacts: GitHub source archives, native Windows/Linux/macOS archives, workflow release-evidence artifact, and GHCR container package when package evidence status is `published`. Current releases intentionally do not publish signed installers.",
              "- Supply-chain evidence: GHCR packages include Buildx provenance and SBOM attestations when package evidence status is `published`; `release-distribution.evidence` records three-platform install smoke and package-manager dry-run status.",
              ...packageLines,
            ].filter(Boolean).join("\n\n");

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                tag_name: tag,
                name: releaseName,
                body,
                draft: false,
                prerelease,
              });
              core.info(`Updated GitHub Release for ${tag}.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body,
                draft: false,
                prerelease,
              });
              core.info(`Created GitHub Release for ${tag}.`);
            }
