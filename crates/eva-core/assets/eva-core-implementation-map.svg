<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">eva-core implementation map</title>
  <desc id="desc">Implementation map for eva-core contract modules, downstream users, and staged edit sequence.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .label { font: 700 18px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .small { font: 400 13px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .tiny { font: 400 12px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .core { fill: #2563eb; }
      .module-a { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
      .module-b { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
      .module-c { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .outer { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; filter: url(#shadow); }
      .lane { fill: #eef2ff; stroke: #6366f1; stroke-width: 1.2; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow); }
      .white { fill: #ffffff; }
      .coretext { font: 700 24px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; }
      .corehint { font: 400 14px Arial, "Microsoft YaHei", sans-serif; fill: #dbeafe; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="48" y="50">eva-core implementation map / 基础契约实施地图</text>
  <text class="subtitle" x="48" y="78">Pure contract types first: Topic, ID, Capability, Event, Invoke, Error. No runtime wiring or I/O.</text>

  <rect class="outer" x="48" y="116" width="250" height="250" rx="12"/>
  <text class="label" x="72" y="150">Upstream inputs</text>
  <text class="small" x="72" y="184">CLI emits requests</text>
  <text class="small" x="72" y="212">config references IDs</text>
  <text class="small" x="72" y="240">runtime creates events</text>
  <text class="small" x="72" y="268">agents call capabilities</text>
  <text class="tiny" x="72" y="315">All inputs become typed contracts</text>
  <text class="tiny" x="72" y="338">before reaching downstream crates.</text>

  <rect class="core" x="416" y="122" width="448" height="242" rx="16" filter="url(#shadow)"/>
  <text class="coretext" x="640" y="160" text-anchor="middle">eva-core</text>
  <text class="corehint" x="640" y="184" text-anchor="middle">side-effect-free contract crate</text>

  <rect class="module-a" x="452" y="212" width="126" height="48" rx="8"/>
  <text class="small" x="515" y="241" text-anchor="middle">topic</text>
  <rect class="module-a" x="592" y="212" width="126" height="48" rx="8"/>
  <text class="small" x="655" y="241" text-anchor="middle">ids</text>
  <rect class="module-a" x="732" y="212" width="96" height="48" rx="8"/>
  <text class="small" x="780" y="241" text-anchor="middle">error</text>

  <rect class="module-b" x="452" y="282" width="126" height="48" rx="8"/>
  <text class="small" x="515" y="311" text-anchor="middle">capability</text>
  <rect class="module-b" x="592" y="282" width="126" height="48" rx="8"/>
  <text class="small" x="655" y="311" text-anchor="middle">event</text>
  <rect class="module-b" x="732" y="282" width="96" height="48" rx="8"/>
  <text class="small" x="780" y="311" text-anchor="middle">invoke</text>

  <rect class="outer" x="982" y="116" width="250" height="250" rx="12"/>
  <text class="label" x="1006" y="150">Downstream users</text>
  <text class="small" x="1006" y="184">eva-config</text>
  <text class="small" x="1006" y="212">eva-eventbus</text>
  <text class="small" x="1006" y="240">eva-scheduler</text>
  <text class="small" x="1006" y="268">eva-agent</text>
  <text class="small" x="1006" y="296">eva-adapter</text>
  <text class="small" x="1006" y="324">eva-runtime and eva-cli</text>

  <path class="arrow" d="M 298 238 C 342 238 362 238 408 238"/>
  <path class="arrow" d="M 864 238 C 908 238 928 238 974 238"/>

  <rect class="outer" x="48" y="414" width="1184" height="262" rx="12"/>
  <text class="label" x="72" y="448">Staged edit sequence / 修改顺序</text>
  <text class="subtitle" x="72" y="474">Keep each step compileable. Add tests with each contract implementation.</text>

  <rect class="lane" x="78" y="512" width="130" height="84" rx="10"/>
  <text class="small" x="143" y="542" text-anchor="middle">M004-M010</text>
  <text class="tiny" x="143" y="566" text-anchor="middle">error model</text>

  <rect class="lane" x="238" y="512" width="130" height="84" rx="10"/>
  <text class="small" x="303" y="542" text-anchor="middle">M011-M019</text>
  <text class="tiny" x="303" y="566" text-anchor="middle">topic pattern</text>

  <rect class="lane" x="398" y="512" width="130" height="84" rx="10"/>
  <text class="small" x="463" y="542" text-anchor="middle">M020-M028</text>
  <text class="tiny" x="463" y="566" text-anchor="middle">id newtypes</text>

  <rect class="lane" x="558" y="512" width="130" height="84" rx="10"/>
  <text class="small" x="623" y="542" text-anchor="middle">M029-M035</text>
  <text class="tiny" x="623" y="566" text-anchor="middle">capability</text>

  <rect class="lane" x="718" y="512" width="130" height="84" rx="10"/>
  <text class="small" x="783" y="542" text-anchor="middle">M036-M044</text>
  <text class="tiny" x="783" y="566" text-anchor="middle">event</text>

  <rect class="lane" x="878" y="512" width="130" height="84" rx="10"/>
  <text class="small" x="943" y="542" text-anchor="middle">M045-M053</text>
  <text class="tiny" x="943" y="566" text-anchor="middle">invoke</text>

  <rect class="lane" x="1038" y="512" width="150" height="84" rx="10"/>
  <text class="small" x="1113" y="542" text-anchor="middle">M054-M066</text>
  <text class="tiny" x="1113" y="566" text-anchor="middle">exports and verify</text>

  <path class="dash" d="M 208 554 L 230 554"/>
  <path class="dash" d="M 368 554 L 390 554"/>
  <path class="dash" d="M 528 554 L 550 554"/>
  <path class="dash" d="M 688 554 L 710 554"/>
  <path class="dash" d="M 848 554 L 870 554"/>
  <path class="dash" d="M 1008 554 L 1030 554"/>

  <text class="tiny" x="72" y="640">Verification: cargo fmt --check, cargo test -p eva-core, cargo check --workspace, cargo doc -p eva-core --no-deps.</text>
  <text class="tiny" x="72" y="662">Forbidden in eva-core: filesystem, network, shell, database, hardware, Tokio runtime wiring, provider-private protocols.</text>
</svg>
