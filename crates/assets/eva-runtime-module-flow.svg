<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Eva-CLI runtime module flow</title>
  <desc id="desc">Runtime module flow showing how configuration, policy, runtime, storage, event bus, scheduler, agent, lua host, and capability modules connect.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; fill: #172033; }
      .sub { font: 500 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #526178; }
      .box { fill: #ffffff; stroke: #bcc8dc; stroke-width: 1.5; rx: 8; }
      .blue { fill: #e8f1fb; stroke: #3a73b7; }
      .green { fill: #e6f5ef; stroke: #2a7a5e; }
      .amber { fill: #fff4df; stroke: #9d6a13; }
      .text { font: 700 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #182238; }
      .small { font: 500 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #3e4b61; }
      .arrow { stroke: #56657c; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7b8799; stroke-width: 2; stroke-dasharray: 5 5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#56657c"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="620"/>
  <text class="title" x="44" y="54">V0.3 / V0.4 运行闭环模块流</text>
  <text class="sub" x="44" y="82">先让 CLI 能诊断配置，再让 runtime 组装最小事件流；下层模块不反向依赖 runtime。</text>

  <rect class="box blue" x="60" y="128" width="180" height="86"/>
  <text class="text" x="92" y="162">eva-cli</text>
  <text class="small" x="92" y="188">doctor / validate / inspect / run</text>

  <rect class="box green" x="288" y="96" width="190" height="74"/>
  <text class="text" x="318" y="128">eva-config</text>
  <text class="small" x="318" y="152">ProjectConfig</text>
  <rect class="box green" x="288" y="188" width="190" height="74"/>
  <text class="text" x="318" y="220">eva-policy</text>
  <text class="small" x="318" y="244">EffectivePolicy</text>

  <rect class="box blue" x="526" y="128" width="190" height="86"/>
  <text class="text" x="558" y="162">eva-runtime</text>
  <text class="small" x="558" y="188">builder / services / shutdown</text>

  <rect class="box amber" x="92" y="322" width="170" height="80"/>
  <text class="text" x="124" y="354">eva-storage</text>
  <text class="small" x="124" y="380">state / event log / artifact</text>

  <rect class="box amber" x="310" y="322" width="170" height="80"/>
  <text class="text" x="342" y="354">eva-eventbus</text>
  <text class="small" x="342" y="380">publish / subscribe / dead letter</text>

  <rect class="box amber" x="528" y="322" width="170" height="80"/>
  <text class="text" x="560" y="354">eva-scheduler</text>
  <text class="small" x="560" y="380">topic routes / mailbox</text>

  <rect class="box amber" x="746" y="322" width="170" height="80"/>
  <text class="text" x="778" y="354">eva-agent</text>
  <text class="small" x="778" y="380">lifecycle / queue / handler</text>

  <rect class="box amber" x="964" y="322" width="170" height="80"/>
  <text class="text" x="996" y="354">eva-lua-host</text>
  <text class="small" x="996" y="380">sandbox / bindings / reload</text>

  <rect class="box amber" x="746" y="470" width="170" height="80"/>
  <text class="text" x="778" y="502">eva-capability</text>
  <text class="small" x="778" y="528">registry / router / host API</text>

  <rect class="box green" x="964" y="470" width="170" height="80"/>
  <text class="text" x="996" y="502">observability</text>
  <text class="small" x="996" y="528">trace / audit / metrics</text>

  <path class="arrow" d="M240 171 H288"/>
  <path class="arrow" d="M478 133 H526"/>
  <path class="arrow" d="M478 225 C505 225 505 192 526 192"/>
  <path class="arrow" d="M621 214 V284 C621 304 177 304 177 322"/>
  <path class="arrow" d="M621 214 V284 C621 304 395 304 395 322"/>
  <path class="arrow" d="M621 214 V284 C621 304 613 304 613 322"/>
  <path class="arrow" d="M621 214 V284 C621 304 831 304 831 322"/>
  <path class="arrow" d="M916 362 H964"/>
  <path class="arrow" d="M831 402 V470"/>
  <path class="dash" d="M1049 402 V470"/>
  <path class="dash" d="M916 510 H964"/>
  <path class="dash" d="M395 402 C395 452 746 452 746 510"/>
</svg>
