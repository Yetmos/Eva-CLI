# Root Agent manifest.
# 根 Agent manifest。
#
# The root agent owns top-level routing, planning, and response organization.
# 根 Agent 负责顶层路由、任务拆解和回复组织。

# Stable Agent id used by routes, permissions, and state namespaces. / routes、permissions 和 state namespace 使用的稳定 Agent ID。
id: root-agent
# Whether this Agent is available for registration. / 是否允许注册此 Agent。
enabled: true
# Lua entry script relative to this Agent directory. / 相对此 Agent 目录的 Lua 入口脚本。
script: main.lua
# Script generation marker used by hot-reload and audit. / 热更新和审计使用的脚本 generation 标记。
script_version: 2026-06-09.1
# Immutable behavioral constraints loaded with the Agent. / 随 Agent 加载的不可变行为约束。
constraints:
  # Constraint document relative to this Agent directory. / 相对此 Agent 目录的约束文档。
  file: constraints.md
  # Runtime must not mutate this constraint file. / 运行时不得修改此约束文件。
  mutable: false
  # Constraint priority in policy merging. / 策略合并时的约束优先级。
  priority: agent_policy

# Topic subscriptions consumed by this Agent. / 此 Agent 消费的 Topic 订阅。
subscriptions:
  - /sys

# Inbox backpressure settings. / Inbox 背压设置。
inbox:
  # Maximum queued events. / 最大排队事件数。
  capacity: 256
  # Overflow events are sent to the dead-letter path. / 溢出事件进入死信路径。
  overflow: dead_letter

# Per-event and tool-call timeouts. / 单事件和工具调用超时。
timeout:
  # Event handling timeout in milliseconds. / 事件处理超时时间，单位毫秒。
  event_ms: 30000
  # Tool invocation timeout in milliseconds. / 工具调用超时时间，单位毫秒。
  tool_ms: 60000

# Durable state backend and namespace. / 持久状态后端和命名空间。
state:
  # Use the global SQLite state store. / 使用全局 SQLite 状态存储。
  backend: sqlite
  # Namespace for this Agent's state records. / 此 Agent 状态记录的命名空间。
  namespace: agent.root

# Explicit permission boundary for this Agent. / 此 Agent 的显式权限边界。
permissions:
  # Topic patterns this Agent may emit. / 此 Agent 可发布的 Topic pattern。
  emit:
    - /sys/**
  # Host tools available to Lua code. / Lua 代码可见的宿主工具。
  tools:
    - invoke_agent
    - state_get
    - state_set
    - memory.search
    - knowledge.search
  # Adapter capabilities and providers this Agent may invoke. / 此 Agent 可调用的 Adapter 能力和 provider。
  adapters:
    # Capability allowlist. / 能力白名单。
    capabilities:
      - chat.reply
      - task.plan
      - repo.analyze
    # Provider allowlist. / Provider 白名单。
    providers:
      - codex-cli
      - claude-api
  # Memory access rules. / 记忆访问规则。
  memory:
    # Memory scopes this Agent may read. / 此 Agent 可读取的记忆范围。
    read:
      - agent:self
      - global:project
    # Memory scopes this Agent may write directly. / 此 Agent 可直接写入的记忆范围。
    write:
      - agent:self
    # Global memory writes require proposal flow. / 全局记忆写入必须走提议流程。
    propose_global: true
  # Knowledge search scopes. / 知识检索范围。
  knowledge:
    search:
      - workspace_doc
      - project_config
      - markdown
